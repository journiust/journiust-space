<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PINKKLISH · Stella Station</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);

  /* Palette */
  --void:#000408;
  --deep:#02060f;
  --gold:#e8c46a;
  --gold2:#c49b3c;
  --gold-dim:rgba(232,196,106,.12);
  --ion:#4af0ff;
  --ion2:#00c8d8;
  --plasma:#c86aff;
  --plasma2:#8c2aee;
  --rose:#ff4d8a;
  --ember:#ff7b30;

  /* Derived */
  --ion-glow:rgba(74,240,255,.18);
  --plasma-glow:rgba(200,106,255,.15);
  --gold-glow:rgba(232,196,106,.22);

  /* Layout */
  --ceil-h:20vh;
  --floor-h:22vh;

  /* Typography */
  --font-ui:'Syne',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html{
  width:100%;height:100%;
  overflow:hidden;position:fixed;
  -webkit-text-size-adjust:100%;
}

body{
  width:100%;height:100%;height:100dvh;
  overflow:hidden;position:fixed;top:0;left:0;
  background:var(--void);
  font-family:var(--font-ui);
  touch-action:none;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
  cursor:none;
}

/* ═══════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════ */
#cursor{
  position:fixed;z-index:9999;pointer-events:none;
  width:20px;height:20px;
  border:1px solid rgba(74,240,255,.7);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,border-color .2s,opacity .15s;
  mix-blend-mode:screen;
}
#cursor::after{
  content:'';
  position:absolute;top:50%;left:50%;
  width:3px;height:3px;border-radius:50%;
  background:var(--ion);
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px var(--ion);
}
#cursor.hovering{
  width:36px;height:36px;
  border-color:rgba(232,196,106,.8);
}
#cursor.clicking{
  width:14px;height:14px;
  border-color:rgba(255,77,138,.9);
}

/* ═══════════════════════════════════════
   CANVAS LAYERS
═══════════════════════════════════════ */
#canvas-bg{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
}

/* ═══════════════════════════════════════
   SCENE STRUCTURE
═══════════════════════════════════════ */
#scene{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  z-index:1;
  overflow:hidden;
}

/* ─── CEILING ─── */
#ceiling{
  height:calc(var(--ceil-h) + var(--sat));
  padding-top:var(--sat);
  flex-shrink:0;
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,
    #000205 0%,
    #010412 35%,
    #040826 70%,
    #060d30 100%
  );
}

/* Perspective vanishing grid */
#ceil-grid{
  position:absolute;inset:0;overflow:hidden;
  opacity:.6;
}
#ceil-grid svg{
  position:absolute;bottom:0;left:0;width:100%;height:100%;
}

/* Ceiling bottom hero bar */
#ceil-edge{
  position:absolute;bottom:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(200,106,255,.3) 10%,
    rgba(74,240,255,.9) 30%,
    var(--gold) 50%,
    rgba(74,240,255,.9) 70%,
    rgba(200,106,255,.3) 90%,
    transparent 100%
  );
}
#ceil-edge::after{
  content:'';
  position:absolute;top:0;left:0;right:0;bottom:-8px;
  background:linear-gradient(180deg,
    rgba(74,240,255,.15) 0%,
    transparent 100%
  );
  filter:blur(4px);
}

/* Overhead light fixtures */
.fixture{
  position:absolute;bottom:0;
  display:flex;flex-direction:column;
  align-items:center;
  pointer-events:none;
}
.fixture-bar{
  width:3px;
  background:linear-gradient(180deg,
    transparent 0%,
    rgba(200,106,255,.4) 100%
  );
}
.fixture-head{
  width:24px;height:6px;
  background:rgba(200,106,255,.15);
  border:1px solid rgba(200,106,255,.3);
  border-bottom:none;
  border-radius:3px 3px 0 0;
}
.fixture-beam{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:80px;
  pointer-events:none;
  filter:blur(2px);
  opacity:.22;
}

/* ─── WALLS / STAGE ─── */
#stage{
  flex:1;position:relative;
  overflow:hidden;min-height:0;
}

/* Atmospheric gradient */
#stage-bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 110% 70% at 50% 0%,
      #080d2a 0%,
      #040614 45%,
      var(--void) 100%
    );
}

/* Depth fog layers */
#fog-l{
  position:absolute;top:0;bottom:0;left:0;
  width:35%;z-index:2;pointer-events:none;
  background:linear-gradient(90deg,
    rgba(0,4,8,.98) 0%,
    rgba(0,6,14,.8) 40%,
    transparent 100%
  );
}
#fog-r{
  position:absolute;top:0;bottom:0;right:0;
  width:35%;z-index:2;pointer-events:none;
  background:linear-gradient(270deg,
    rgba(0,4,8,.98) 0%,
    rgba(0,6,14,.8) 40%,
    transparent 100%
  );
}

/* Vanishing point glow */
#vp{
  position:absolute;
  top:35%;left:50%;
  transform:translate(-50%,-50%);
  width:50%;height:200%;
  z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center,
    rgba(74,240,255,.04) 0%,
    transparent 60%
  );
}

/* Nebula atmosphere */
#nebula{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  animation:nebulaShift 18s ease-in-out infinite alternate;
}
@keyframes nebulaShift{
  from{opacity:.5;transform:scale(1);}
  to{opacity:.9;transform:scale(1.04);}
}
#nebula::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 70%,rgba(200,106,255,.07),transparent 65%),
    radial-gradient(ellipse 50% 60% at 80% 30%,rgba(74,240,255,.05),transparent 65%),
    radial-gradient(ellipse 40% 40% at 60% 80%,rgba(255,77,138,.04),transparent 65%);
}

/* ─── WORLD SCROLL CONTAINER ─── */
#world-wrap{
  position:absolute;inset:0;z-index:3;
}
#world{
  position:absolute;top:0;bottom:0;left:0;
  display:flex;align-items:flex-end;
  will-change:transform;
}

/* ─── ARCHITECTURAL COLUMNS ─── */
.col{
  position:absolute;bottom:0;
  pointer-events:none;z-index:4;
}
.col-shaft{
  width:100%;height:100%;
  position:relative;
  background:linear-gradient(90deg,
    rgba(200,106,255,.015) 0%,
    rgba(220,180,255,.06) 25%,
    rgba(240,230,255,.035) 50%,
    rgba(220,180,255,.06) 75%,
    rgba(200,106,255,.015) 100%
  );
  border-left:1px solid rgba(200,106,255,.06);
  border-right:1px solid rgba(200,106,255,.06);
}
/* Column inner light vein */
.col-vein{
  position:absolute;top:0;bottom:0;
  left:50%;transform:translateX(-50%);
  width:1px;
  background:linear-gradient(180deg,
    transparent 0%,
    rgba(200,106,255,.6) 20%,
    rgba(74,240,255,.5) 50%,
    rgba(200,106,255,.6) 80%,
    transparent 100%
  );
  animation:veinPulse var(--vd,3.5s) ease-in-out infinite;
  animation-delay:var(--vdel,0s);
}
@keyframes veinPulse{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}
/* Ornamental column cap */
.col-cap-t{
  position:absolute;top:-12px;left:50%;
  transform:translateX(-50%);
  width:32px;height:12px;
  background:linear-gradient(180deg,
    rgba(200,106,255,.1),
    rgba(200,106,255,.04)
  );
  border:1px solid rgba(200,106,255,.18);
  border-bottom:none;
  border-radius:4px 4px 0 0;
  overflow:hidden;
}
.col-cap-t::after{
  content:'';
  position:absolute;top:3px;left:50%;
  transform:translateX(-50%);
  width:5px;height:5px;
  background:var(--gold);
  border-radius:1px;
  rotate:45deg;
  box-shadow:0 0 8px var(--gold),0 0 20px rgba(232,196,106,.4);
  animation:gemFlicker 3s ease-in-out infinite;
  animation-delay:var(--vdel,0s);
}
@keyframes gemFlicker{
  0%,100%{opacity:.8;}
  85%,90%{opacity:.1;}
  87%{opacity:.9;}
}
.col-cap-b{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:40px;height:4px;
  background:rgba(200,106,255,.06);
  border:1px solid rgba(200,106,255,.12);
  border-radius:2px;
}

/* ─── PORTHOLE WINDOWS ─── */
.porthole{
  position:absolute;
  border-radius:50%;
  overflow:visible;
  z-index:5;
}
.port-outer-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(232,196,106,.1);
  pointer-events:none;
}
.port-outer-ring2{
  position:absolute;inset:-14px;border-radius:50%;
  border:1px solid rgba(232,196,106,.05);
  pointer-events:none;
}
.port-frame{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(232,196,106,.2);
  box-shadow:
    0 0 0 1px rgba(232,196,106,.06),
    0 0 40px rgba(74,240,255,.12),
    0 0 80px rgba(74,240,255,.05),
    inset 0 0 60px rgba(0,0,0,.9);
  z-index:2;pointer-events:none;
}
.port-inner{
  width:100%;height:100%;
  border-radius:50%;
  overflow:hidden;
  position:relative;
}
/* Porthole scan sweep */
.port-sweep{
  position:absolute;
  width:100%;height:100%;
  border-radius:50%;
  background:conic-gradient(
    from 0deg,
    transparent 0deg,
    rgba(74,240,255,.04) 30deg,
    transparent 60deg
  );
  animation:sweepRotate 12s linear infinite;
  z-index:1;
}
@keyframes sweepRotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
/* Porthole glare */
.port-glare{
  position:absolute;
  top:8%;left:12%;
  width:32%;height:30%;
  background:radial-gradient(ellipse,rgba(255,255,255,.15),transparent 70%);
  border-radius:50%;
  filter:blur(4px);
  z-index:2;pointer-events:none;
}
/* Atmospheric rim */
.port-rim-glow{
  position:absolute;inset:0;border-radius:50%;
  z-index:3;pointer-events:none;
}
/* Cross bracket detail */
.port-bracket{
  position:absolute;
  background:rgba(232,196,106,.15);
  pointer-events:none;z-index:4;
}
/* Rivets */
.port-rivet{
  position:absolute;
  width:7px;height:7px;
  border-radius:50%;
  background:radial-gradient(circle at 33% 28%,rgba(232,196,106,.65),rgba(100,70,20,.5));
  border:1px solid rgba(232,196,106,.18);
  box-shadow:0 0 5px rgba(232,196,106,.25);
  z-index:5;
}

/* ─── STATUS / DATA PANELS ─── */
.data-panel{
  position:absolute;
  background:rgba(1,2,10,.85);
  border:1px solid rgba(74,240,255,.1);
  border-radius:8px;
  overflow:hidden;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  padding:10px 12px;
  z-index:6;
}
.data-panel::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent,
    rgba(74,240,255,.5),
    rgba(200,106,255,.3),
    transparent
  );
}
.data-panel::after{
  content:'';position:absolute;
  bottom:0;left:20%;right:20%;height:1px;
  background:rgba(74,240,255,.06);
}
.dp-id{
  font-family:var(--font-mono);
  font-size:6px;letter-spacing:3.5px;
  color:rgba(74,240,255,.35);
  text-transform:uppercase;
  margin-bottom:8px;
}
.dp-metric{
  display:flex;align-items:center;
  gap:6px;margin-bottom:4px;
}
.dp-led{
  width:4px;height:4px;border-radius:50%;
  flex-shrink:0;
  animation:ledBlink 2.5s ease-in-out infinite;
}
@keyframes ledBlink{
  0%,86%,100%{opacity:1;}
  93%{opacity:.05;}
}
.dp-bar-track{
  flex:1;height:2px;
  background:rgba(255,255,255,.04);
  border-radius:2px;overflow:hidden;
}
.dp-bar-fill{
  height:100%;border-radius:2px;
  animation:barPulse 4s ease-in-out infinite;
  transform-origin:left;
}
@keyframes barPulse{
  0%,100%{opacity:.35;transform:scaleX(.55);}
  50%{opacity:1;transform:scaleX(1);}
}
.dp-num{
  font-family:var(--font-mono);
  font-size:6px;color:rgba(255,255,255,.2);
  flex-shrink:0;letter-spacing:.3px;
}
/* Waveform inside panel */
.dp-wave{
  margin-top:6px;height:16px;
  position:relative;overflow:hidden;
}
.dp-wave canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
}

/* ─── DESTINATION DOOR ─── */
.dest-door{
  position:absolute;bottom:0;
  z-index:10;
  display:flex;flex-direction:column;
  align-items:center;
  cursor:none;
}

/* Arch */
.door-arch{
  position:relative;overflow:hidden;
  border:1px solid rgba(200,106,255,.2);
  border-bottom:none;
  border-radius:9999px 9999px 0 0;
  background:linear-gradient(180deg,
    rgba(200,106,255,.08) 0%,
    transparent 100%
  );
}
.door-arch::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(232,196,106,.12) 0%,
    transparent 60%
  );
  border-radius:inherit;
}
/* Arch glow when near */
.door-arch-glow{
  position:absolute;inset:0;
  border-radius:inherit;
  border:1px solid transparent;
  transition:border-color .5s,box-shadow .5s;
  pointer-events:none;
}
.dest-door.near .door-arch-glow{
  border-color:rgba(200,106,255,.5);
  box-shadow:
    0 0 30px rgba(200,106,255,.2),
    inset 0 0 40px rgba(200,106,255,.06);
}

/* Pillar pair */
.door-pillars{
  display:flex;align-items:stretch;
}
.door-pillar{
  width:12px;
  background:linear-gradient(90deg,
    rgba(200,106,255,.03),
    rgba(220,200,255,.08),
    rgba(200,106,255,.03)
  );
  border:1px solid rgba(200,106,255,.1);
  position:relative;overflow:hidden;
}
.door-pillar.pl{border-right:none;}
.door-pillar.pr{border-left:none;}
.door-pillar::after{
  content:'';
  position:absolute;top:0;bottom:0;
  left:50%;width:1px;
  background:linear-gradient(180deg,
    transparent,
    rgba(74,240,255,.15),
    transparent
  );
}

/* Door body */
.door-body{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,
    #010312 0%,
    #000206 100%
  );
  border-left:1px solid rgba(200,106,255,.08);
  border-right:1px solid rgba(200,106,255,.08);
  transition:border-color .4s;
}
.dest-door.near .door-body{
  border-color:rgba(200,106,255,.35);
}

/* Interior depth illusion */
.door-depth{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 70% at 50% 30%,
      rgba(200,106,255,.03),transparent
    ),
    linear-gradient(180deg,#000510,#000205);
  transition:opacity .4s;
}
.dest-door.near .door-depth{
  background:
    radial-gradient(ellipse 80% 70% at 50% 30%,
      rgba(200,106,255,.08),transparent
    ),
    linear-gradient(180deg,#020418,#000208);
}

/* Scanline */
.door-scan{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,
    transparent,
    rgba(74,240,255,.6),
    transparent
  );
  opacity:0;
  animation:doorSweep 3s linear infinite;
  transition:opacity .4s;
  filter:blur(0.5px);
}
@keyframes doorSweep{
  0%{top:-2px;}100%{top:100%;}
}
.dest-door.near .door-scan{opacity:1;}

/* Floating particles */
.door-mote{
  position:absolute;
  width:2px;height:2px;border-radius:50%;
  opacity:0;
  animation:moteDrift var(--md) ease-in-out infinite;
  animation-delay:var(--mdel);
}
@keyframes moteDrift{
  0%{opacity:0;transform:translateY(0) scale(1);}
  15%{opacity:.8;}
  100%{opacity:0;transform:translateY(-70px) scale(0);}
}
.dest-door.near .door-mote{opacity:var(--mo);}

/* Door interior content */
.door-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;gap:10px;padding:20px 8px;
  text-align:center;
}
.door-icon{
  font-size:32px;line-height:1;
  opacity:.25;
  filter:grayscale(1) blur(.5px);
  transition:opacity .4s,filter .4s,transform .5s cubic-bezier(.22,1,.36,1);
}
.dest-door.near .door-icon{
  opacity:1;
  filter:grayscale(0) blur(0) drop-shadow(0 0 24px rgba(200,106,255,.9));
  transform:scale(1.12) translateY(-4px);
}
.door-label{
  font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.15);
  transition:color .35s;
}
.dest-door.near .door-label{color:rgba(255,255,255,.9);}
.door-sublabel{
  font-family:var(--font-mono);
  font-size:8px;letter-spacing:.5px;
  color:rgba(200,106,255,.0);
  transition:color .4s;
}
.dest-door.near .door-sublabel{color:rgba(200,106,255,.5);}

/* Keypad */
.door-keypad{
  position:absolute;right:-20px;top:22%;
  width:14px;
  background:rgba(1,2,10,.95);
  border:1px solid rgba(232,196,106,.18);
  border-radius:4px;
  padding:8px 3px;
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
}
.kp-gem{
  width:5px;height:5px;
  border-radius:1px;rotate:45deg;
  animation:kpGem 2.2s ease-in-out infinite;
}
@keyframes kpGem{
  0%,100%{opacity:1;box-shadow:0 0 6px currentColor;}
  50%{opacity:.15;box-shadow:none;}
}

/* Threshold bar */
.door-threshold{
  width:calc(100% + 22px);
  height:2px;
  background:linear-gradient(90deg,
    transparent,
    rgba(200,106,255,.15) 15%,
    rgba(232,196,106,.6) 50%,
    rgba(200,106,255,.15) 85%,
    transparent
  );
  opacity:.2;
  transition:opacity .4s,box-shadow .4s;
}
.dest-door.near .door-threshold{
  opacity:1;
  box-shadow:
    0 0 16px rgba(232,196,106,.35),
    0 -2px 24px rgba(200,106,255,.2);
}

/* Room number */
.door-plate{
  position:absolute;
  bottom:28px;left:50%;transform:translateX(-50%);
  background:rgba(1,2,10,.92);
  border:1px solid rgba(232,196,106,.2);
  border-radius:3px;
  padding:3px 8px;
  font-family:var(--font-mono);
  font-size:7px;color:rgba(232,196,106,.45);
  letter-spacing:2.5px;white-space:nowrap;
}

/* ─── FLOOR ─── */
#floor{
  height:calc(var(--floor-h) + var(--sab));
  padding-bottom:var(--sab);
  flex-shrink:0;
  position:relative;overflow:hidden;
}
#floor-base{
  position:absolute;inset:0;
  background:linear-gradient(0deg,#000105 0%,#020618 100%);
  z-index:0;
}

/* Perspective tile grid */
#floor-grid{
  position:absolute;inset:0;z-index:1;
  overflow:hidden;
}
#floor-grid canvas{
  position:absolute;bottom:0;
  width:100%;
}

/* Specular reflection band */
#floor-reflect{
  position:absolute;top:0;left:10%;right:10%;
  height:60%;z-index:2;
  background:linear-gradient(180deg,
    rgba(74,240,255,.06) 0%,
    transparent 100%
  );
  filter:blur(8px);
  pointer-events:none;
}
/* Floor top edge */
#floor-edge{
  position:absolute;top:0;left:0;right:0;
  height:2px;z-index:3;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(74,240,255,.8) 25%,
    var(--gold) 50%,
    rgba(74,240,255,.8) 75%,
    transparent 100%
  );
  box-shadow:
    0 0 20px rgba(74,240,255,.5),
    0 2px 40px rgba(74,240,255,.2);
}

/* ═══════════════════════════════════════
   CHARACTER
═══════════════════════════════════════ */
#player-wrap{
  position:absolute;bottom:0;z-index:20;
  transform:translateX(-50%);
  filter:
    drop-shadow(0 0 16px rgba(74,240,255,.15))
    drop-shadow(0 20px 20px rgba(0,0,0,.8));
  will-change:left;
}
#player-wrap.face-left #crew-svg{transform:scaleX(-1);}
#crew-svg{
  width:72px;height:198px;
  overflow:visible;display:block;margin:0 auto;
  animation:crewFloat 4s ease-in-out infinite;
  transform-origin:center bottom;
}
@keyframes crewFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}
.walking #crew-svg{
  animation:crewBob .35s ease-in-out infinite alternate;
}
@keyframes crewBob{
  from{transform:translateY(0) rotate(-.3deg);}
  to{transform:translateY(-4px) rotate(.3deg);}
}

/* Walk anim */
.walking #arm-l{animation:wAL .35s ease-in-out infinite alternate;transform-origin:22px 78px;}
.walking #arm-r{animation:wAR .35s ease-in-out infinite alternate;transform-origin:66px 78px;}
.walking #leg-l{animation:wLL .35s ease-in-out infinite alternate;transform-origin:34px 134px;}
.walking #leg-r{animation:wLR .35s ease-in-out infinite alternate;transform-origin:54px 134px;}
@keyframes wAL{from{transform:rotate(-20deg);}to{transform:rotate(24deg);}}
@keyframes wAR{from{transform:rotate(20deg);}to{transform:rotate(-24deg);}}
@keyframes wLL{from{transform:rotate(-22deg);}to{transform:rotate(20deg);}}
@keyframes wLR{from{transform:rotate(22deg);}to{transform:rotate(-20deg);}}

/* Character anim keyframes */
@keyframes badgePulse{0%,100%{opacity:.55;}50%{opacity:1;}}
@keyframes visorFlicker{0%,100%{opacity:.2;}50%{opacity:.9;}88%{opacity:.4;}92%{opacity:.95;}}
@keyframes tabletPulse{0%,100%{opacity:.3;}50%{opacity:.9;}}
@keyframes headSway{0%,100%{transform:rotate(0);}30%{transform:rotate(.7deg);}70%{transform:rotate(-.6deg);}}
@keyframes bootGlow{0%,100%{opacity:.5;}50%{opacity:1;}}
.badge-pulse{animation:badgePulse 2s ease-in-out infinite;}
.visor-flick{animation:visorFlicker 3.2s ease-in-out infinite;}
.tab-pulse{animation:tabletPulse 2.4s ease-in-out infinite;}
.rank-glow{animation:badgePulse 1.8s ease-in-out infinite;}
#head-g{animation:headSway 4.5s ease-in-out infinite;transform-origin:44px 36px;}
.boot-glow{animation:bootGlow 3s ease-in-out infinite;}

/* Shadow blob */
#crew-shadow{
  width:50px;height:10px;
  margin:-1px auto 0;
  background:radial-gradient(ellipse,rgba(74,240,255,.2),transparent 70%);
  animation:shadowBreath 4s ease-in-out infinite;
}
@keyframes shadowBreath{
  0%,100%{opacity:.5;transform:scaleX(1);}
  50%{opacity:1;transform:scaleX(1.1);}
}

/* ═══════════════════════════════════════
   HUD ELEMENTS
═══════════════════════════════════════ */

/* Location chip */
#hud-loc{
  position:fixed;
  top:calc(var(--sat) + 14px);
  left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  padding:8px 18px;
  background:rgba(1,2,12,.72);
  border:1px solid rgba(232,196,106,.12);
  border-radius:100px;
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  z-index:100;white-space:nowrap;
  box-shadow:
    0 0 40px rgba(232,196,106,.06),
    inset 0 1px 0 rgba(255,255,255,.05);
}
.hud-live{
  width:5px;height:5px;border-radius:50%;
  background:var(--ion);
  box-shadow:0 0 8px var(--ion);
  animation:livePulse 1.8s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.15;}}
.hud-diamond{
  width:6px;height:6px;
  background:var(--gold);
  rotate:45deg;border-radius:1px;
  box-shadow:0 0 8px var(--gold);
  flex-shrink:0;
}
.hud-zone{
  font-size:9.5px;font-weight:600;
  letter-spacing:3.5px;text-transform:uppercase;
  color:rgba(232,196,106,.5);
}
.hud-divider{
  width:1px;height:12px;
  background:rgba(255,255,255,.07);
}
.hud-coord{
  font-family:var(--font-mono);
  font-size:8px;color:rgba(200,106,255,.4);
  letter-spacing:1.5px;
}

/* Bottom info HUD */
#hud-bottom{
  position:fixed;
  bottom:calc(var(--sab) + 16px);
  left:20px;right:20px;
  display:flex;justify-content:space-between;
  align-items:flex-end;
  z-index:100;pointer-events:none;
}
#nav-hint{
  font-family:var(--font-mono);
  font-size:7.5px;letter-spacing:2.5px;
  color:rgba(255,255,255,.12);
  text-transform:uppercase;
}
/* Mini minimap */
#minimap{
  width:80px;height:14px;
  background:rgba(1,2,10,.7);
  border:1px solid rgba(74,240,255,.08);
  border-radius:3px;
  position:relative;overflow:hidden;
}
#minimap-player{
  position:absolute;top:3px;
  width:3px;height:8px;
  background:var(--ion);
  border-radius:1px;
  box-shadow:0 0 6px var(--ion);
  transition:left .1s linear;
}
#minimap-door{
  position:absolute;top:4px;right:8px;
  width:2px;height:6px;
  background:var(--plasma);
  border-radius:1px;
  box-shadow:0 0 5px var(--plasma);
}

/* ─── DOOR REVEAL CARD ─── */
#door-card{
  position:fixed;
  bottom:calc(var(--sab) + 56px);
  left:50%;
  transform:translateX(-50%) translateY(30px);
  width:min(300px,86vw);
  background:rgba(3,2,18,.88);
  border:1px solid rgba(232,196,106,.12);
  border-radius:20px;
  padding:16px 18px;
  display:flex;align-items:center;gap:14px;
  backdrop-filter:blur(36px);
  -webkit-backdrop-filter:blur(36px);
  opacity:0;pointer-events:none;
  z-index:101;
  transition:opacity .35s,transform .5s cubic-bezier(.22,1,.36,1);
  box-shadow:
    0 24px 64px rgba(0,0,0,.6),
    0 0 0 1px rgba(255,255,255,.03),
    inset 0 1px 0 rgba(255,255,255,.06);
}
#door-card::before{
  content:'';position:absolute;
  top:0;left:25%;right:25%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,196,106,.4),transparent);
}
#door-card.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
}
.dc-icon-wrap{
  width:44px;height:44px;flex-shrink:0;
  border-radius:12px;
  background:rgba(200,106,255,.1);
  border:1px solid rgba(200,106,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 0 20px rgba(200,106,255,.1);
}
.dc-title{
  font-size:13px;font-weight:700;
  color:rgba(255,255,255,.88);
}
.dc-sub{
  font-family:var(--font-mono);
  font-size:8.5px;color:rgba(200,106,255,.4);
  margin-top:3px;letter-spacing:.5px;
}
.dc-cta{
  margin-left:auto;flex-shrink:0;
  font-family:var(--font-mono);
  font-size:8px;letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(232,196,106,.4);white-space:nowrap;
}

/* ═══════════════════════════════════════
   VFX
═══════════════════════════════════════ */

/* Tap ripple */
.tap-ring{
  position:fixed;pointer-events:none;z-index:50;
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  animation:tapExpand var(--td,.6s) cubic-bezier(.15,.7,.25,1) forwards;
}
@keyframes tapExpand{
  to{transform:translate(-50%,-50%) scale(1);opacity:0;}
}

/* Dust motes on tap */
.mote{
  position:fixed;pointer-events:none;z-index:49;
  width:3px;height:3px;border-radius:50%;
  animation:moteLife 3s ease-out forwards;
}
@keyframes moteLife{
  0%{opacity:.75;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--mx),var(--my)) scale(0);}
}

/* Warp flash */
#warp-veil{
  position:fixed;inset:0;z-index:9997;
  pointer-events:none;opacity:0;
  background:
    radial-gradient(ellipse at 50% 40%,
      rgba(200,106,255,.5) 0%,
      rgba(74,240,255,.3) 30%,
      rgba(0,4,8,1) 65%
    );
}

/* Speed lines during warp */
#speed-lines{
  position:fixed;inset:0;z-index:9998;
  pointer-events:none;opacity:0;
}

<script>
'use strict';

/* ══════════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════════ */
const WW = 5400;          // world width px
const COL_STEP = 420;     // columns every N px
const DOOR = {
  wx: 560,
  label: 'Stimulation Room',
  sub: 'Destination · P-Stella',

  icon: '℗',
  r: 200, g: 106, b: 255

const PORTHOLES = [

  {wx:1060, sz:92,  bg:['#063048','#021828','#0a3858','#2adaef'], atmo:'rgba(42,218,239,.28)', ring:'rgba(20,190,220,.4)'},
  {wx:1820, sz:124, bg:['#3a1006','#200804','#4a1808','#ff7a32'], atmo:'rgba(255,122,50,.28)',  ring:'rgba(220,80,20,.4)'},
  {wx:2440, sz:102, bg:['#023820','#011c10','#024428','#32d890'], atmo:'rgba(50,216,144,.22)',  ring:'rgba(20,185,110,.4)'},
  {wx:3120, sz:112, bg:['#3a0820','#200410','#480a28','#f46ab4'], atmo:'rgba(244,106,180,.26)', ring:'rgba(210,60,145,.4)'},
  {wx:3920, sz:94,  bg:['#0c1e58','#060e30','#102468','#5a9af8'], atmo:'rgba(90,154,248,.24)',  ring:'rgba(50,120,220,.4)'},
  {wx:4640, sz:108, bg:['#422008','#281205','#521a06','#fac030'], atmo:'rgba(250,192,48,.24)',   ring:'rgba(210,155,20,.4)'},
];

const DATA_PANELS_X = [300, 720, 1180, 1620, 2060, 2480, 2950, 3380, 3800, 4250, 4700];

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let px = 240, tgX = 240;    // player world X
let camX = 0, camV = 0;
let facing = 1, moving = false;
let warping = false;
let doorNear = false;
let raf = 0, lastT = 0;

const worldEl  = document.getElementById('world');
const stageEl  = document.getElementById('stage');
const playerEl = document.getElementById('player-wrap');
const cardEl   = document.getElementById('door-card');

/* ══════════════════════════════════════════════════════
   CUSTOM CURSOR
══════════════════════════════════════════════════════ */
const cursorEl = document.getElementById('cursor');
let cursorX = -100, cursorY = -100;
document.addEventListener('mousemove', e => {
  cursorX = e.clientX; cursorY = e.clientY;
  cursorEl.style.left = cursorX + 'px';
  cursorEl.style.top  = cursorY + 'px';
});
document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
document.addEventListener('mouseup',   () => cursorEl.classList.remove('clicking'));

/* ══════════════════════════════════════════════════════
   CANVAS STARFIELD
══════════════════════════════════════════════════════ */
const bgCanvas = document.getElementById('canvas-bg');
const bgCtx    = bgCanvas.getContext('2d');

const STARS = [];
function initStars() {
  STARS.length = 0;
  const W = window.innerWidth, H = window.innerHeight;
  bgCanvas.width = W; bgCanvas.height = H;
  for (let i = 0; i < 220; i++) {
    STARS.push({
      x: Math.random() * W,
      y: Math.random() * H * .72,
      r: Math.random() < .75 ? .6 : (Math.random() < .6 ? 1 : 1.4),
      a: .15 + Math.random() * .65,
      da: (.3 + Math.random() * .5) * (Math.random() < .5 ? 1 : -1),
      t: Math.random() * Math.PI * 2,
      speed: .004 + Math.random() * .008,
      hue: Math.random() < .9 ? 'fff' : (Math.random() < .5 ? 'b0e8ff' : 'ffd6a0'),
    });
  }
}

function drawStars(ts) {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.clearRect(0, 0, W, H);
  for (const s of STARS) {
    s.t += s.speed;
    const a = s.a + Math.sin(s.t) * .3;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `#${s.hue}`;
    bgCtx.globalAlpha = Math.max(0, Math.min(1, a));
    bgCtx.fill();
  }
  bgCtx.globalAlpha = 1;
}

/* ══════════════════════════════════════════════════════
   FLOOR PERSPECTIVE GRID
══════════════════════════════════════════════════════ */
const floorCanvas = document.getElementById('floor-canvas');
const floorCtx    = floorCanvas.getContext('2d');

function drawFloor() {
  const fw = stageEl.offsetWidth;
  const fh = document.getElementById('floor').offsetHeight;
  floorCanvas.width  = fw;
  floorCanvas.height = fh;
  floorCanvas.style.width  = fw + 'px';
  floorCanvas.style.height = fh + 'px';
  floorCanvas.style.position = 'absolute';
  floorCanvas.style.bottom = '0';

  floorCtx.clearRect(0, 0, fw, fh);

  const vx = fw / 2, vy = 0;  // vanishing point
  const COLS = 14;
  const ROWS = 9;

  // Horizontal lines — converging toward top
  for (let r = 0; r <= ROWS; r++) {
    const t = r / ROWS;
    const y = fh * t;
    // width of this row at this depth
    const lx = vx - (vx + fw * .6) * t;
    const rx = vx + (vx + fw * .6) * t;
    const a = .03 + t * .1;
    floorCtx.beginPath();
    floorCtx.moveTo(Math.max(0, lx), y);
    floorCtx.lineTo(Math.min(fw, rx), y);
    floorCtx.strokeStyle = r === 0
      ? `rgba(74,240,255,${a * 2})`
      : `rgba(74,240,255,${a})`;
    floorCtx.lineWidth = r === 0 ? 1.5 : .5;
    floorCtx.stroke();
  }

  // Vertical lines — radiating from vanishing point
  for (let c = 0; c <= COLS; c++) {
    const t = c / COLS;
    const bx = t * fw;
    const a = .025 + Math.abs(t - .5) * .04;
    floorCtx.beginPath();
    floorCtx.moveTo(vx, vy);
    floorCtx.lineTo(bx, fh);
    floorCtx.strokeStyle = `rgba(74,240,255,${a})`;
    floorCtx.lineWidth = .5;
    floorCtx.stroke();
  }

  // Central accent line
  floorCtx.beginPath();
  floorCtx.moveTo(vx, vy);
  floorCtx.lineTo(vx, fh);
  floorCtx.strokeStyle = 'rgba(232,196,106,.06)';
  floorCtx.lineWidth = 1;
  floorCtx.stroke();

  // Floor overlay gradient for depth fade
  const grad = floorCtx.createLinearGradient(0, 0, 0, fh);
  grad.addColorStop(0, 'rgba(2,6,24,.0)');
  grad.addColorStop(1, 'rgba(0,1,6,.7)');
  floorCtx.fillStyle = grad;
  floorCtx.fillRect(0, 0, fw, fh);
}

/* ══════════════════════════════════════════════════════
   CEILING SVG GRID
══════════════════════════════════════════════════════ */
function buildCeilGrid() {
  const ceilEl = document.getElementById('ceiling');
  const W = window.innerWidth;
  const H = ceilEl.offsetHeight;
  const svgEl = document.getElementById('ceil-svg');
  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svgEl.setAttribute('width', W);
  svgEl.setAttribute('height', H);

  let lines = '';
  const vx = W / 2, vy = H;  // vanishing point at bottom center
  const COLS = 18;
  for (let c = 0; c <= COLS; c++) {
    const tx = (c / COLS) * W;
    const a = 0.03 + Math.abs(c / COLS - .5) * .06;
    lines += `<line x1="${vx}" y1="${vy}" x2="${tx}" y2="0"
      stroke="rgba(200,106,255,${a})" stroke-width=".4"/>`;
  }
  // horizontal lines
  const ROWS = 6;
  for (let r = 0; r < ROWS; r++) {
    const t = r / ROWS;
    const y = t * H;
    const lx = vx - (W * .5) * t;
    const rx = vx + (W * .5) * t;
    const a = .03 + t * .08;
    lines += `<line x1="${lx}" y1="${y}" x2="${rx}" y2="${y}"
      stroke="rgba(200,106,255,${a})" stroke-width=".4"/>`;
  }
  svgEl.innerHTML = lines;
}

/* ══════════════════════════════════════════════════════
   BUILD PORTHOLE
══════════════════════════════════════════════════════ */
function buildPorthole(p, stageH) {
  const S = p.sz;
  const idx = PORTHOLES.indexOf(p);
  const btm = stageH * .28 + (idx % 2) * 24;

  const wrap = document.createElement('div');
  wrap.className = 'porthole';
  wrap.style.cssText = `left:${p.wx - S/2}px;bottom:${btm}px;width:${S}px;height:${S}px;`;

  // Porthole starfield
  let stars = '';
  for (let i = 0; i < 22; i++) {
    const sw = Math.random() < .65 ? .8 : 1.4;
    const sa = .3 + Math.random() * .6;
    const sd = 1.5 + Math.random() * 4;
    stars += `<div style="position:absolute;border-radius:50%;
      width:${sw}px;height:${sw}px;
      left:${(Math.random()*100).toFixed(1)}%;
      top:${(Math.random()*100).toFixed(1)}%;
      background:#fff;
      opacity:${sa};
      animation:gemFlicker ${sd.toFixed(1)}s ease-in-out infinite;
      animation-delay:${(Math.random()*5).toFixed(1)}s;"></div>`;
  }

  // Planet params
  const ps = Math.round(S * .35);
  const pr = 10, pb = 12;  // % from right/bottom edge

  // Ring params
  const rw = ps + 22, rh = Math.round(rw * .28);
  const rl = Math.round(S * .5 - rw * .48);
  const rb = Math.round(S * .12 + ps * .28);

  wrap.innerHTML = `
    <div class="port-inner" style="background:radial-gradient(ellipse at 38% 33%,${p.bg[0]} 0%,${p.bg[1]} 55%,${p.bg[2]} 100%);">
      <div style="position:absolute;inset:0;">${stars}</div>
      <!-- Planet -->
      <div class="p-planet" style="
        position:absolute;
        width:${ps}px;height:${ps}px;
        right:${pr}%;bottom:${pb}%;
        border-radius:50%;overflow:hidden;
        background:radial-gradient(circle at 32% 26%,${p.bg[3]} 0%,${p.bg[0]} 45%,${p.bg[2]} 100%);
      ">
        <div style="position:absolute;inset:0;border-radius:50%;background:linear-gradient(140deg,rgba(255,255,255,.13),transparent 55%);"></div>
        <div style="position:absolute;width:60%;height:18%;top:24%;left:8%;border-radius:100px;background:#fff;opacity:.12;transform:rotate(-6deg);"></div>
        <div style="position:absolute;width:45%;height:15%;top:55%;left:28%;border-radius:100px;background:#fff;opacity:.1;transform:rotate(4deg);"></div>
      </div>
      <!-- Atmosphere halo -->
      <div style="position:absolute;inset:0;border-radius:50%;
        background:radial-gradient(circle,transparent 48%,${p.atmo} 65%,transparent 78%);
        animation:nebulaShift 5s ease-in-out infinite alternate;"></div>
      <!-- Ring system -->
      <div style="position:absolute;bottom:${rb}px;left:${rl}px;width:${rw}px;height:${rh}px;pointer-events:none;">
        <div style="position:absolute;inset:0;border-radius:50%;border:2px solid ${p.ring};transform:rotateX(70deg);"></div>
      </div>
      <!-- Scan sweep -->
      <div class="port-sweep"></div>
      <!-- Glare -->
      <div class="port-glare"></div>
    </div>
    <div class="port-frame"></div>
    <div class="port-outer-ring"></div>
    <div class="port-outer-ring2"></div>
  `;

  // Rivets at 4 cardinal positions
  [45, 135, 225, 315].forEach(ang => {
    const rad = (ang * Math.PI) / 180;
    const rv = S / 2 + 2;
    const rx = Math.round(S/2 + rv * Math.cos(rad) - 3.5);
    const ry = Math.round(S/2 + rv * Math.sin(rad) - 3.5);
    const riv = document.createElement('div');
    riv.className = 'port-rivet';
    riv.style.cssText = `left:${rx}px;top:${ry}px;`;
    wrap.appendChild(riv);
  });

  return wrap;
}

/* ══════════════════════════════════════════════════════
   BUILD DATA PANEL
══════════════════════════════════════════════════════ */
function buildDataPanel(wx, idx, stageH) {
  const el = document.createElement('div');
  el.className = 'data-panel';
  el.style.cssText = `left:${wx - 52}px;bottom:${(stageH * .5).toFixed(0)}px;width:104px;`;

  const ledColors = [
    'rgba(74,240,255,1)',
    'rgba(200,106,255,1)',
    'rgba(232,196,106,1)',
  ];
  const fillColors = [
    'linear-gradient(90deg,rgba(74,240,255,.15),rgba(74,240,255,.9))',
    'linear-gradient(90deg,rgba(200,106,255,.15),rgba(200,106,255,.9))',
    'linear-gradient(90deg,rgba(232,196,106,.15),rgba(232,196,106,.9))',
  ];

  let html = `<div class="dp-id">SYS-${String(idx + 1).padStart(3, '0')}</div>`;

  for (let r = 0; r < 3; r++) {
    const val = (50 + Math.random() * 45).toFixed(1);
    const fill = (50 + Math.random() * 48).toFixed(0);
    html += `
      <div class="dp-metric">
        <div class="dp-led" style="background:${ledColors[r]};box-shadow:0 0 5px ${ledColors[r]};animation-delay:${r*.6 + idx*.1}s;"></div>
        <div class="dp-bar-track">
          <div class="dp-bar-fill" style="width:${fill}%;background:${fillColors[r]};animation-delay:${r*.45 + idx*.12}s;"></div>
        </div>
        <div class="dp-num">${val}%</div>
      </div>`;
  }

  el.innerHTML = html;
  return el;
}

/* ══════════════════════════════════════════════════════
   BUILD DOOR
══════════════════════════════════════════════════════ */
function buildDoor(d, stageH) {
  const dh = Math.round(stageH * .78);
  const dw = 112;
  const archH = 28;

  const wrap = document.createElement('div');
  wrap.className = 'dest-door';
  wrap.id = 'the-door';
  wrap.style.cssText = `left:${d.wx}px;transform:translateX(-50%);`;

  // Particle motes
  let motes = '';
  for (let i = 0; i < 10; i++) {
    const lp = (10 + Math.random() * 80).toFixed(1);
    const bt = (8 + Math.random() * 45).toFixed(1);
    const dur = (1.4 + Math.random() * 2).toFixed(1);
    const del = (Math.random() * 3).toFixed(1);
    const op = (.4 + Math.random() * .5).toFixed(2);
    motes += `<div class="door-mote" style="
      left:${lp}%;bottom:${bt}%;
      background:rgba(${d.r},${d.g},${d.b},.85);
      box-shadow:0 0 4px rgba(${d.r},${d.g},${d.b},.5);
      --md:${dur}s;--mdel:${del}s;--mo:${op};
    "></div>`;
  }

  wrap.innerHTML = `
    <div class="door-arch" style="width:${dw + 2}px;height:${archH}px;">
      <div class="door-arch-glow"></div>
    </div>
    <div class="door-pillars">
      <div class="door-pillar pl" style="height:${dh}px;"></div>
      <div class="door-body" style="width:${dw}px;height:${dh}px;">
        <div class="door-depth"></div>
        <div class="door-scan"></div>
        ${motes}
        <div class="door-content">
          <div class="door-icon" style="color:rgba(${d.r},${d.g},${d.b},1)">${d.icon}</div>
          <div class="door-label">${d.label}</div>
          <div class="door-sublabel">${d.sub}</div>
        </div>
        <div class="door-plate">A-07 · GATE 3</div>
        <div class="door-keypad">
          <div class="kp-gem" style="background:#ff5070;color:#ff5070;animation-delay:0s;"></div>
          <div class="kp-gem" style="background:#3ef0b4;color:#3ef0b4;animation-delay:.85s;"></div>
          <div class="kp-gem" style="background:var(--gold);color:var(--gold);animation-delay:1.7s;"></div>
        </div>
      </div>
      <div class="door-pillar pr" style="height:${dh}px;"></div>
    </div>
    <div class="door-threshold"></div>
  `;

  return wrap;
}

/* ══════════════════════════════════════════════════════
   BUILD WORLD
══════════════════════════════════════════════════════ */
function buildWorld() {
  worldEl.innerHTML = '';
  worldEl.style.width = WW + 'px';
  const sH = stageEl.offsetHeight;

  // Columns
  for (let cx = 160; cx < WW; cx += COL_STEP) {
    const col = document.createElement('div');
    col.className = 'col';
    col.style.cssText = `left:${cx}px;height:${sH}px;width:18px;`;
    const delay = ((cx / COL_STEP) * .4) % 4;
    col.innerHTML = `
      <div class="col-cap-t" style="--vdel:${delay}s;"></div>
      <div class="col-shaft">
        <div class="col-vein" style="--vd:${3 + (cx % 3) * .8}s;--vdel:${delay}s;"></div>
      </div>
      <div class="col-cap-b"></div>
    `;
    worldEl.appendChild(col);
  }

  // Portholes
  PORTHOLES.forEach(p => worldEl.appendChild(buildPorthole(p, sH)));

  // Data panels
  DATA_PANELS_X.forEach((x, i) => worldEl.appendChild(buildDataPanel(x, i, sH)));

  // Door
  worldEl.appendChild(buildDoor(DOOR, sH));
}

/* ══════════════════════════════════════════════════════
   CAMERA
══════════════════════════════════════════════════════ */
function updateCam() {
  const vw = window.innerWidth;
  const target = Math.max(0, Math.min(WW - vw, px - vw * .38));
  const spring = .1;
  const damp   = .75;
  camV += (target - camX) * spring;
  camV *= damp;
  camX += camV;
}

/* ══════════════════════════════════════════════════════
   MINIMAP
══════════════════════════════════════════════════════ */
function updateMinimap() {
  const t = (px - 0) / WW;
  const mapW = 80;
  const mmPlayer = document.getElementById('minimap-player');
  mmPlayer.style.left = Math.max(2, Math.min(mapW - 8, t * (mapW - 12))) + 'px';
}

/* ══════════════════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════════════════ */
function frame(ts) {
  raf = requestAnimationFrame(frame);
  const dt = Math.min((ts - lastT) / 1000, .05);
  lastT = ts;
  if (warping) return;

  // Player movement
  const dx   = tgX - px;
  const dist = Math.abs(dx);
  if (dist > 1.5) {
    const spd = Math.min(7 * (dt / .01667) * Math.min(1, dist / 60), dist - 1.5);
    px += Math.sign(dx) * spd;
    px = Math.max(80, Math.min(WW - 80, px));
    facing = Math.sign(dx);
    moving = true;
  } else {
    moving = false;
  }

  // Camera
  updateCam();

  // Render
  worldEl.style.transform = `translateX(${-camX}px)`;
  playerEl.style.left = (px - camX) + 'px';
  playerEl.classList.toggle('walking', moving);
  playerEl.classList.toggle('face-left', facing < 0);

  // Door proximity
  const doorDist = Math.abs(px - DOOR.wx);
  const doorEl   = document.getElementById('the-door');
  if (doorEl) doorEl.classList.toggle('near', doorDist < 165);

  const wasNear = doorNear;
  doorNear = doorDist < 145;
  if (doorNear !== wasNear) cardEl.classList.toggle('show', doorNear);

  // Warp trigger
  if (doorDist < 26 && !warping) triggerWarp();

  // HUD coord
  document.getElementById('hud-coord').textContent = `·${Math.floor(px + camX)}·`;

  // Minimap
  updateMinimap();

  // Stars
  drawStars(ts);
}

/* ══════════════════════════════════════════════════════
   WARP TRANSITION
══════════════════════════════════════════════════════ */
function triggerWarp() {
  warping = true;
  cardEl.classList.remove('show');

  const veil = document.getElementById('warp-veil');
  const lines = document.getElementById('speed-lines');
  const lCtx  = lines.getContext('2d');
  const W = window.innerWidth, H = window.innerHeight;
  lines.width = W; lines.height = H;

  // Speed line burst
  let lineAlpha = 0;
  const lineCount = 80;
  function drawSpeedLines(a) {
    lCtx.clearRect(0, 0, W, H);
    lCtx.globalAlpha = a;
    const cx = W / 2, cy = H / 2;
    for (let i = 0; i < lineCount; i++) {
      const ang = (i / lineCount) * Math.PI * 2;
      const len = 80 + Math.random() * 200;
      const r0 = 20 + Math.random() * 60;
      const hue = Math.random() < .5 ? '74,240,255' : '200,106,255';
      lCtx.beginPath();
      lCtx.moveTo(cx + Math.cos(ang) * r0, cy + Math.sin(ang) * r0);
      lCtx.lineTo(cx + Math.cos(ang) * (r0 + len), cy + Math.sin(ang) * (r0 + len));
      lCtx.strokeStyle = `rgba(${hue},${.3 + Math.random() * .5})`;
      lCtx.lineWidth = .5 + Math.random() * 1.5;
      lCtx.stroke();
    }
    lCtx.globalAlpha = 1;
  }

  // Animate
  let startT = null;
  const DURATION = 700;
  function warpAnim(ts) {
    if (!startT) startT = ts;
    const t = Math.min((ts - startT) / DURATION, 1);
    const eased = t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

    veil.style.opacity = eased < .7 ? (eased / .7) : 1;
    if (t < .6) {
      lines.style.opacity = t / .3;
      drawSpeedLines(Math.sin(t * Math.PI));
    } else {
      lines.style.opacity = 0;
    }

    if (t < 1) {
      requestAnimationFrame(warpAnim);
    } else {
      window.location.href = DOOR.url;
    }
  }
  requestAnimationFrame(warpAnim);
}

/* ══════════════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════════════ */
function spawnTapFX(cx, cy) {
  const COLORS = [
    ['rgba(74,240,255,.5)', 44, .6],
    ['rgba(200,106,255,.35)', 28, .45],
    ['rgba(232,196,106,.3)', 18, .5],
  ];

  COLORS.forEach(([color, size, dur]) => {
    const ring = document.createElement('div');
    ring.className = 'tap-ring';
    ring.style.cssText = `
      left:${cx}px;top:${cy}px;
      width:${size}px;height:${size}px;
      border:1px solid ${color};
      --td:${dur}s;
    `;
    document.body.appendChild(ring);
    setTimeout(() => ring.remove(), 700);
  });

  // Dust motes
  const dustColors = ['rgba(74,240,255,.7)','rgba(200,106,255,.7)','rgba(232,196,106,.7)','rgba(255,77,138,.6)'];
  for (let i = 0; i < 10; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    const ang = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 60;
    m.style.cssText = `
      left:${cx}px;top:${cy}px;
      background:${dustColors[i % dustColors.length]};
      --mx:${(Math.cos(ang) * dist).toFixed(1)}px;
      --my:${(Math.sin(ang) * dist - 20).toFixed(1)}px;
      animation-delay:${(Math.random() * .12).toFixed(2)}s;
      box-shadow:0 0 4px ${dustColors[i % dustColors.length]};
    `;
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 3200);
  }
}

function handleNav(cx, cy) {
  if (warping) return;
  const wx = cx + camX;
  tgX = Math.abs(wx - DOOR.wx) < 75
    ? DOOR.wx
    : Math.max(80, Math.min(WW - 80, wx));
  spawnTapFX(cx, cy);
  cursorEl.classList.add('clicking');
  setTimeout(() => cursorEl.classList.remove('clicking'), 180);
}

// Touch — prevent all defaults to kill scroll/zoom
document.addEventListener('touchstart',  e => { e.preventDefault(); handleNav(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, {passive: false});
document.addEventListener('touchmove',   e => e.preventDefault(), {passive: false});
document.addEventListener('touchend',    e => e.preventDefault(), {passive: false});
document.addEventListener('click',       e => handleNav(e.clientX, e.clientY));

// Keyboard
document.addEventListener('keydown', e => {
  const vw = window.innerWidth;
  if (['ArrowRight', 'd', 'D'].includes(e.key)) tgX = Math.min(WW - 80, tgX + 200);
  if (['ArrowLeft',  'a', 'A'].includes(e.key)) tgX = Math.max(80, tgX - 200);
});

/* ══════════════════════════════════════════════════════
   RESIZE
══════════════════════════════════════════════════════ */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    initStars();
    drawFloor();
    buildCeilGrid();
    buildWorld();
    playerEl.style.bottom = '0px';
    stageEl.appendChild(playerEl);
  }, 120);
});

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
function init() {
  initStars();
  drawFloor();
  buildCeilGrid();
  buildWorld();
  playerEl.style.bottom = '0px';
  stageEl.appendChild(playerEl);

  requestAnimationFrame(ts => {
    lastT = ts;
    requestAnimationFrame(frame);
  });
}

init();
</script>
</body>
</html>
