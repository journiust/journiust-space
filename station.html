<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PINKKLISH · Station</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   ROOT + RESET
══════════════════════════════════════ */
:root {
  --sab: env(safe-area-inset-bottom, 0px);
  --sat: env(safe-area-inset-top, 0px);
  --gold: #e8c87a;
  --gold2: #f5dfa0;
  --cream: #fdf6e3;
  --ink: #08060f;
  --deep: #060410;
  --void: #030209;
  --nebula1: #1a0533;
  --nebula2: #0d0a2a;
  --accent-a: #c47aff; /* violet */
  --accent-b: #7af0ff; /* cyan  */
  --accent-c: #ffb07a; /* amber */
  --floor-h: 26vh;
  --ceil-h: 20vh;
}
*{ margin:0;padding:0;box-sizing:border-box; }
html,body{
  width:100%;height:100dvh;overflow:hidden;
  background:var(--void);
  font-family:'Syne',sans-serif;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}

/* ══════════════════════════════════════
   LOADER
══════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:var(--void);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.35s ease;
}
#loader.show{opacity:1;pointer-events:all;}
.load-ring{
  width:58px;height:58px;border-radius:50%;
  border:2px solid rgba(232,200,122,.12);
  border-top-color:var(--gold);
  animation:spin 1.1s linear infinite;
  box-shadow:0 0 24px rgba(232,200,122,.25), inset 0 0 10px rgba(232,200,122,.05);
  margin-bottom:20px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.load-label{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:4px;
  color:rgba(232,200,122,.6);text-transform:uppercase;
}

/* ══════════════════════════════════════
   SCENE
══════════════════════════════════════ */
#scene{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── CEILING ── */
#ceiling{
  height:var(--ceil-h);flex-shrink:0;
  position:relative;overflow:hidden;
  background:linear-gradient(180deg, #020108 0%, #060318 50%, #0b0520 100%);
}
/* Ribbed vaulted ceiling pattern */
#ceiling::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,
      transparent 0px, transparent calc(8% - 1px),
      rgba(196,122,255,0.035) calc(8% - 1px), rgba(196,122,255,0.035) 8%
    );
}
#ceiling::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-a) 25%,var(--gold) 50%,var(--accent-a) 75%,transparent);
  opacity:.55;
  box-shadow:0 0 30px rgba(196,122,255,.4), 0 0 60px rgba(196,122,255,.15);
}
/* Luxury cornice ornaments */
.cornice-gem{
  position:absolute;bottom:4px;
  width:6px;height:6px;border-radius:1px;
  background:var(--gold);opacity:.25;
  transform:rotate(45deg);
  box-shadow:0 0 8px var(--gold);
}

/* ── WALLS (corridor) ── */
#walls{
  flex:1;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 120% 80% at 50% 50%, #0e052a 0%, #06031a 40%, var(--void) 100%);
}

/* Deep space nebula background */
#nebula-bg{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 30% 60%, rgba(196,122,255,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 70% 40%, rgba(122,240,255,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 20%, rgba(255,176,122,.03) 0%, transparent 60%);
}

/* Side vignettes */
#wall-left,#wall-right{
  position:absolute;top:0;bottom:0;width:42%;
  pointer-events:none;z-index:1;
}
#wall-left{
  left:0;
  background:linear-gradient(90deg, rgba(3,2,10,.95) 0%, rgba(8,5,25,.7) 50%, transparent 100%);
  clip-path:polygon(0 0,100% 28%,100% 72%,0 100%);
}
#wall-right{
  right:0;
  background:linear-gradient(270deg, rgba(3,2,10,.95) 0%, rgba(8,5,25,.7) 50%, transparent 100%);
  clip-path:polygon(0 28%,100% 0,100% 100%,0 72%);
}

/* Vanishing point glow */
#vp-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:55%;height:100%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at center,
    rgba(196,122,255,.08) 0%,
    rgba(100,60,200,.04) 35%,
    transparent 65%
  );
}

/* ── SCROLLING WORLD ── */
#world{
  position:absolute;top:0;bottom:0;left:0;
  width:6000px;
  display:flex;align-items:flex-end;
  will-change:transform;z-index:2;
}

/* ── COLUMN PILLARS (Art Deco) ── */
.arch-col{
  position:absolute;bottom:0;width:22px;
  z-index:3;
}
.col-shaft{
  width:100%;height:100%;
  background:
    linear-gradient(90deg,
      rgba(196,122,255,.04) 0%,
      rgba(220,180,255,.12) 30%,
      rgba(220,180,255,.12) 70%,
      rgba(196,122,255,.04) 100%
    );
  border-left:1px solid rgba(196,122,255,.12);
  border-right:1px solid rgba(196,122,255,.12);
}
.col-cap{
  position:absolute;left:50%;transform:translateX(-50%);
  width:40px;height:12px;
  background:linear-gradient(180deg,rgba(220,180,255,.08),transparent);
  border:1px solid rgba(196,122,255,.15);
}
.col-cap.top{top:0;border-radius:0 0 3px 3px;border-top:none;}
.col-cap.bot{bottom:0;border-radius:3px 3px 0 0;border-bottom:none;}
.col-glow-line{
  position:absolute;top:0;bottom:0;left:50%;
  width:1px;
  background:linear-gradient(180deg,transparent 0%,rgba(196,122,255,.35) 20%,rgba(122,240,255,.25) 50%,rgba(196,122,255,.35) 80%,transparent 100%);
}

/* ── PORTHOLE WINDOWS ── */
.porthole{
  position:absolute;border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(232,200,122,.22);
  box-shadow:
    0 0 0 1px rgba(232,200,122,.07),
    0 0 25px rgba(196,122,255,.12),
    inset 0 0 30px rgba(0,0,0,.8);
  z-index:4;
}
.porthole-frame{
  position:absolute;inset:-8px;border-radius:50%;
  border:2px solid rgba(232,200,122,.06);
  pointer-events:none;
}
.porthole-inner{
  width:100%;height:100%;
  background:radial-gradient(ellipse at 38% 32%, #070b2a 0%, #030518 55%, #010210 100%);
  position:relative;overflow:hidden;
}
/* Star field inside porthole */
.p-stars{
  position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 18% 22%,rgba(255,255,255,.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 43% 12%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 67% 38%,rgba(255,255,255,.95) 0%,transparent 100%),
    radial-gradient(1px 1px at 83% 18%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 27% 58%,rgba(255,255,255,.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 58% 72%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 92% 52%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 12% 82%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 77% 88%,rgba(255,255,255,.85) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 92%,rgba(255,255,255,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 52% 45%,rgba(200,180,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 71% 61%,rgba(180,220,255,.6) 0%,transparent 100%);
}
.p-planet{
  position:absolute;border-radius:50%;
}
.p-ring{
  position:absolute;border-radius:50%;
  border:2px solid rgba(255,200,100,.2);
  transform:rotateX(70deg);
}
.p-glare{
  position:absolute;top:8%;left:10%;width:28%;height:35%;
  background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 65%);
  border-radius:50%;transform:rotate(-28deg);
}
/* Porthole rivets */
.p-rivet{
  position:absolute;width:5px;height:5px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,rgba(232,200,122,.5),rgba(160,130,60,.3));
  border:1px solid rgba(232,200,122,.15);
}

/* ── STATUS DISPLAYS ── */
.stat-display{
  position:absolute;
  background:rgba(3,2,12,.9);
  border:1px solid rgba(196,122,255,.14);
  border-radius:12px;padding:12px 14px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(196,122,255,.04), inset 0 1px 0 rgba(255,255,255,.03);
}
.stat-display::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,122,255,.3),rgba(122,240,255,.2),transparent);
}
.stat-title{
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2.5px;
  color:rgba(196,122,255,.5);text-transform:uppercase;margin-bottom:8px;
}
.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.stat-dot{
  width:4px;height:4px;border-radius:50%;flex-shrink:0;
  animation:statBlink 2.4s ease-in-out infinite;
}
@keyframes statBlink{0%,88%,100%{opacity:1;}94%{opacity:.1;}}
.stat-track{flex:1;height:2px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;animation:fillPulse 3.2s ease-in-out infinite;transform-origin:left;}
@keyframes fillPulse{0%,100%{opacity:.45;transform:scaleX(.68);}50%{opacity:1;transform:scaleX(1);}}
.stat-val{
  font-family:'DM Mono',monospace;font-size:7px;
  color:rgba(255,255,255,.25);letter-spacing:.5px;
  flex-shrink:0;
}

/* ── LUXURY DOOR ── */
.door-wrap{
  position:absolute;bottom:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;cursor:pointer;
}
/* Door arch top */
.door-arch{
  width:130px;height:22px;
  background:linear-gradient(180deg,rgba(196,122,255,.1),transparent);
  border:1px solid rgba(196,122,255,.18);
  border-bottom:none;
  border-radius:60px 60px 0 0;
  position:relative;overflow:hidden;
}
.door-arch::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40%;height:100%;
  background:linear-gradient(180deg,rgba(232,200,122,.15),transparent);
}
/* Door column surrounds */
.door-columns{
  display:flex;align-items:stretch;
  position:relative;
}
.door-pillar{
  width:12px;
  background:linear-gradient(90deg,rgba(196,122,255,.04),rgba(220,190,255,.1),rgba(196,122,255,.04));
  border:1px solid rgba(196,122,255,.12);
  flex-shrink:0;
}
.door-pillar.left{border-right:none;}
.door-pillar.right{border-left:none;}
.door-body{
  width:108px;
  position:relative;overflow:hidden;
  background:#020111;
  border-left:1px solid rgba(196,122,255,.08);
  border-right:1px solid rgba(196,122,255,.08);
  transition:border-color .3s;
}

/* Door scan animation */
.door-scan{
  position:absolute;left:0;right:0;height:2px;top:0;
  background:linear-gradient(90deg,transparent,rgba(122,240,255,.5),transparent);
  animation:doorScan 3s linear infinite;opacity:0;
  transition:opacity .3s;
}
@keyframes doorScan{0%{top:0%;}100%{top:100%;}}
.door-wrap.near .door-scan{opacity:1;}
.door-wrap.near .door-body{
  border-color:rgba(var(--door-rgb),.5);
  box-shadow:0 0 30px rgba(var(--door-rgb),.1),inset 0 0 40px rgba(var(--door-rgb),.04);
}
.door-inner{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:24px 12px;text-align:center;
}
.door-glyph{
  font-size:32px;line-height:1;opacity:.4;
  transition:opacity .3s,filter .35s,transform .35s;
  filter:saturate(0);
}
.door-wrap.near .door-glyph{
  opacity:1;
  filter:saturate(1) drop-shadow(0 0 16px rgba(var(--door-rgb),1));
  transform:scale(1.12);
}
.door-name{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.2);letter-spacing:2px;text-transform:uppercase;
  transition:color .3s;
}
.door-wrap.near .door-name{color:rgba(255,255,255,.88);}
.door-sub{
  font-family:'DM Mono',monospace;font-size:9px;font-weight:300;
  color:transparent;letter-spacing:.5px;
  transition:color .3s;
}
.door-wrap.near .door-sub{color:rgba(var(--door-rgb),.6);}
/* Gold keypad panel */
.door-keypad{
  position:absolute;right:-16px;top:28%;
  width:10px;
  background:rgba(3,2,10,.92);
  border:1px solid rgba(232,200,122,.18);
  border-radius:4px;padding:6px 2px;
  display:flex;flex-direction:column;align-items:center;gap:6px;z-index:12;
  box-shadow:inset 0 1px 0 rgba(232,200,122,.06);
}
.kp-gem{
  width:5px;height:5px;border-radius:1px;transform:rotate(45deg);
  animation:kpBlink 2.2s ease-in-out infinite;
}
@keyframes kpBlink{0%,100%{opacity:1;}50%{opacity:.2;}}
/* Gilded threshold line */
.door-threshold{
  width:calc(100% + 24px);height:3px;
  background:linear-gradient(90deg,
    transparent,
    rgba(var(--door-rgb),.1) 10%,
    rgba(232,200,122,.4) 50%,
    rgba(var(--door-rgb),.1) 90%,
    transparent
  );
  transition:opacity .3s;opacity:.3;
}
.door-wrap.near .door-threshold{opacity:1;}

/* ── FLOOR ── */
#floor{
  height:var(--floor-h);flex-shrink:0;position:relative;overflow:hidden;
  background:linear-gradient(0deg,#010108 0%,#04091c 100%);
}
/* Herringbone marble grid */
#floor::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(122,240,255,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(122,240,255,.05) 1px,transparent 1px);
  background-size:72px 36px;
}
/* Floor glow line */
#floor::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent,
    var(--accent-b) 20%,
    var(--gold) 50%,
    var(--accent-b) 80%,
    transparent
  );
  opacity:.45;
  box-shadow:0 0 20px rgba(122,240,255,.3),0 4px 40px rgba(122,240,255,.08);
}
#floor-sheen{
  position:absolute;top:0;left:0;right:0;height:55%;
  background:linear-gradient(180deg,rgba(122,240,255,.04) 0%,transparent 100%);
}
/* Floor diagonal accents */
.floor-accent{
  position:absolute;top:0;width:1px;height:70%;
  background:linear-gradient(180deg,rgba(196,122,255,.18),transparent);
  opacity:.5;
}

/* ══════════════════════════════════════
   PREMIUM CARTOON ROBOT — AURORA
══════════════════════════════════════ */
#player-wrap{
  position:absolute;bottom:0;z-index:20;
  transition:left .07s linear;transform:translateX(-50%);
}
/* face direction */
#player-wrap.face-left #aurora{transform:scaleX(-1);}

/* Shadow on ground */
#aurora-shadow{
  width:52px;height:9px;margin:0 auto;
  background:radial-gradient(ellipse,rgba(0,0,0,.55) 0%,transparent 68%);
  flex-shrink:0;
}

#aurora{
  width:64px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
  animation:auroraIdle 2.4s ease-in-out infinite;
}
@keyframes auroraIdle{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-4px);}
}
.player-walking #aurora{animation:auroraWalk .38s ease-in-out infinite alternate;}
@keyframes auroraWalk{from{transform:translateY(0);}to{transform:translateY(-2px);}}

/* ───── HEAD ───── */
.a-head{
  width:46px;height:50px;
  border-radius:50% 50% 44% 44% / 52% 52% 42% 42%;
  background:
    radial-gradient(circle at 38% 32%,#f0e6ff 0%,#c8b4f0 35%,#9b7edc 65%,#6644b0 100%);
  border:2px solid rgba(196,122,255,.55);
  position:relative;z-index:3;margin-bottom:-6px;
  box-shadow:
    0 6px 20px rgba(100,60,200,.35),
    0 0 0 1px rgba(255,255,255,.12),
    inset 0 -3px 8px rgba(60,0,120,.25),
    inset 0 2px 5px rgba(255,255,255,.25);
}
/* Metallic sheen on head */
.a-head::before{
  content:'';position:absolute;
  top:10%;left:14%;width:45%;height:35%;
  background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,transparent 60%);
  border-radius:50%;transform:rotate(-18deg);
}
/* Ear gems */
.a-ear{
  position:absolute;top:40%;
  width:11px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#7af0ff,#38a4cc);
  border:1.5px solid rgba(122,240,255,.5);
  box-shadow:0 0 8px rgba(122,240,255,.4);
}
.a-ear.left{left:-6px;}
.a-ear.right{right:-6px;}
.a-ear::after{
  content:'';position:absolute;top:20%;left:20%;width:40%;height:40%;
  border-radius:50%;background:rgba(255,255,255,.4);
}

/* ── VISOR / FACE ── */
.a-visor{
  position:absolute;
  top:42%;left:50%;transform:translate(-50%,-48%);
  width:32px;height:26px;
  border-radius:50% 50% 44% 44% / 50% 50% 40% 40%;
  background:
    radial-gradient(circle at 36% 30%,
      rgba(40,200,255,.92) 0%,
      rgba(20,100,200,.88) 40%,
      rgba(8,40,120,.92) 75%,
      rgba(4,16,60,.95) 100%
    );
  border:1.5px solid rgba(122,240,255,.7);
  box-shadow:
    0 0 12px rgba(122,240,255,.3),
    inset 0 0 10px rgba(0,0,0,.4),
    inset 0 1px 3px rgba(255,255,255,.1);
  overflow:hidden;
}
/* Visor inner glare */
.a-visor::before{
  content:'';position:absolute;
  top:12%;left:10%;width:38%;height:32%;
  background:linear-gradient(135deg,rgba(255,255,255,.35) 0%,transparent 60%);
  border-radius:50%;transform:rotate(-22deg);
}
/* Visor scan line */
.a-visor::after{
  content:'';position:absolute;
  left:0;right:0;height:1.5px;top:30%;
  background:linear-gradient(90deg,transparent,rgba(122,240,255,.6),transparent);
  animation:visorScan 2.2s ease-in-out infinite;
}
@keyframes visorScan{
  0%,100%{top:15%;opacity:.4;}
  50%{top:75%;opacity:.8;}
}
/* Eyes */
.a-eyes{
  position:absolute;bottom:28%;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;
}
.a-eye{
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,.95);
  box-shadow:0 0 4px rgba(255,255,255,.5);
  position:relative;overflow:hidden;
}
.a-pupil{
  position:absolute;top:1.5px;left:1.5px;
  width:4px;height:4px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#1a0a40,#080314);
}
.a-pupil::after{
  content:'';position:absolute;top:0;left:0;
  width:2px;height:2px;border-radius:50%;
  background:rgba(255,255,255,.7);
}
/* Blush */
.a-blush{
  position:absolute;bottom:18%;
  width:8px;height:5px;border-radius:50%;
  background:rgba(255,130,180,.35);
  filter:blur(1.5px);
}
.a-blush.l{left:6%;}
.a-blush.r{right:6%;}

/* ── ANTENNA ── */
.a-antenna{
  position:absolute;top:-20px;right:31%;
  display:flex;flex-direction:column;align-items:center;
}
.a-ant-rod{
  width:2.5px;height:18px;
  background:linear-gradient(0deg,rgba(196,122,255,.8),rgba(220,190,255,.4));
  border-radius:2px;
}
.a-ant-orb{
  width:9px;height:9px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#e8c87a,#b8940a);
  box-shadow:0 0 8px rgba(232,200,122,.9),0 0 16px rgba(232,200,122,.4);
  margin-top:-3px;
  animation:orbPulse 1.8s ease-in-out infinite;
}
@keyframes orbPulse{
  0%,100%{box-shadow:0 0 6px rgba(232,200,122,.8);}
  50%{box-shadow:0 0 14px rgba(232,200,122,1),0 0 22px rgba(232,200,122,.5),0 0 30px rgba(232,200,122,.2);}
}

/* ── NECK ── */
.a-neck{
  width:18px;height:8px;
  background:linear-gradient(180deg,rgba(140,100,220,.6),rgba(100,70,180,.4));
  border-radius:3px;
  border:1px solid rgba(196,122,255,.2);
  position:relative;z-index:2;
}

/* ── BODY ── */
.a-torso-wrap{
  position:relative;width:100%;
  display:flex;flex-direction:column;align-items:center;
  z-index:2;
}
.a-body{
  width:44px;height:40px;
  border-radius:14px 14px 10px 10px;
  background:
    radial-gradient(circle at 35% 26%,#6650c8,#3d2e9c 50%,#1e1560 85%,#110d3a);
  border:1.5px solid rgba(150,120,255,.35);
  position:relative;
  box-shadow:
    0 8px 20px rgba(30,10,100,.5),
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 -2px 6px rgba(0,0,80,.4);
}
.a-body::before{
  content:'';position:absolute;
  top:6%;left:14%;width:42%;height:30%;
  background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 60%);
  border-radius:50%;transform:rotate(-15deg);
}
/* Chest core reactor */
.a-core{
  position:absolute;top:7px;left:50%;transform:translateX(-50%);
  width:20px;height:20px;
  background:rgba(3,2,15,.9);
  border:1px solid rgba(122,240,255,.25);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 8px rgba(0,0,0,.8);
}
.a-core-gem{
  width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#7af0ff,#1a9ecc 50%,#0a4a6a);
  box-shadow:0 0 8px rgba(122,240,255,.8),0 0 14px rgba(122,240,255,.4);
  animation:corePulse 2s ease-in-out infinite;
}
@keyframes corePulse{
  0%,100%{box-shadow:0 0 6px rgba(122,240,255,.7);}
  50%{box-shadow:0 0 12px rgba(122,240,255,1),0 0 20px rgba(122,240,255,.5);}
}
/* Body side details */
.a-body-stripe{
  position:absolute;bottom:8px;left:6px;right:6px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,122,255,.3),transparent);
}

/* ── SHOULDERS + ARMS ── */
.a-arms-row{
  position:absolute;top:4px;left:0;right:0;
  display:flex;justify-content:space-between;
  pointer-events:none;
}
.a-shoulder{
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 28%,#7a68d8,#3a2e9a 60%,#1e1860);
  border:1px solid rgba(150,120,255,.3);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
  flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:center;
}
.a-upper-arm{
  width:11px;height:20px;
  background:linear-gradient(180deg,#4a3aaa,#261e72);
  border-radius:6px;border:1px solid rgba(120,100,220,.25);
  transform-origin:top center;
}
.a-arm-cuff{
  width:12px;height:7px;
  background:linear-gradient(180deg,rgba(122,240,255,.2),rgba(80,200,220,.1));
  border:1px solid rgba(122,240,255,.3);
  border-radius:4px;margin:-1px auto 0;
}
.a-hand{
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 35% 28%,#c8b8f8,#8070d4);
  border:1px solid rgba(196,122,255,.4);
  margin:-2px auto 0;
  box-shadow:0 2px 6px rgba(100,60,200,.3);
}

/* Walk animations */
.player-walking .a-upper-arm.left  {animation:armL .36s ease-in-out infinite alternate;}
.player-walking .a-upper-arm.right {animation:armR .36s ease-in-out infinite alternate;}
@keyframes armL{from{transform:rotate(-10deg);}to{transform:rotate(20deg);}}
@keyframes armR{from{transform:rotate(10deg);}to{transform:rotate(-20deg);}}

/* ── LEGS ── */
.a-legs{
  display:flex;gap:7px;margin-top:-1px;z-index:1;
}
.a-leg-wrap{display:flex;flex-direction:column;align-items:center;}
.a-thigh{
  width:14px;height:18px;
  background:linear-gradient(180deg,#2e2480,#1a1550);
  border-radius:5px;border:1px solid rgba(100,80,200,.2);
  transform-origin:top center;
}
.a-knee{
  width:15px;height:7px;
  background:linear-gradient(180deg,rgba(196,122,255,.18),rgba(150,100,220,.1));
  border:1px solid rgba(196,122,255,.2);
  border-radius:4px;margin:-1px auto 0;
}
.a-boot{
  width:16px;height:12px;
  border-radius:5px 5px 7px 7px;
  background:radial-gradient(circle at 35% 28%,#241c60,#120e38);
  border:1px solid rgba(80,60,160,.25);
  margin:-1px auto 0;
  position:relative;
}
.a-boot::after{
  content:'';position:absolute;
  bottom:2px;left:2px;right:2px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(122,240,255,.25),transparent);
}
/* Boot sole glow */
.a-boot-glow{
  width:14px;height:3px;
  background:radial-gradient(ellipse,rgba(122,240,255,.25) 0%,transparent 70%);
  margin:-1px auto 0;
  animation:bootGlow 1.6s ease-in-out infinite;
}
@keyframes bootGlow{
  0%,100%{opacity:.4;}
  50%{opacity:1;}
}

.player-walking .a-thigh.left  {animation:legL .36s ease-in-out infinite alternate;}
.player-walking .a-thigh.right {animation:legR .36s ease-in-out infinite alternate;}
@keyframes legL{from{transform:rotate(-14deg);}to{transform:rotate(16deg);}}
@keyframes legR{from{transform:rotate(14deg);}to{transform:rotate(-16deg);}}

/* ══════════════════════════════════════
   HUD ELEMENTS
══════════════════════════════════════ */
#sector-chip{
  position:fixed;
  top:calc(var(--sat) + 14px);
  left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  padding:7px 18px;
  background:rgba(3,2,12,.65);
  border:1px solid rgba(232,200,122,.14);
  border-radius:100px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 4px 20px rgba(0,0,0,.4);
  z-index:100;
}
#sc-diamond{
  width:6px;height:6px;border-radius:1px;transform:rotate(45deg);
  background:var(--gold);
  box-shadow:0 0 8px rgba(232,200,122,.8);
  flex-shrink:0;

}
#sc-name{
  font-family:'Syne',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(232,200,122,.55);
}
#sc-coords{
  font-family:'DM Mono',monospace;font-size:8px;
  color:rgba(196,122,255,.35);letter-spacing:1.5px;
}

#door-card{
  position:fixed;
  bottom:calc(var(--sab) + 18px);
  left:50%;transform:translateX(-50%) translateY(16px);
  width:min(300px,86vw);
  background:rgba(4,2,14,.72);
  border:1px solid rgba(232,200,122,.12);
  border-radius:20px;
  padding:16px 18px;
  display:flex;align-items:center;gap:14px;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  box-shadow:
    0 24px 60px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.04),
    0 0 40px rgba(196,122,255,.04);
  opacity:0;pointer-events:none;z-index:100;
  transition:opacity .3s,transform .42s cubic-bezier(.22,1,.36,1);
}
#door-card.on{opacity:1;transform:translateX(-50%) translateY(0);}
/* Gold top border accent */
#door-card::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.5;
}
#dc-gem{
  width:42px;height:42px;flex-shrink:0;
  border-radius:12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(232,200,122,.14);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
#dc-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.88);}
#dc-sub{font-family:'DM Mono',monospace;font-size:10px;color:rgba(196,122,255,.45);margin-top:3px;letter-spacing:.5px;}
#dc-cta{
  margin-left:auto;flex-shrink:0;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:rgba(232,200,122,.4);white-space:nowrap;
}

/* Tap ripple */
.ripple{
  position:fixed;pointer-events:none;z-index:50;
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(232,200,122,.3);
  transform:translate(-50%,-50%) scale(0);
  animation:ripOut .5s ease-out forwards;
}
@keyframes ripOut{to{transform:translate(-50%,-50%) scale(3);opacity:0;}}

/* Star dust particles */
.stardust{
  position:fixed;pointer-events:none;z-index:1;
  width:3px;height:3px;border-radius:50%;
  background:rgba(255,255,255,.6);
  animation:dustFloat 4s ease-out forwards;
}
@keyframes dustFloat{
  0%{opacity:.6;transform:translate(0,0);}
  100%{opacity:0;transform:translate(var(--dx),var(--dy));}
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="load-ring"></div>

<!-- SCENE -->
<div id="scene">

    <div id="wall-left"></div>
    <div id="wall-right"></div>
    <div id="vp-glow"></div>
    <div id="world"></div>

    <!-- PLAYER: AURORA -->
    <div id="player-wrap">
      <div id="aurora">
        <!-- Antenna -->
        <div class="a-antenna">

              <div class="a-eye"><div class="a-pupil"></div></div>

        <!-- Torso -->
        <div class="a-torso-wrap">
          <div class="a-arms-row">
            <div style="display:flex;flex-direction:column;align-items:center;margin-left:1px">
              <div class="a-upper-arm left"></div>
              <div class="a-arm-cuff"></div>
              <div class="a-hand"></div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;margin-right:1px">
              <div class="a-upper-arm right"></div>
              <div class="a-arm-cuff"></div>
              <div class="a-hand"></div>
            </div>
          </div>
          <div class="a-body">
            <div class="a-core"><div class="a-core-gem"></div></div>
            <div class="a-body-stripe"></div>
          </div>

        <!-- Legs -->
        <div class="a-legs">
          <div class="a-leg-wrap">

</div>

<!-- HUD -->
<div id="sector-chip">
  <div id="sc-diamond"></div>
  <div id="sc-name">Stimulation Zone</div>
  <div id="sc-coords">7084</div>
</div>

<div id="door-card">
  <div id="dc-gem">℗</div>
  <div>
    <div id="dc-name">Stimulation Room</div>
    <div id="dc-sub">To P Stella Stn.</div>
  </div>
  <div id="dc-cta">Enter →</div>
</div>

<script>
'use strict';

const WORLD_W = 5200;
const DOOR = {
  wx: 580, label: 'Stimulation Room', desc: 'Destination · P-Stella',
  url: 'rocket.html', icon: '℗', r: 196, g: 122, b: 255
};

const COL_POS = [];
for (let x = 220; x < WORLD_W; x += 480) COL_POS.push(x);

const PORT_POS = [
  {wx:440,sz:110},{wx:1100,sz:90},{wx:1800,sz:120},
  {wx:2400,sz:100},{wx:3100,sz:110},{wx:3900,sz:90},{wx:4600,sz:105}
];

const STAT_POS = [350,760,1160,1620,2050,2480,2900,3350,3780,4200,4680];

const worldEl  = document.getElementById('world');
const wallsEl  = document.getElementById('walls');
const loaderEl = document.getElementById('loader');

let playerWx   = 260;
let playerTgWx = 260;
let facing     = 1;
let moving     = false;
let warping    = false;
let camX       = 0;
let camXVel    = 0;
let lastTime   = 0;
let doorNear   = false;

const wallsH = () => wallsEl.offsetHeight;
const VW     = () => window.innerWidth;

function buildWorld() {
  worldEl.innerHTML = '';
  worldEl.style.width = WORLD_W + 'px';

  // ── Architectural columns ──
  COL_POS.forEach(cx => {
    const el = document.createElement('div');
    el.className = 'arch-col';
    el.style.cssText = `left:${cx}px;height:100%;`;
    el.innerHTML = `
      <div class="col-cap top"></div>
      <div class="col-shaft"></div>
      <div class="col-cap bot"></div>
      <div class="col-glow-line"></div>
    `;
    worldEl.appendChild(el);
  });

  // ── Porthole windows ──
  const wH = wallsH();
  PORT_POS.forEach((pp, i) => {
    const S = pp.sz;
    const fromBottom = wH * 0.28 + (i % 2) * 18;
    const el = document.createElement('div');
    el.className = 'porthole';
    el.style.cssText = `left:${pp.wx - S/2}px;bottom:${fromBottom}px;width:${S}px;height:${S}px;`;
    // planet colors
    const palettes = [
      ['#7c3aed','#4c1d95','#2e1065'],
      ['#0e7490','#164e63','#083344'],
      ['#c2410c','#7c2d12','#431407'],
      ['#065f46','#064e3b','#022c22'],
      ['#be185d','#831843','#500724'],
    ];
    const pal = palettes[i % palettes.length];
    const pSize = Math.round(S * 0.34 + i * 3);
    const ringW = pSize + 14;
    const ringH = Math.round(ringW * 0.28);
    const ringL = Math.round(S * 0.38 - ringW/2 + (i%3)*4);
    const ringB = Math.round(S * 0.12 + pSize*0.3);
    el.innerHTML = `
      <div class="porthole-inner">
        <div class="p-stars"></div>
        <div class="p-planet" style="
          width:${pSize}px;height:${pSize}px;
          right:${14+i%3*5}%;bottom:12%;
          background:radial-gradient(circle at 36% 28%,${pal[0]},${pal[1]} 50%,${pal[2]});
          box-shadow:0 0 18px ${pal[0]}44;
        ">
          <div style="position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent 50%)"></div>
        </div>
        <div class="p-ring" style="
          width:${ringW}px;height:${ringH}px;
          bottom:${ringB}px;left:${ringL}px;
          border-color:${pal[0]}55;
        "></div>
        <div class="p-glare"></div>
      </div>
      <div class="porthole-frame"></div>
    `;
    // Add rivets
    [0,90,180,270].forEach(angle => {
      const rad = angle * Math.PI / 180;
      const r   = S/2 - 2;
      const rx  = Math.round(S/2 + r * Math.cos(rad) - 2.5);
      const ry  = Math.round(S/2 + r * Math.sin(rad) - 2.5);
      const riv = document.createElement('div');
      riv.className = 'p-rivet';
      riv.style.cssText = `left:${rx}px;top:${ry}px;`;
      el.appendChild(riv);
    });
    worldEl.appendChild(el);
  });

  // ── Status displays ──
  STAT_POS.forEach((px, i) => {
    const el = document.createElement('div');
    el.className = 'stat-display';
    el.style.cssText = `left:${px-52}px;bottom:${wH*0.52}px;width:104px;`;
    const rows = [
      {lbl:'PWR',w:.82,c:'rgba(122,240,255,1)',d:'98.2%'},
      {lbl:'SIG',w:.61,c:'rgba(196,122,255,1)',d:'61.4%'},
      {lbl:'THR',w:.74,c:'rgba(232,200,122,1)',d:'74.1%'},
    ];
    let inner = `<div class="stat-title">UNIT-${String(i+1).padStart(2,'0')}</div>`;
    rows.forEach((row,ri) => {
      inner += `
        <div class="stat-row">
          <div class="stat-dot" style="background:${row.c};box-shadow:0 0 5px ${row.c};animation-delay:${ri*.55+i*.12}s"></div>
          <div class="stat-track"><div class="stat-fill" style="width:${row.w*100}%;background:${row.c};animation-delay:${ri*.4+i*.15}s"></div></div>
          <div class="stat-val">${row.d}</div>
        </div>`;
    });
    el.innerHTML = inner;
    worldEl.appendChild(el);
  });

  // ── The Door ──
  const doorH = Math.round(wH * 0.74);
  const el = document.createElement('div');
  el.className = 'door-wrap';
  el.id = 'door-0';
  el.style.cssText = `left:${DOOR.wx}px;transform:translateX(-50%)`;
  el.style.setProperty('--door-rgb', `${DOOR.r},${DOOR.g},${DOOR.b}`);
  el.innerHTML = `
    <div class="door-arch"></div>
    <div class="door-columns">
      <div class="door-pillar left"></div>
      <div class="door-body" style="height:${doorH}px">
        <div class="door-scan"></div>
        <div class="door-inner">
          <div class="door-glyph" style="color:rgba(${DOOR.r},${DOOR.g},${DOOR.b},1)">${DOOR.icon}</div>
          <div class="door-name">${DOOR.label}</div>
          <div class="door-sub">${DOOR.desc}</div>
        </div>
        <div class="door-keypad">
          <div class="kp-gem" style="background:#ff6b6b;box-shadow:0 0 5px #ff6b6b44;animation-delay:0s"></div>
          <div class="kp-gem" style="background:#6bffb4;box-shadow:0 0 5px #6bffb444;animation-delay:.75s"></div>
          <div class="kp-gem" style="background:var(--gold);box-shadow:0 0 6px rgba(232,200,122,.7);animation-delay:1.5s"></div>
        </div>
      </div>
      <div class="door-pillar right"></div>
    </div>
    <div class="door-threshold"></div>
  `;
  worldEl.appendChild(el);

  // ── Ceiling cornice gems ──
  const ceilEl = document.getElementById('ceiling');
  if (!ceilEl) return;
  ceilEl.querySelectorAll('.cornice-gem').forEach(g => g.remove());
  for (let gx = 0; gx < WORLD_W; gx += 130) {
    const gem = document.createElement('div');
    gem.className = 'cornice-gem';
    gem.style.left = (gx - camX) + 'px';
    gem.dataset.wx = gx;
    ceilEl.appendChild(gem);
  }
}

function updateCamera() {
  const targetCamX = Math.max(0, Math.min(WORLD_W - VW(), playerWx - VW() * 0.38));
  camXVel += (targetCamX - camX) * 0.11;
  camXVel *= 0.72;
  camX    += camXVel;
}

function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (warping) return;

  const dx   = playerTgWx - playerWx;
  const dist = Math.abs(dx);
  if (dist > 2) {
    playerWx += Math.sign(dx) * Math.min(6.5 * (dt / 0.01667) * Math.min(1, dist / 80), dist - 2);
    playerWx  = Math.max(80, Math.min(WORLD_W - 80, playerWx));
    facing    = Math.sign(dx);
    moving    = true;
  } else {
    moving     = false;
    playerTgWx = playerWx;
  }

  updateCamera();
  worldEl.style.transform = `translateX(${-camX}px)`;

  const pw = document.getElementById('player-wrap');
  pw.style.left = (playerWx - camX) + 'px';
  if (moving) {
    pw.classList.add('player-walking');
    pw.classList.toggle('face-left', facing < 0);
  } else {
    pw.classList.remove('player-walking');
  }

  // Door proximity
  const dd    = Math.abs(playerWx - DOOR.wx);
  const dEl   = document.getElementById('door-0');
  if (dEl) dEl.classList.toggle('near', dd < 160);

  const wasNear = doorNear;
  doorNear = dd < 140;
  if (doorNear !== wasNear) {
    document.getElementById('door-card').classList.toggle('on', doorNear);
  }

  // Auto-enter
  if (dd < 28 && !warping) {
    warping = true;
    document.getElementById('door-card').classList.remove('on');
    const fade = document.createElement('div');
    fade.style.cssText = 'position:fixed;inset:0;background:#000;opacity:0;z-index:9999;transition:opacity 0.6s ease;pointer-events:none;';
    document.body.appendChild(fade);
    requestAnimationFrame(() => { fade.style.opacity = '1'; });
    setTimeout(() => { window.location.href = DOOR.url; }, 700);
  }

  // Cornice gems parallax
  document.querySelectorAll('.cornice-gem').forEach(gem => {
    const wx = parseInt(gem.dataset.wx);
    const sx = wx - camX;
    gem.style.left = (sx) + 'px';
    gem.style.display = (sx < -20 || sx > VW() + 20) ? 'none' : '';
  });
}

function spawnDust(cx, cy) {
  for (let i = 0; i < 6; i++) {
    const d = document.createElement('div');
    d.className = 'stardust';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist2 = 30 + Math.random() * 50;
    d.style.setProperty('--dx', `${Math.cos(angle)*dist2}px`);
    d.style.setProperty('--dy', `${Math.sin(angle)*dist2-20}px`);
    d.style.left = cx + 'px';
    d.style.top  = cy + 'px';
    d.style.background = ['rgba(232,200,122,.7)','rgba(196,122,255,.7)','rgba(122,240,255,.7)'][i%3];
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 4000);
  }
}

function handleTap(cx, cy) {
  if (warping) return;
  const worldTapX = cx + camX;
  // Snap to door if tapping near it in world space
  if (Math.abs(worldTapX - DOOR.wx) < 80) {
    playerTgWx = DOOR.wx;
  } else {
    playerTgWx = Math.max(80, Math.min(WORLD_W - 80, worldTapX));
  }
  // Ripple
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = cx + 'px';
  r.style.top  = cy + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 520);
  spawnDust(cx, cy);
}

document.addEventListener('touchstart', e => {
  e.preventDefault();
  handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });
document.addEventListener('click', e => handleTap(e.clientX, e.clientY));
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

function init() {
  buildWorld();
  const pw = document.getElementById('player-wrap');
  pw.style.bottom = '0px';
  wallsEl.appendChild(pw);
  requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(frame); });
}

window.addEventListener('resize', () => buildWorld());
init();
</script>
</body>
</html>
