<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PINKKLISH · Launch Control</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
  --gold:#e8c46a;
  --gold2:#c49b3c;
  --ion:#4af0ff;
  --plasma:#c86aff;
  --ember:#ff7b30;
  --void:#000509;
  --font-ui:'Syne',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;height:100dvh;
  overflow:hidden;position:fixed;
  -webkit-text-size-adjust:100%;
}
body{
  font-family:var(--font-ui);
  background:var(--void);
  touch-action:none;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

/* ═══ CANVAS BG ═══ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ═══ SCENE ═══ */
#scene{
  position:fixed;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;
  padding:calc(var(--sat) + 16px) 20px calc(var(--sab) + 16px);
  gap:0;
}

/* ═══ HEADER / HERO ═══ */
#header{
  width:100%;text-align:center;
  flex-shrink:0;
  animation:fadeDown .8s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px);}to{opacity:1;transform:none;}}
@keyframes liveBlink{0%,100%{opacity:1;}50%{opacity:.15;}}

.hero-frame{
  display:inline-block;
  padding:14px 22px 12px;
  max-width:min(92vw,620px);
  width:min(92vw,620px);
  background:linear-gradient(135deg,rgba(212,175,55,.09),rgba(80,20,120,.09));
  border:2px solid rgba(212,175,55,.32);
  border-radius:16px;
  box-shadow:
    0 0 32px rgba(212,175,55,.22),
    0 0 80px rgba(212,175,55,.08),
    inset 0 0 22px rgba(212,175,55,.06);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  animation:heroGlow 3s ease-in-out infinite alternate;
}
@keyframes heroGlow{
  from{box-shadow:0 0 32px rgba(212,175,55,.22),0 0 80px rgba(212,175,55,.08),inset 0 0 22px rgba(212,175,55,.06);}
  to  {box-shadow:0 0 52px rgba(212,175,55,.42),0 0 120px rgba(212,175,55,.14),inset 0 0 32px rgba(212,175,55,.1);}
}
.hero-title{
  font-family:'Orbitron','Syne',sans-serif;
  font-size:clamp(0.7rem,4.2vw,2rem);
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.25;
  background:linear-gradient(135deg,#fff 0%,var(--gold) 48%,#fff 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:heroShimmer 4s ease-in-out infinite;
}
@keyframes heroShimmer{0%,100%{background-position:0% center;}50%{background-position:100% center;}}
.hero-sub{
  font-family:'Orbitron','Syne',sans-serif;
  font-size:clamp(.58rem,3vw,1.1rem);
  color:rgba(255,255,255,.82);
  margin-top:6px;letter-spacing:.5px;line-height:1.3;
}

/* ═══ MAIN STAGE ═══ */
#stage{
  flex:1;width:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;min-height:0;
}

/* ═══ ROCKET SVG WRAP ═══ */
#rocket-wrap{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;
  z-index:5;
  /* size is clamped by SVG viewBox + height */
  height:min(58dvh, 480px);
  animation:rocketFloat 5s ease-in-out infinite;
}
@keyframes rocketFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}
#rocket-svg{
  height:100%;
  width:auto;
  display:block;
  overflow:visible;
}

/* Exhaust plume container */
#plume-wrap{
  position:absolute;
  bottom:-22%;left:50%;
  transform:translateX(-50%);
  width:80px;
  pointer-events:none;
  z-index:4;
}
#plume-canvas{
  width:100%;
  display:block;
}

/* ═══ SKIN SELECTOR ═══ */
#skin-panel{
  position:absolute;right:0;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;
  align-items:center;gap:8px;
  padding:14px 8px;
  background:rgba(1,2,12,.8);
  border:1px solid rgba(232,196,106,.12);
  border-radius:40px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  z-index:10;
  animation:fadeLeft .8s .3s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeLeft{from{opacity:0;transform:translateY(-50%) translateX(20px);}to{opacity:1;transform:translateY(-50%);}}
.skin-label{
  font-family:var(--font-mono);
  font-size:5.5px;letter-spacing:3px;
  color:rgba(232,196,106,.35);text-transform:uppercase;
}
.skin-sep{width:50%;height:1px;background:rgba(232,196,106,.08);}
.swatch{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.1);
  cursor:pointer;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),border-color .2s,box-shadow .2s;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.swatch::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:1.5px solid transparent;transition:border-color .25s,box-shadow .25s;
}
.swatch:active{transform:scale(.88);}
.swatch.active{transform:scale(1.2);border-color:rgba(255,255,255,.6);}
.swatch.active::after{border-color:var(--gold);box-shadow:0 0 12px var(--gold);}

/* ═══ BOTTOM CONTROLS ═══ */
#controls{
  width:100%;flex-shrink:0;
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  animation:fadeUp .8s .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}

.status-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;
  background:rgba(1,2,12,.7);
  border:1px solid rgba(74,240,255,.1);
  border-radius:8px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--ion);box-shadow:0 0 8px var(--ion);
  animation:liveBlink 2s ease-in-out infinite;
}
.status-txt{
  font-family:var(--font-mono);
  font-size:8px;letter-spacing:2px;
  color:rgba(74,240,255,.55);text-transform:uppercase;
}

#launch-btn{
  position:relative;overflow:hidden;
  padding:14px 36px;
  font-family:var(--font-ui);
  font-size:12px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:#000;
  background:linear-gradient(135deg,#fff7a0,#e8c46a,#c49b3c);
  border:none;border-radius:12px;cursor:pointer;
  min-height:50px;min-width:200px;
  -webkit-appearance:none;appearance:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  box-shadow:
    0 8px 24px rgba(232,196,106,.35),
    0 0 0 1px rgba(232,196,106,.2),
    inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .15s,box-shadow .2s;
}
#launch-btn::before{
  content:'';position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:btnShine 3.5s ease-in-out infinite;
}
@keyframes btnShine{
  0%{left:-100%;}40%,100%{left:160%;}
}
#launch-btn:active{transform:scale(.97);box-shadow:0 4px 12px rgba(232,196,106,.2);}
@media(hover:hover){
  #launch-btn:hover{
    transform:translateY(-2px) scale(1.02);
    box-shadow:0 16px 40px rgba(232,196,106,.5),0 0 60px rgba(232,196,106,.2),inset 0 1px 0 rgba(255,255,255,.4);
  }
}

/* ═══ LIFTOFF STATE ═══ */
#rocket-wrap.liftoff{
  position:fixed;
  bottom:0;left:50%;
  transform:translateX(-50%);
  animation:rocketLaunch 4.5s cubic-bezier(.22,1,.36,1) forwards;
  z-index:100;
}
@keyframes rocketLaunch{
  0%{bottom:0;opacity:1;}
  80%{opacity:1;}
  100%{bottom:130dvh;opacity:0;}
}

/* ═══ MAP CONTAINER ═══ */
#map-wrap{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  height:100dvh;
  background:#0e1525;
  display:none;
  z-index:20;
  opacity:0;
  transition:opacity 1.5s ease;
  overflow:hidden;
}
#map-wrap.show{opacity:1;}
#map-wrap img{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.95);
  min-width:100%;min-height:100%;
  width:auto;height:auto;max-width:none;
  display:block;
  transition:transform 2s ease;
  filter:brightness(.9) contrast(1.1);
}
#map-wrap.show img{transform:translate(-50%,-50%) scale(1);}
.map-label{
  position:absolute;
  font-family:'Orbitron','Syne',sans-serif;
  font-size:clamp(11px,2.3vw,28px);
  color:#ffffffdd;
  font-weight:700;
  letter-spacing:2px;
  text-shadow:
    0 0 8px rgba(0,180,255,.8),
    0 0 15px rgba(0,180,255,.5),
    0 0 25px rgba(212,175,55,.3);
  user-select:none;pointer-events:none;
  animation:labelPulse 3s ease-in-out infinite alternate;
}
@keyframes labelPulse{0%{transform:translateY(0);}100%{transform:translateY(-5px);}}
.p-stella-btn{
  position:absolute;
  top:37%;left:64%;
  width:clamp(65px,6.5vw,95px);
  height:clamp(65px,6.5vw,95px);
  border-radius:50%;
  cursor:pointer;
  background:linear-gradient(to bottom,
    #ff0000 0%,#ff0000 20%,
    #ffffff 20%,#ffffff 40%,
    #0000ff 40%,#0000ff 60%,
    #ffffff 60%,#ffffff 80%,
    #ff0000 80%,#ff0000 100%
  );
  animation:stellaPulse 1.8s infinite;
  box-shadow:
    0 0 25px 10px rgba(0,180,255,.6),
    0 0 50px 20px rgba(212,175,55,.2);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.p-stella-btn::before{
  content:'';
  position:absolute;top:-10px;left:-10px;right:-10px;bottom:-10px;
  border-radius:50%;
  border:2px solid rgba(212,175,55,.3);
  animation:ringExpand 2s infinite;
}
@keyframes ringExpand{
  0%{transform:scale(1);opacity:1;}
  100%{transform:scale(1.3);opacity:0;}
}
@keyframes stellaPulse{
  0%{transform:scale(1);box-shadow:0 0 25px 10px rgba(0,180,255,.6),0 0 50px 20px rgba(212,175,55,.2);}
  50%{transform:scale(1.15);box-shadow:0 0 45px 20px rgba(0,180,255,.9),0 0 70px 30px rgba(212,175,55,.4);}
  100%{transform:scale(1);box-shadow:0 0 25px 10px rgba(0,180,255,.6),0 0 50px 20px rgba(212,175,55,.2);}
}

/* ═══ PASSWORD OVERLAY ═══ */
#pw-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,2,8,.94);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
  padding-bottom:calc(24px + var(--sab));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
#pw-overlay.show{display:flex;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.pw-card{
  width:100%;max-width:320px;
  background:rgba(1,4,20,.88);
  border:1px solid rgba(232,196,106,.16);
  border-radius:20px;
  padding:28px 24px;
  text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06);
  animation:slideUp .4s cubic-bezier(.22,1,.36,1);
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:none;opacity:1;}}
.pw-card::before{
  content:'';display:block;
  width:60%;margin:0 auto 20px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,196,106,.4),transparent);
}
.pw-title{
  font-size:12px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:18px;
}
#pw-input{
  width:100%;padding:13px;
  font-family:var(--font-mono);font-size:18px;
  text-align:center;letter-spacing:8px;
  background:rgba(0,2,12,.8);
  border:1px solid rgba(232,196,106,.2);
  border-radius:10px;color:#fff;
  -webkit-appearance:none;appearance:none;
  transition:border-color .3s,box-shadow .3s;
}
#pw-input:focus{
  outline:none;
  border-color:rgba(232,196,106,.6);
  box-shadow:0 0 20px rgba(232,196,106,.15);
}
.pw-btns{display:flex;gap:10px;margin-top:16px;}
.pw-btn{
  flex:1;padding:13px;
  font-family:var(--font-ui);font-size:11px;
  font-weight:700;letter-spacing:2px;text-transform:uppercase;
  border-radius:10px;cursor:pointer;border:none;
  -webkit-appearance:none;appearance:none;min-height:48px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:transform .15s,box-shadow .2s;
}
.pw-btn-go{
  background:linear-gradient(135deg,#fff7a0,#e8c46a);
  color:#000;
  box-shadow:0 6px 20px rgba(232,196,106,.3);
}
.pw-btn-go:active{transform:scale(.97);}
.pw-btn-cancel{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.45);
}
.pw-tip{
  margin-top:14px;font-family:var(--font-mono);
  font-size:9px;color:rgba(232,196,106,.35);letter-spacing:1px;
}

/* ═══ LOADER ═══ */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:var(--void);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
  transition:opacity .8s ease;pointer-events:none;
}
#loader.gone{opacity:0;}
.loader-ring{
  width:48px;height:48px;border-radius:50%;
  border:2px solid rgba(232,196,106,.12);
  border-top-color:var(--gold);
  animation:spin 1s linear infinite;
  box-shadow:0 0 24px rgba(232,196,106,.2);
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-txt{
  font-family:var(--font-mono);
  font-size:9px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(232,196,106,.4);
  animation:txtPulse 2s ease-in-out infinite;
}
@keyframes txtPulse{0%,100%{opacity:.4;}50%{opacity:1;}}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-txt">:P reparing</div>
</div>

<canvas id="bg-canvas"></canvas>

<div id="scene">

  <!-- Header -->
  <div id="header">
    <div class="hero-frame">
      <div class="hero-title">Pinkklish I Journiust I Whatever</div>
      <div class="hero-sub">(acr.) I'm exactly who you think I am :P</div>
    </div>
  </div>

  <!-- Stage -->
  <div id="stage">

    <!-- Rocket -->
    <div id="rocket-wrap">
      <svg id="rocket-svg" viewBox="0 0 200 540" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- ─ Body gradients ─ -->
          <linearGradient id="bodyMain" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#8a8ea0"/>
            <stop offset="12%"  stop-color="#c4c8d8"/>
            <stop offset="35%"  stop-color="#e8eaf2"/>
            <stop offset="50%"  stop-color="#f8faff"/>
            <stop offset="65%"  stop-color="#dde0ec"/>
            <stop offset="88%"  stop-color="#aeb2c2"/>
            <stop offset="100%" stop-color="#7a7e90"/>
          </linearGradient>
          <linearGradient id="bodyShadowL" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"  stop-color="rgba(0,0,0,.45)"/>
            <stop offset="30%" stop-color="rgba(0,0,0,.0)"/>
          </linearGradient>
          <linearGradient id="bodyShadowR" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="70%" stop-color="rgba(0,0,0,.0)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,.45)"/>
          </linearGradient>
          <linearGradient id="bodyReflect" x1="20%" y1="0%" x2="40%" y2="0%">
            <stop offset="0%"  stop-color="rgba(255,255,255,0)"/>
            <stop offset="50%" stop-color="rgba(255,255,255,.18)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>

          <!-- ─ Nose gradients ─ -->
          <linearGradient id="noseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#6a0010" id="nose-s0"/>
            <stop offset="15%"  stop-color="#b01828" id="nose-s1"/>
            <stop offset="38%"  stop-color="#d82035" id="nose-s2"/>
            <stop offset="50%"  stop-color="#e83045" id="nose-s3"/>
            <stop offset="62%"  stop-color="#c82030" id="nose-s4"/>
            <stop offset="85%"  stop-color="#8a1020" id="nose-s5"/>
            <stop offset="100%" stop-color="#580818" id="nose-s6"/>
          </linearGradient>
          <linearGradient id="noseHighlight" x1="20%" y1="0%" x2="45%" y2="0%">
            <stop offset="0%"  stop-color="rgba(255,180,180,0)"/>
            <stop offset="50%" stop-color="rgba(255,180,180,.22)"/>
            <stop offset="100%" stop-color="rgba(255,180,180,0)"/>
          </linearGradient>
          <linearGradient id="noseTip" x1="40%" y1="0%" x2="60%" y2="100%">
            <stop offset="0%"  stop-color="#fff0f0"/>
            <stop offset="100%" stop-color="#c82030"/>
          </linearGradient>

          <!-- ─ Accent band ─ -->
          <linearGradient id="bandRed" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#5a0010" id="band-s0"/>
            <stop offset="30%"  stop-color="#cc1828" id="band-s1"/>
            <stop offset="50%"  stop-color="#e82038" id="band-s2"/>
            <stop offset="70%"  stop-color="#cc1828" id="band-s3"/>
            <stop offset="100%" stop-color="#5a0010" id="band-s4"/>
          </linearGradient>

          <!-- ─ Fin gradients ─ -->
          <linearGradient id="finGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#3a0008" id="fin-s0"/>
            <stop offset="40%"  stop-color="#b01428" id="fin-s1"/>
            <stop offset="60%"  stop-color="#901020" id="fin-s2"/>
            <stop offset="100%" stop-color="#2a0006" id="fin-s3"/>
          </linearGradient>
          <linearGradient id="finSheen" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"  stop-color="rgba(255,200,200,0)"/>
            <stop offset="40%" stop-color="rgba(255,200,200,.12)"/>
            <stop offset="100%" stop-color="rgba(255,200,200,0)"/>
          </linearGradient>

          <!-- ─ Engine bell ─ -->
          <linearGradient id="bellGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#1a1a1a"/>
            <stop offset="15%"  stop-color="#4a4a4a"/>
            <stop offset="35%"  stop-color="#787878"/>
            <stop offset="50%"  stop-color="#909090"/>
            <stop offset="65%"  stop-color="#6a6a6a"/>
            <stop offset="85%"  stop-color="#3a3a3a"/>
            <stop offset="100%" stop-color="#141414"/>
          </linearGradient>
          <linearGradient id="bellHeat" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"  stop-color="rgba(255,80,0,0)"/>
            <stop offset="100%" stop-color="rgba(255,80,0,.35)"/>
          </linearGradient>
          <radialGradient id="bellThroat" cx="50%" cy="35%" r="50%">
            <stop offset="0%"  stop-color="rgba(255,140,0,.6)"/>
            <stop offset="60%" stop-color="rgba(200,40,0,.2)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>

          <!-- ─ Window ─ -->
          <radialGradient id="winGrad" cx="38%" cy="32%" r="65%">
            <stop offset="0%"  stop-color="#3060e0"/>
            <stop offset="40%" stop-color="#1030a0"/>
            <stop offset="100%" stop-color="#060820"/>
          </radialGradient>
          <radialGradient id="winReflect" cx="30%" cy="25%" r="55%">
            <stop offset="0%"  stop-color="rgba(255,255,255,.35)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>

          <!-- ─ Panel line mask ─ -->
          <clipPath id="bodyClip">
            <rect x="50" y="90" width="100" height="360" rx="2"/>
          </clipPath>
          <!-- Body silhouette for shapes -->
          <clipPath id="noseClip">

<script>
'use strict';

/* ══════════════════════════════════════════
   STARFIELD
══════════════════════════════════════════ */
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
let stars = [];

function initBg() {
  const W = window.innerWidth, H = window.innerHeight;
  bgCanvas.width = W; bgCanvas.height = H;
  stars = [];
  for (let i = 0; i < 240; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() < .7 ? .5 : (Math.random() < .6 ? 1 : 1.5),
      a: .1 + Math.random() * .7,
      t: Math.random() * Math.PI * 2,
      sp: .003 + Math.random() * .007,
    });
  }
}

function drawBg() {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.clearRect(0, 0, W, H);
  // Nebula glow
  const ng = bgCtx.createRadialGradient(W*.3, H*.4, 0, W*.3, H*.4, W*.5);
  ng.addColorStop(0, 'rgba(80,0,120,.06)');
  ng.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = ng; bgCtx.fillRect(0, 0, W, H);
  const ng2 = bgCtx.createRadialGradient(W*.75, H*.6, 0, W*.75, H*.6, W*.4);
  ng2.addColorStop(0, 'rgba(0,60,100,.05)');
  ng2.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = ng2; bgCtx.fillRect(0, 0, W, H);

  for (const s of stars) {
    s.t += s.sp;
    const a = s.a + Math.sin(s.t) * .25;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, a))})`;
    bgCtx.fill();
  }
}

/* ══════════════════════════════════════════
   EXHAUST PLUME (canvas)
══════════════════════════════════════════ */
const plumeCanvas = document.getElementById('plume-canvas');
const plumeCtx    = plumeCanvas.getContext('2d');

const PARTICLES = [];
const MAX_P = 80;

class PlumeParticle {
  constructor() { this.reset(true); }
  reset(cold) {
    this.x  = 80 + (Math.random() - .5) * 14;
    this.y  = cold ? 60 + Math.random() * 120 : 10;
    this.vx = (Math.random() - .5) * 1.8;
    this.vy = 1.4 + Math.random() * 2.2;
    this.life = 0;
    this.maxLife = 40 + Math.random() * 50;
    this.r = 6 + Math.random() * 10;
    this.core = Math.random() < .3;
  }
  update() {
    this.life++;
    this.x += this.vx;
    this.y += this.vy;
    this.vx += (Math.random() - .5) * .3;
    this.r *= .985;
    if (this.life >= this.maxLife || this.y > 175 || this.r < .5) this.reset(false);
  }
  draw(ctx) {
    const t = this.life / this.maxLife;
    let r, g, b, a;
    if (this.core) {
      // Hot inner core: white → yellow → orange
      if (t < .2)      { r=255;g=255;b=255;a=.9; }
      else if (t < .45){ r=255;g=220;b=80; a=.8*(1-t); }
      else             { r=255;g=120;b=0;  a=.5*(1-t); }
    } else {
      // Outer plume: orange → red → purple smoke
      if (t < .3)      { r=255;g=140;b=20;a=.55*(1-t*.5); }
      else if (t < .6) { r=220;g=60; b=0; a=.35*(1-t); }
      else             { r=100;g=20; b=40;a=.2*(1-t); }
    }
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    grad.addColorStop(0,   `rgba(${r},${g},${b},${a})`);
    grad.addColorStop(.6,  `rgba(${r},${g},${b},${a*.4})`);
    grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }
}

for (let i = 0; i < MAX_P; i++) PARTICLES.push(new PlumeParticle());

function drawPlume() {
  plumeCtx.clearRect(0, 0, 160, 180);
  // Engine mouth glow
  const mgrd = plumeCtx.createRadialGradient(80, 8, 0, 80, 8, 30);
  mgrd.addColorStop(0, 'rgba(255,220,80,.9)');
  mgrd.addColorStop(.3, 'rgba(255,120,0,.6)');
  mgrd.addColorStop(.7, 'rgba(200,40,0,.2)');
  mgrd.addColorStop(1,  'rgba(0,0,0,0)');
  plumeCtx.fillStyle = mgrd;
  plumeCtx.fillRect(0, 0, 160, 80);

  for (const p of PARTICLES) { p.update(); p.draw(plumeCtx); }

  // Shockwave diamond (Mach diamonds)
  for (let i = 0; i < 3; i++) {
    const dy = 18 + i * 32;
    const sz = 12 - i * 3;
    plumeCtx.beginPath();
    plumeCtx.ellipse(80, dy, sz, sz * .4, 0, 0, Math.PI * 2);
    plumeCtx.fillStyle = `rgba(255,220,80,${.18 - i * .04})`;
    plumeCtx.fill();
  }
}

function applySkin(name) {
  const s = SKINS[name]; if (!s) return;
  const setStops = (ids, colors) => {
    ids.forEach((id, i) => {
      const el = document.getElementById(id);
      if (el) el.setAttribute('stop-color', colors[i]);
    });
  };
  setStops(['nose-s0','nose-s1','nose-s2','nose-s3','nose-s4','nose-s5','nose-s6'], s.nose);
  setStops(['band-s0','band-s1','band-s2','band-s3','band-s4'], s.band);
  setStops(['fin-s0','fin-s1','fin-s2','fin-s3'], s.fin);
  document.getElementById('statusTxt').textContent = s.status;
}

/* ══════════════════════════════════════════
   LAUNCH SEQUENCE
══════════════════════════════════════════ */
const rocketWrap = document.getElementById('rocket-wrap');
const controls   = document.getElementById('controls');
const skinPanel  = document.getElementById('skin-panel');
const header     = document.getElementById('header');

document.getElementById('launch-btn').addEventListener('click', () => {
  // Fade UI
  [controls, skinPanel, header].forEach(el => {
    el.style.transition = 'opacity .8s ease';
    el.style.opacity = '0';
    el.style.pointerEvents = 'none';
  });

  // Snapshot position
  const r  = rocketWrap.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top  + r.height / 2;

  rocketWrap.style.cssText = `
    position:fixed;
    left:${cx}px;top:${cy}px;
    width:${r.width}px;height:${r.height}px;
    transform:translate(-50%,-50%);
    z-index:50;margin:0;
    animation:none;
  `;

  // Two-frame forced reflow then animate
  requestAnimationFrame(() => requestAnimationFrame(() => {
    rocketWrap.style.transition = 'none';
    rocketWrap.style.animation = 'rocketLaunch 4.5s cubic-bezier(.22,1,.36,1) forwards';
    // Camera shake
    document.body.style.animation = 'cameraShake .6s ease';
  }));

  setTimeout(() => {
    const mw = document.getElementById('map-wrap');
    mw.style.display = 'block';
    requestAnimationFrame(() => requestAnimationFrame(() => mw.classList.add('show')));
  }, 1800);

  setTimeout(() => { rocketWrap.style.display = 'none'; }, 4800);
});

/* ══════════════════════════════════════════
   PASSWORD
══════════════════════════════════════════ */
const pwOverlay = document.getElementById('pw-overlay');
const pwInput   = document.getElementById('pw-input');
const PASS      = '4592';

document.getElementById('pStella').addEventListener('click', () => {
  pwOverlay.classList.add('show');
  setTimeout(() => pwInput.focus(), 120);
});
document.getElementById('pw-submit').addEventListener('click', () => {
  if (pwInput.value.trim() === PASS) {
    pwOverlay.style.opacity = '0';
    setTimeout(() => { window.location.href = 'pinkklish_full.html'; }, 350);
  } else {
    pwInput.style.borderColor = 'rgba(255,80,80,.8)';
    pwInput.style.boxShadow   = '0 0 20px rgba(255,0,0,.2)';
    setTimeout(() => {
      pwInput.style.borderColor = '';
      pwInput.style.boxShadow   = '';
    }, 700);
    pwInput.value = '';
    setTimeout(() => pwInput.focus(), 120);
  }
});
document.getElementById('pw-cancel').addEventListener('click', () => {
  pwOverlay.classList.remove('show'); pwInput.value = '';
});
pwInput.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('pw-submit').click(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { pwOverlay.classList.remove('show'); pwInput.value = ''; }
});

const styleEl = document.createElement('style');
styleEl.textContent = `

  0%{transform:none;}
  15%{transform:translate(-3px,2px) rotate(-.3deg);}
  30%{transform:translate(3px,-2px) rotate(.3deg);}
  45%{transform:translate(-2px,1px);}
  60%{transform:translate(2px,-1px);}
  75%{transform:translate(-1px,.5px);}
  100%{transform:none;}
}`;
document.head.appendChild(styleEl);

/* ══════════════════════════════════════════
   PREVENT DOUBLE TAP ZOOM
══════════════════════════════════════════ */
let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap <= 300) e.preventDefault();
  lastTap = now;
}, { passive: false });

function loop() {
  requestAnimationFrame(loop);
  drawBg();

}
