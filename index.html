<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PINKKLISH · Gallery Wing</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --sab: env(safe-area-inset-bottom, 0px);
  --sat: env(safe-area-inset-top, 0px);
  --gold: #f0c96e;
  --gold2: #c8962a;
  --void: #060402;
  --amber: #ffb15e;
  --cyan: #3ef0ff;
  --wine: #7a2b3e;
  --floor-h: 24vh;
  --ceil-h: 18vh;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{width:100%;height:100%;overflow:hidden;position:fixed;}
body{
  width:100%;height:100%;height:100dvh;overflow:hidden;
  position:fixed;top:0;left:0;
  background:var(--void);
  font-family:'Space Grotesk',sans-serif;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-text-size-adjust:100%;
  -webkit-tap-highlight-color:transparent;
}

/* ─── DUST / AMBIENT ─── */
#stars-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.mote{position:absolute;border-radius:50%;background:rgba(240,201,110,.5);animation:moteFloat var(--d) ease-in-out infinite;}
@keyframes moteFloat{0%,100%{opacity:var(--a);transform:translateY(0);}50%{opacity:calc(var(--a)*.3);transform:translateY(-14px);}}

/* ─── SCENE ─── */
#scene{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;z-index:1;}

/* ─── CEILING (track lighting) ─── */
#ceiling{
  padding-top:var(--sat);
  height:calc(var(--ceil-h) + var(--sat));
  flex-shrink:0;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#050302 0%,#0e0805 60%,#160c06 100%);
}
#ceiling::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0%,transparent calc(9% - .5px),rgba(240,201,110,.05) calc(9% - .5px),rgba(240,201,110,.05) 9%);
}
#ceiling::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(240,201,110,.55) 15%,var(--amber) 50%,rgba(240,201,110,.55) 85%,transparent 100%);
  box-shadow:0 0 60px rgba(240,201,110,.3),0 0 120px rgba(240,201,110,.1);
}
.ceil-orb{position:absolute;border-radius:50%;pointer-events:none;animation:orbDrift var(--od) ease-in-out infinite alternate;}
@keyframes orbDrift{from{transform:translate(0,0);}to{transform:translate(var(--ox),var(--oy));}}

/* ─── WALLS ─── */
#walls{
  flex:1;position:relative;overflow:hidden;min-height:0;
  background:radial-gradient(ellipse 100% 90% at 50% 30%,#140c07 0%,#0a0603 50%,var(--void) 100%);
}
#nebula{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 45% at 25% 65%,rgba(240,201,110,.08) 0%,transparent 65%),
    radial-gradient(ellipse 45% 55% at 75% 35%,rgba(122,43,62,.15) 0%,transparent 65%);
  animation:nebulaBreath 12s ease-in-out infinite alternate;
}
@keyframes nebulaBreath{from{opacity:.7;}to{opacity:1;}}
#wall-l,#wall-r{position:absolute;top:0;bottom:0;width:38%;pointer-events:none;z-index:1;}
#wall-l{left:0;background:linear-gradient(90deg,rgba(6,4,2,.96) 0%,rgba(20,12,7,.6) 55%,transparent 100%);clip-path:polygon(0 0,100% 20%,100% 80%,0 100%);}
#wall-r{right:0;background:linear-gradient(270deg,rgba(6,4,2,.96) 0%,rgba(20,12,7,.6) 55%,transparent 100%);clip-path:polygon(0 20%,100% 0,100% 100%,0 80%);}
#vp-glow{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:60%;height:120%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,rgba(240,201,110,.06) 0%,rgba(240,201,110,.02) 30%,transparent 65%);}

/* ─── WORLD ─── */
#world{position:absolute;top:0;bottom:0;left:0;display:flex;align-items:flex-end;will-change:transform;z-index:2;}

/* ─── COLUMNS ─── */
.arch-col{position:absolute;bottom:0;z-index:3;}
.col-body{
  width:100%;height:100%;
  background:linear-gradient(90deg,rgba(240,201,110,.02) 0%,rgba(255,220,170,.07) 20%,rgba(255,255,255,.04) 50%,rgba(255,220,170,.07) 80%,rgba(240,201,110,.02) 100%);
  border-left:1px solid rgba(240,201,110,.08);border-right:1px solid rgba(240,201,110,.08);position:relative;
}
.col-glow{position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1px;background:linear-gradient(180deg,transparent 0%,rgba(240,201,110,.35) 15%,rgba(255,177,94,.3) 50%,rgba(240,201,110,.35) 85%,transparent 100%);animation:colPulse 3.5s ease-in-out infinite;}
@keyframes colPulse{0%,100%{opacity:.25;}50%{opacity:.8;}}
.col-cap{position:absolute;left:50%;transform:translateX(-50%);height:10px;width:36px;background:rgba(255,220,170,.04);border:1px solid rgba(240,201,110,.16);}
.col-cap.t{top:0;border-top:none;border-radius:0 0 4px 4px;}
.col-cap.b{bottom:0;border-bottom:none;border-radius:4px 4px 0 0;}

/* ─── ART FRAME ─── */
.art-frame{position:absolute;z-index:4;cursor:pointer;transition:transform .25s cubic-bezier(.22,1,.36,1);}
.art-frame:active{transform:scale(.96);}
.art-beam{
  position:absolute;top:-70px;left:50%;transform:translateX(-50%);
  width:6px;height:20px;border-radius:3px;
  background:linear-gradient(180deg,rgba(255,240,210,.9),rgba(255,200,120,.2));
  box-shadow:0 0 10px rgba(255,200,120,.6);
}
.art-beam::after{
  content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);
  width:2px;height:70px;
  background:linear-gradient(180deg,rgba(255,210,140,.55),rgba(255,210,140,0));
  filter:blur(1px);
}
.art-cone{
  position:absolute;top:-2px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:70px solid transparent;
  border-right:70px solid transparent;
  border-top:140px solid rgba(255,205,130,.05);
  pointer-events:none;
}
.art-mat{
  position:relative;padding:12px;
  background:linear-gradient(155deg,#1c130a,#0e0904);
  border:1px solid rgba(240,201,110,.28);
  border-radius:4px;
  box-shadow:0 20px 50px rgba(0,0,0,.6),0 0 30px rgba(255,177,94,.08),inset 0 0 0 1px rgba(255,220,170,.04);
}
.art-canvas{width:100%;height:100%;border-radius:2px;overflow:hidden;position:relative;box-shadow:inset 0 0 30px rgba(0,0,0,.5);}
.art-sheen{position:absolute;inset:0;background:linear-gradient(115deg,rgba(255,255,255,.14) 0%,transparent 30%,transparent 70%,rgba(255,255,255,.05) 100%);pointer-events:none;}
.art-plaque{
  margin-top:10px;text-align:center;font-family:'Space Mono',monospace;
  font-size:7.5px;letter-spacing:2px;color:rgba(240,201,110,.55);text-transform:uppercase;
  white-space:nowrap;
}
.art-plaque b{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;letter-spacing:.5px;color:rgba(255,240,220,.85);text-transform:none;margin-bottom:2px;}

/* ─── DOOR (reuse language from station, warm accent) ─── */
.door-wrap{position:absolute;bottom:0;z-index:10;display:flex;flex-direction:column;align-items:center;cursor:pointer;--door-r:62;--door-g:240;--door-b:255;}
.door-arch{width:138px;height:24px;background:linear-gradient(180deg,rgba(240,201,110,.12),transparent);border:1px solid rgba(240,201,110,.22);border-bottom:none;border-radius:70px 70px 0 0;position:relative;overflow:hidden;}
.door-arch::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:35%;height:100%;background:linear-gradient(180deg,rgba(62,240,255,.14),transparent);}
.door-arch-light{position:absolute;inset:0;border-radius:70px 70px 0 0;border:1px solid transparent;transition:border-color .4s;pointer-events:none;}
.door-wrap.near .door-arch-light{border-color:rgba(var(--door-r),var(--door-g),var(--door-b),.45);box-shadow:0 0 30px rgba(var(--door-r),var(--door-g),var(--door-b),.2);}
.door-pillars{display:flex;align-items:stretch;position:relative;}
.door-pillar{width:14px;background:linear-gradient(90deg,rgba(240,201,110,.03),rgba(255,220,170,.08),rgba(240,201,110,.03));border:1px solid rgba(240,201,110,.12);position:relative;overflow:hidden;}
.door-pillar.l{border-right:none;}
.door-pillar.r{border-left:none;}
.door-body{width:110px;position:relative;overflow:hidden;background:linear-gradient(180deg,#140c06,#0a0603);border-left:1px solid rgba(240,201,110,.1);border-right:1px solid rgba(240,201,110,.1);transition:border-color .3s;}
.door-scan{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(62,240,255,.7),transparent);opacity:0;top:0;animation:dScan 2.8s linear infinite;transition:opacity .3s;filter:blur(1px);}
@keyframes dScan{0%{top:0%;}100%{top:100%;}}
.door-wrap.near .door-scan{opacity:1;}
.door-wrap.near .door-body{border-color:rgba(var(--door-r),var(--door-g),var(--door-b),.4);}
.door-atmo{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(var(--door-r),var(--door-g),var(--door-b),.05),transparent);transition:opacity .4s;opacity:0;}
.door-wrap.near .door-atmo{opacity:1;}
.door-particle{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(var(--door-r),var(--door-g),var(--door-b),.8);animation:dParticle var(--dp) ease-in-out infinite;opacity:0;}
@keyframes dParticle{0%{opacity:0;transform:translateY(0) scale(1);}20%{opacity:.8;}100%{opacity:0;transform:translateY(-60px) scale(0);}}
.door-wrap.near .door-particle{opacity:1;}
.door-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:22px 10px;text-align:center;}
.door-glyph{font-size:34px;line-height:1;opacity:.3;transition:opacity .35s,transform .4s cubic-bezier(.22,1,.36,1),filter .35s;filter:saturate(0) blur(1px);}
.door-wrap.near .door-glyph{opacity:1;filter:saturate(1) drop-shadow(0 0 20px rgba(var(--door-r),var(--door-g),var(--door-b),.9)) blur(0px);transform:scale(1.15) translateY(-3px);}
.door-name{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.18);letter-spacing:2.5px;text-transform:uppercase;transition:color .3s;}
.door-wrap.near .door-name{color:rgba(255,255,255,.9);}
.door-sub{font-family:'Space Mono',monospace;font-size:8.5px;font-weight:400;color:transparent;letter-spacing:.5px;transition:color .3s;}
.door-wrap.near .door-sub{color:rgba(var(--door-r),var(--door-g),var(--door-b),.5);}
.door-threshold{width:calc(100% + 26px);height:3px;background:linear-gradient(90deg,transparent,rgba(var(--door-r),var(--door-g),var(--door-b),.12) 10%,rgba(240,201,110,.5) 50%,rgba(var(--door-r),var(--door-g),var(--door-b),.12) 90%,transparent);opacity:.25;transition:opacity .3s,box-shadow .3s;}
.door-wrap.near .door-threshold{opacity:1;box-shadow:0 0 20px rgba(240,201,110,.3),0 -2px 30px rgba(var(--door-r),var(--door-g),var(--door-b),.2);}
.door-numplate{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(10,6,3,.9);border:1px solid rgba(240,201,110,.25);border-radius:3px;padding:3px 8px;font-family:'Space Mono',monospace;font-size:7px;color:rgba(240,201,110,.5);letter-spacing:2px;white-space:nowrap;}

/* ─── FLOOR ─── */
#floor{height:calc(var(--floor-h) + var(--sab));flex-shrink:0;position:relative;overflow:hidden;padding-bottom:var(--sab);}
#floor::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(240,201,110,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(240,201,110,.06) 1px,transparent 1px);
  background-size:80px 40px;transform:perspective(300px) rotateX(22deg);transform-origin:top center;
}
#floor::after{content:'';position:absolute;top:0;left:0;right:0;height:55%;background:linear-gradient(180deg,rgba(240,201,110,.05) 0%,transparent 100%);}
#floor-top-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(240,201,110,.6) 20%,var(--amber) 50%,rgba(240,201,110,.6) 80%,transparent 100%);box-shadow:0 0 30px rgba(240,201,110,.3),0 2px 60px rgba(240,201,110,.12);}
#floor-base{position:absolute;inset:0;background:linear-gradient(0deg,#050301 0%,#140c06 100%);z-index:-1;}

/* ─── PLAYER (identical rig, warm tint) ─── */
#player-wrap{position:absolute;bottom:0;z-index:20;transition:left .07s linear;transform:translateX(-50%);filter:drop-shadow(0 0 20px rgba(240,201,110,.18));cursor:pointer;}
#player-wrap.face-left #crew-svg{transform:scaleX(-1);}
#player-wrap.sprinting{filter:drop-shadow(0 0 30px rgba(240,201,110,.4));}
#crew-svg{width:70px;height:192px;overflow:visible;display:block;margin:0 auto;animation:crewIdle 3.4s ease-in-out infinite;transform-origin:center bottom;}
@keyframes crewIdle{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.player-walking #crew-svg{animation:crewBob .38s ease-in-out infinite alternate;}
@keyframes crewBob{from{transform:translateY(0);}to{transform:translateY(-3px);}}
#crew-shadow{width:52px;height:10px;margin:-2px auto 0;background:radial-gradient(ellipse,rgba(240,201,110,.2) 0%,transparent 70%);animation:shadowPulse 3.4s ease-in-out infinite;}
@keyframes shadowPulse{0%,100%{opacity:.6;transform:scaleX(1);}50%{opacity:1;transform:scaleX(1.08);}}
.player-walking #arm-l{animation:wAL .36s ease-in-out infinite alternate;transform-origin:22px 80px;}
.player-walking #arm-r{animation:wAR .36s ease-in-out infinite alternate;transform-origin:66px 80px;}
.player-walking #leg-l{animation:wLL .36s ease-in-out infinite alternate;transform-origin:34px 132px;}
.player-walking #leg-r{animation:wLR .36s ease-in-out infinite alternate;transform-origin:54px 132px;}
#player-wrap.sprinting.player-walking #arm-l{animation-duration:.18s;}
#player-wrap.sprinting.player-walking #arm-r{animation-duration:.18s;}
#player-wrap.sprinting.player-walking #leg-l{animation-duration:.18s;}
#player-wrap.sprinting.player-walking #leg-r{animation-duration:.18s;}
@keyframes wAL{from{transform:rotate(-18deg);}to{transform:rotate(22deg);}}
@keyframes wAR{from{transform:rotate(18deg);}to{transform:rotate(-22deg);}}
@keyframes wLL{from{transform:rotate(-20deg);}to{transform:rotate(18deg);}}
@keyframes wLR{from{transform:rotate(20deg);}to{transform:rotate(-18deg);}}
@keyframes badgePulse{0%,100%{opacity:.6;}50%{opacity:1;}}
@keyframes visorPulse{0%,100%{opacity:.25;}50%{opacity:.85;}}
@keyframes tabletBlink{0%,100%{opacity:.4;}50%{opacity:.95;}}
@keyframes headTilt{0%,100%{transform:rotate(0);}35%{transform:rotate(.8deg);}75%{transform:rotate(-.6deg);}}
.badge-glow{animation:badgePulse 1.9s ease-in-out infinite;}
.visor-glow{animation:visorPulse 2.8s ease-in-out infinite;}
.tab-glow{animation:tabletBlink 2.3s ease-in-out infinite;}
.rank-pulse{animation:badgePulse 1.8s ease-in-out infinite;}
#head-g{animation:headTilt 4.2s ease-in-out infinite;transform-origin:44px 38px;}

/* ─── SPEECH BUBBLE ─── */
#speech-bubble{
  position:fixed;z-index:60;transform:translate(-50%,-100%);pointer-events:none;
  background:rgba(16,10,5,.94);border:1px solid rgba(240,201,110,.35);border-radius:14px;
  padding:8px 13px;font-family:'Space Mono',monospace;font-size:9.5px;color:rgba(255,255,255,.88);
  letter-spacing:.3px;white-space:nowrap;opacity:0;transition:opacity .2s,transform .25s cubic-bezier(.22,1,.36,1);
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}
#speech-bubble::after{content:'';position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid rgba(240,201,110,.35);}
#speech-bubble.on{opacity:1;transform:translate(-50%,-112%);}

/* ─── HUD ─── */
#sector-chip{
  position:fixed;top:calc(var(--sat) + 14px);left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;padding:8px 20px;
  background:rgba(12,7,3,.7);border:1px solid rgba(240,201,110,.18);border-radius:100px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);z-index:100;white-space:nowrap;
  box-shadow:0 0 30px rgba(240,201,110,.08),inset 0 1px 0 rgba(255,255,255,.06);
}
#sc-icon{width:7px;height:7px;border-radius:1px;rotate:45deg;background:var(--gold);box-shadow:0 0 8px var(--gold);flex-shrink:0;}
#sc-name{font-size:10px;font-weight:600;letter-spacing:3.5px;text-transform:uppercase;color:rgba(240,201,110,.6);}
#sc-sep{width:1px;height:12px;background:rgba(255,255,255,.08);}
#sc-coord{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,177,94,.4);letter-spacing:2px;}
#sc-live{width:5px;height:5px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);animation:livePulse 1.6s ease-in-out infinite;flex-shrink:0;}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.2;}}

#sound-toggle{
  position:fixed;top:calc(var(--sat) + 14px);right:16px;z-index:100;
  width:38px;height:38px;border-radius:50%;
  background:rgba(12,7,3,.7);border:1px solid rgba(240,201,110,.18);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 0 30px rgba(240,201,110,.08),inset 0 1px 0 rgba(255,255,255,.06);
  transition:border-color .3s;
}
#sound-toggle svg{width:16px;height:16px;}
#sound-toggle.on{border-color:rgba(255,177,94,.5);}
#sound-toggle .wave{opacity:.15;transition:opacity .3s;}
#sound-toggle.on .wave{opacity:1;}

#nav-strip{
  position:fixed;top:calc(var(--sat) + 62px);left:50%;transform:translateX(-50%);
  width:min(240px,60vw);height:26px;z-index:99;
  background:rgba(12,7,3,.55);border:1px solid rgba(240,201,110,.16);border-radius:100px;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:0 10px;display:flex;align-items:center;
}
#nav-strip-track{position:relative;flex:1;height:2px;background:rgba(255,255,255,.08);border-radius:2px;}
.nav-door-dot{position:absolute;top:50%;width:6px;height:6px;border-radius:1px;rotate:45deg;transform:translate(-50%,-50%);box-shadow:0 0 6px currentColor;}
#nav-player-dot{position:absolute;top:50%;width:8px;height:8px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);box-shadow:0 0 10px #fff,0 0 18px var(--amber);transition:left .1s linear;}

#nav-hint{position:fixed;bottom:calc(var(--sab) + 18px);left:20px;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.14);text-transform:uppercase;z-index:100;pointer-events:none;}

#toast-stack{position:fixed;top:calc(var(--sat) + 100px);left:50%;transform:translateX(-50%);z-index:101;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
.toast{background:rgba(16,10,5,.92);border:1px solid rgba(255,177,94,.25);border-radius:100px;padding:7px 16px;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1px;color:rgba(255,255,255,.82);white-space:nowrap;opacity:0;transform:translateY(-8px) scale(.96);animation:toastIn .35s cubic-bezier(.22,1,.36,1) forwards, toastOut .35s cubic-bezier(.4,0,1,1) forwards 2.6s;box-shadow:0 10px 30px rgba(0,0,0,.4);}
@keyframes toastIn{to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px) scale(.96);}}

#door-card{
  position:fixed;bottom:calc(var(--sab) + 18px);left:50%;transform:translateX(-50%) translateY(20px);
  width:min(310px,88vw);background:rgba(14,9,4,.9);border:1px solid rgba(240,201,110,.16);border-radius:22px;
  padding:18px 20px;display:flex;align-items:center;gap:15px;
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  opacity:0;pointer-events:none;z-index:100;transition:opacity .3s,transform .45s cubic-bezier(.22,1,.36,1);
  box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.06);
}
#door-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(240,201,110,.45),transparent);}
#door-card.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
#dc-icon{width:46px;height:46px;flex-shrink:0;border-radius:14px;background:rgba(62,240,255,.1);border:1px solid rgba(62,240,255,.22);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(62,240,255,.1);}
#dc-name{font-size:13.5px;font-weight:700;color:rgba(255,255,255,.9);}
#dc-sub{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,177,94,.5);margin-top:4px;letter-spacing:.5px;}
#dc-cta{margin-left:auto;flex-shrink:0;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(240,201,110,.5);white-space:nowrap;}

/* ─── ART DETAIL MODAL ─── */
#info-backdrop{position:fixed;inset:0;z-index:200;background:rgba(4,2,1,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .3s;}
#info-backdrop.on{opacity:1;pointer-events:auto;}
#info-modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-46%) scale(.92);z-index:201;
  width:min(340px,86vw);background:rgba(14,9,4,.97);border:1px solid rgba(240,201,110,.3);border-radius:20px;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .3s,transform .35s cubic-bezier(.22,1,.36,1);
  box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06);
}
#info-modal.on{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
#im-swatch{width:100%;height:180px;border-radius:12px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.4);}
#im-tag{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,177,94,.65);margin-bottom:6px;}
#im-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:#fff;margin-bottom:4px;}
#im-meta{font-family:'Space Mono',monospace;font-size:8.5px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:10px;}
#im-desc{font-size:12px;line-height:1.65;color:rgba(255,255,255,.6);}
#im-close{margin-top:18px;width:100%;padding:10px;border-radius:100px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:rgba(255,255,255,.7);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}

/* ─── EFFECTS ─── */
.ripple{position:fixed;pointer-events:none;z-index:50;width:36px;height:36px;border-radius:50%;border:1px solid rgba(240,201,110,.4);transform:translate(-50%,-50%) scale(0);animation:rippleOut .55s cubic-bezier(.2,.7,.3,1) forwards;}
@keyframes rippleOut{to{transform:translate(-50%,-50%) scale(3.5);opacity:0;}}
.ripple2{position:fixed;pointer-events:none;z-index:50;width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,177,94,.3);transform:translate(-50%,-50%) scale(0);animation:rippleOut .4s .08s cubic-bezier(.2,.7,.3,1) forwards;}
.dust{position:fixed;pointer-events:none;z-index:49;width:3px;height:3px;border-radius:50%;animation:dustFloat 3.5s ease-out forwards;}
@keyframes dustFloat{0%{opacity:.7;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);}}
#warp-flash{position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,rgba(255,205,130,.4) 0%,rgba(122,43,62,.3) 40%,rgba(6,4,2,1) 70%);transition:opacity .25s ease;}

/* ─── BOOT ─── */
#boot-overlay{position:fixed;inset:0;z-index:9999;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .5s ease;cursor:pointer;}
#boot-overlay.hide{opacity:0;pointer-events:none;}
#boot-mark{width:64px;height:64px;position:relative;}
#boot-mark::before,#boot-mark::after{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(240,201,110,.5);}
#boot-mark::before{animation:bootSpin 2.2s linear infinite;border-top-color:var(--amber);border-right-color:transparent;}
#boot-mark::after{inset:14px;border-color:rgba(255,177,94,.4);animation:bootSpin 1.4s linear infinite reverse;border-bottom-color:var(--gold);border-left-color:transparent;}
@keyframes bootSpin{to{transform:rotate(360deg);}}
#boot-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;font-weight:500;letter-spacing:3px;color:rgba(255,255,255,.9);}
#boot-status{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,177,94,.55);text-transform:uppercase;min-height:12px;}
#boot-bar-track{width:180px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
#boot-bar-fill{width:0%;height:100%;background:linear-gradient(90deg,var(--wine),var(--amber),var(--gold));transition:width .1s linear;box-shadow:0 0 12px rgba(255,177,94,.5);}
#boot-skip{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;}
</style>
</head>

          <line x1="23" y1="42" x2="28" y2="42" stroke="rgba(0,220,240,.3)" stroke-width=".6"/>
          <circle cx="29.5" cy="35.5" r="1.5" fill="rgba(0,255,180,.9)" class="badge-glow" style="animation-delay:.4s"/>
          <path d="M21 43Q16 46 15 52Q15 55 18 56" fill="none" stroke="#0c1428" stroke-width="2" stroke-linecap="round"/>
          <path d="M21 43Q16 46 15 52Q15 55 18 56" fill="none" stroke="rgba(0,170,210,.45)" stroke-width=".7" stroke-linecap="round"/>
          <ellipse cx="18" cy="57" rx="3.5" ry="2.5" fill="#0a1428" stroke="rgba(0,190,220,.58)" stroke-width=".8"/>
          <ellipse cx="18" cy="57" rx="1.8" ry="1.2" fill="rgba(0,30,70,.9)" stroke="rgba(0,220,240,.35)" stroke-width=".4"/>
          <rect x="46" y="31" width="18" height="6" rx="2" fill="rgba(0,15,38,.8)" stroke="rgba(0,210,230,.42)" stroke-width=".7"/>
          <rect x="47.5" y="32.5" width="15" height="3" rx="1" fill="url(#visorG)" class="visor-glow"/>
          <text x="48.5" y="35.5" font-family="monospace" font-size="2.2" fill="rgba(0,245,210,.8)">GAL.WING</text>
          <rect x="58" y="34" width="7" height="9" rx="2.5" fill="#0a1428" stroke="rgba(0,190,220,.46)" stroke-width=".8"/>
          <line x1="59.5" y1="37" x2="63.5" y2="37" stroke="rgba(0,220,240,.3)" stroke-width=".5"/>
          <line x1="59.5" y1="39.5" x2="63.5" y2="39.5" stroke="rgba(0,220,240,.3)" stroke-width=".5"/>
          <circle cx="63.5" cy="35.5" r="1.2" fill="rgba(0,220,250,.85)" class="rank-pulse" style="animation-delay:.8s"/>
        </g>
      </svg>
      <div id="crew-shadow"></div>
    </div>
  </div>

  <div id="floor">
    <div id="floor-base"></div>
    <div id="floor-top-line"></div>
  </div>
</div>

<div id="sector-chip">
  <div id="sc-live"></div>
  <div id="sc-icon"></div>
  <div id="sc-name">Gallery Wing</div>
  <div id="sc-sep"></div>
  <div id="sc-coord">·A-12·</div>
</div>

<button id="sound-toggle" aria-label="Toggle sound">
  <svg class="wave" viewBox="0 0 24 24" fill="none" stroke="#ffb15e" stroke-width="1.6"><path d="M12 6L7 10H4v4h3l5 4V6z" fill="rgba(255,177,94,.15)"/><path d="M15.5 9.5a4 4 0 0 1 0 5" /><path d="M18 7a8 8 0 0 1 0 10"/></svg>
</button>

<div id="nav-strip"><div id="nav-strip-track"><div id="nav-player-dot"></div></div></div>

<div id="toast-stack"></div>

<div id="nav-hint">Tap to walk · Tap a frame to inspect</div>

<div id="speech-bubble"></div>

<div id="door-card">
  <div id="dc-icon">◂</div>
  <div>
    <div id="dc-name">Concourse Return</div>
    <div id="dc-sub">→ Stella Station</div>
  </div>
  <div id="dc-cta">Enter →</div>
</div>

<div id="info-backdrop"></div>
<div id="info-modal">
  <div id="im-swatch"></div>
  <div id="im-tag">Catalog Entry</div>
  <div id="im-title"></div>
  <div id="im-meta"></div>
  <div id="im-desc"></div>
  <button id="im-close">Close</button>
</div>

<script>
'use strict';

/* ── CONSTANTS ── */
const WORLD_W = 3600;
const DOORS = [
  {id:'station', wx:220, label:'Concourse Return', sub:'→ Stella Station', url:'station.html', icon:'◂', r:62, g:240, b:255},
];

const COL_POSITIONS = [];
for (let x = 500; x < WORLD_W; x += 560) COL_POSITIONS.push(x);

/* Deterministic pseudo-random so layout is stable across rebuilds */
function seeded(seed) {
  let s = seed % 2147483647; if (s <= 0) s += 2147483646;
  return () => (s = (s * 16807) % 2147483647) / 2147483647;
}

const ARTWORKS = [
  {wx:560,  cat:'No. 01', title:'Drift Signal',      medium:'Generative light study',  hue:[300,340], year:'2024', desc:'A slow transmission of colour, built from layered gradients that never quite repeat.'},
  {wx:1020, cat:'No. 02', title:'Low Orbit Hymn',     medium:'Digital composite',        hue:[190,230], year:'2024', desc:'Made while thinking about the quiet between two radio pulses.'},
  {wx:1500, cat:'No. 03', title:'Ember Correspondence',medium:'Procedural gradient',      hue:[10,45],  year:'2025', desc:'Warm noise arranged until it felt like a message worth keeping.'},
  {wx:2000, cat:'No. 04', title:'Verdant Static',      medium:'Generative light study',   hue:[120,165], year:'2025', desc:'Green fields rendered as interference patterns rather than places.'},
  {wx:2480, cat:'No. 05', title:'Meridian, Twice',     medium:'Digital composite',        hue:[220,260], year:'2025', desc:'Two horizons layered on top of each other until they agree.'},
  {wx:2960, cat:'No. 06', title:'Amber Hold',          medium:'Procedural gradient',      hue:[35,60],   year:'2026', desc:'The last piece finished before the gallery wing opened its doors.'},
];
const STAT_MSGS = ['Climate control nominal','Frame humidity stable','Lighting rig synced','Track power steady','Archive backup complete'];
const GREETS = ['Take your time — nothing here is rushed.','New pieces get hung every cycle.','Tap a frame to read about it.','Glad you found the gallery.','Mind the track lighting, it runs warm.'];

/* ── STARS / MOTES ── */
function buildStars() {
  const layer = document.getElementById('stars-layer');
  for (let i = 0; i < 60; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    const size = Math.random() < .8 ? 1.5 : 2.5;
    const alpha = .15 + Math.random() * .4;
    const dur = 3 + Math.random() * 5;
    m.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${20+Math.random()*60}%;--a:${alpha};--d:${dur}s;animation-delay:${Math.random()*6}s;`;
    layer.appendChild(m);
  }
}

/* ── STATE ── */
let playerWx = 320, playerTgWx = 320;
let facing = 1, moving = false, warping = false, sprinting = false, sprintTimer = null;
let camX = 0, camXVel = 0, lastTime = 0, stepAcc = 0;
let nearDoor = null;
const worldEl = document.getElementById('world');
const wallsEl = document.getElementById('walls');

function wallsH() { return wallsEl.offsetHeight; }
function VW() { return window.innerWidth; }

/* ── AUDIO ── */
const Sound = (() => {
  let ctx = null, master = null, enabled = false;
  function ensure() {
    if (ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ctx = new AC();
    master = ctx.createGain();
    master.gain.value = 0.22;
    master.connect(ctx.destination);
  }
  function tone(freq, dur, type, gainAmt, glideTo) {
    if (!enabled || !ctx) return;
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gainAmt || 0.18, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(master);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  }
  return {
    setEnabled(v) { enabled = v; if (v) ensure(); },
    isEnabled() { return enabled; },
    tick() { tone(480 + Math.random()*30, 0.05, 'sine', 0.04); },
    chime() { tone(700, 0.5, 'sine', 0.12, 1040); },
    blip() { tone(920, 0.1, 'triangle', 0.08); },
    warp() { tone(220, 0.9, 'sawtooth', 0.1, 60); },
    greet() { tone(780, 0.18, 'sine', 0.09, 940); },
  };
})();

/* ── TOASTS ── */
function toast(msg) {
  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

/* ── GENERATIVE ART ── */
function artGradient(idx) {
  const a = ARTWORKS[idx];
  const rnd = seeded(idx * 977 + 11);
  const [h0, h1] = a.hue;
  const stops = [];
  const n = 3 + Math.floor(rnd() * 2);
  for (let i = 0; i < n; i++) {
    const h = h0 + rnd() * (h1 - h0);
    const s = 55 + rnd() * 35;
    const l = 30 + rnd() * 40;
    stops.push(`hsl(${h.toFixed(0)},${s.toFixed(0)}%,${l.toFixed(0)}%)`);
  }
  const angle = Math.floor(rnd() * 360);
  const cx = 20 + rnd() * 60, cy = 20 + rnd() * 60;
  return `radial-gradient(circle at ${cx.toFixed(0)}% ${cy.toFixed(0)}%, ${stops[0]}, transparent 60%),
          linear-gradient(${angle}deg, ${stops.slice(1).join(',')})`;
}
function artLines(idx) {
  const rnd = seeded(idx * 613 + 7);
  let svg = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;opacity:.35;">`;
  const n = 4 + Math.floor(rnd() * 4);
  for (let i = 0; i < n; i++) {
    const x1 = rnd()*100, y1 = rnd()*100, x2 = rnd()*100, y2 = rnd()*100;
    svg += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,255,255,.5)" stroke-width="${(rnd()*.6+.15).toFixed(2)}"/>`;
  }
  svg += `</svg>`;
  return svg;
}

/* ── BUILD ART FRAME ── */
function buildFrame(a, idx, wallH) {
  const w = 118, h = 148;
  const fb = wallH * .3;
  const el = document.createElement('div');
  el.className = 'art-frame';
  el.dataset.idx = idx;
  el.style.cssText = `left:${a.wx - w/2 - 12}px;bottom:${fb}px;`;
  el.innerHTML = `
    <div class="art-beam"></div>
    <div class="art-cone"></div>
    <div class="art-mat">
      <div class="art-canvas" style="width:${w}px;height:${h}px;background:${artGradient(idx)};">
        ${artLines(idx)}
        <div class="art-sheen"></div>
      </div>
      <div class="art-plaque"><b>${a.title}</b>${a.cat} · ${a.year}</div>
    </div>
  `;
  return el;
}

/* ── BUILD DOOR ── */
function buildDoor(d, wallH) {
  const dh = Math.round(wallH * .76);
  const el = document.createElement('div');
  el.className = 'door-wrap';
  el.id = 'door-' + d.id;
  el.style.cssText = `left:${d.wx}px;transform:translateX(-50%);`;
  el.style.setProperty('--door-r', d.r);
  el.style.setProperty('--door-g', d.g);
  el.style.setProperty('--door-b', d.b);
  let particles = '';
  for (let i = 0; i < 8; i++) {
    const left = 10 + Math.random() * 80;
    const dur = 1.5 + Math.random() * 2;
    const delay = Math.random() * 3;
    particles += `<div class="door-particle" style="left:${left}%;bottom:${10 + Math.random()*40}%;--dp:${dur}s;animation-delay:${delay}s;"></div>`;
  }
  el.innerHTML = `
    <div class="door-arch"><div class="door-arch-light"></div></div>
    <div class="door-pillars">
      <div class="door-pillar l"></div>
      <div class="door-body" style="height:${dh}px">
        <div class="door-scan"></div>
        <div class="door-atmo"></div>
        ${particles}
        <div class="door-inner">
          <div class="door-glyph" style="color:rgba(${d.r},${d.g},${d.b},1)">${d.icon}</div>
          <div class="door-name">${d.label}</div>
          <div class="door-sub">${d.sub}</div>
        </div>
        <div class="door-numplate">A-12 · GATE 1</div>
      </div>
      <div class="door-pillar r"></div>
    </div>
    <div class="door-threshold"></div>
  `;
  return el;
}

/* ── BUILD WORLD ── */
function buildWorld() {
  worldEl.innerHTML = '';
  worldEl.style.width = WORLD_W + 'px';
  const wH = wallsH();

  COL_POSITIONS.forEach(cx => {
    const el = document.createElement('div');
    el.className = 'arch-col';
    el.style.cssText = `left:${cx}px;height:100%;width:20px;`;
    el.innerHTML = `<div class="col-cap t"></div><div class="col-body"><div class="col-glow"></div></div><div class="col-cap b"></div>`;
    worldEl.appendChild(el);
  });

  ARTWORKS.forEach((a, i) => worldEl.appendChild(buildFrame(a, i, wH)));
  DOORS.forEach(d => worldEl.appendChild(buildDoor(d, wH)));

  buildNavStrip();
}

function buildNavStrip() {
  const track = document.getElementById('nav-strip-track');
  track.querySelectorAll('.nav-door-dot').forEach(n => n.remove());
  DOORS.forEach(d => {
    const dot = document.createElement('div');
    dot.className = 'nav-door-dot';
    dot.style.left = (d.wx / WORLD_W * 100) + '%';
    dot.style.color = `rgb(${d.r},${d.g},${d.b})`;
    dot.style.background = `rgb(${d.r},${d.g},${d.b})`;
    track.appendChild(dot);
  });
  ARTWORKS.forEach(a => {
    const dot = document.createElement('div');
    dot.className = 'nav-door-dot';
    dot.style.left = (a.wx / WORLD_W * 100) + '%';
    dot.style.color = 'rgba(240,201,110,.7)';
    dot.style.background = 'rgba(240,201,110,.7)';
    dot.style.width = '4px'; dot.style.height = '4px';
    track.appendChild(dot);
  });
}

/* ── CAMERA & LOOP ── */
function updateCamera() {
  const target = Math.max(0, Math.min(WORLD_W - VW(), playerWx - VW() * .4));
  camXVel += (target - camX) * .11;
  camXVel *= .72;
  camX += camXVel;
}

function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min((ts - lastTime) / 1000, .05);
  lastTime = ts;
  if (warping) return;

  const speedBase = sprinting ? 10.5 : 6.5;
  const dx = playerTgWx - playerWx;
  const dist = Math.abs(dx);
  if (dist > 2) {
    const step = Math.sign(dx) * Math.min(speedBase * (dt / .01667) * Math.min(1, dist / 80), dist - 2);
    playerWx += step;
    playerWx = Math.max(80, Math.min(WORLD_W - 80, playerWx));
    facing = Math.sign(dx);
    moving = true;
    stepAcc += Math.abs(step);
    if (stepAcc > 26) { stepAcc = 0; Sound.tick(); }
  } else {
    moving = false;
    playerTgWx = playerWx;
  }

  updateCamera();
  worldEl.style.transform = `translateX(${-camX}px)`;

  const pw = document.getElementById('player-wrap');
  const screenX = playerWx - camX;
  pw.style.left = screenX + 'px';
  pw.classList.toggle('sprinting', sprinting);
  if (moving) {
    pw.classList.add('player-walking');
    pw.classList.toggle('face-left', facing < 0);
  } else {
    pw.classList.remove('player-walking');
  }

  const bubble = document.getElementById('speech-bubble');
  if (bubble.classList.contains('on')) {
    bubble.style.left = screenX + 'px';
    bubble.style.top = (wallsH() - 175) + 'px';
  }

  let closest = null, closestDist = 9999;
  DOORS.forEach(d => {
    const dd = Math.abs(playerWx - d.wx);
    const dEl = document.getElementById('door-' + d.id);
    if (dEl) dEl.classList.toggle('near', dd < 160);
    if (dd < closestDist) { closestDist = dd; closest = d; }
  });

  const wasNear = nearDoor;
  nearDoor = closestDist < 140 ? closest : null;
  if (nearDoor !== wasNear) {
    const card = document.getElementById('door-card');
    if (nearDoor) {
      document.getElementById('dc-icon').textContent = nearDoor.icon;
      document.getElementById('dc-name').textContent = nearDoor.label;
      document.getElementById('dc-sub').textContent = nearDoor.sub;
      card.classList.add('on');
      Sound.chime();
    } else {
      card.classList.remove('on');
    }
  }

  if (nearDoor && closestDist < 28 && !warping) {
    warping = true;
    document.getElementById('door-card').classList.remove('on');
    Sound.warp();
    const flash = document.getElementById('warp-flash');
    flash.style.transition = 'opacity .4s ease';
    flash.style.opacity = '1';
    setTimeout(() => { window.location.href = nearDoor.url; }, 700);
  }

  const npd = document.getElementById('nav-player-dot');
  npd.style.left = (playerWx / WORLD_W * 100) + '%';
}

/* ── INFO MODAL ── */
function showArtInfo(idx) {
  const a = ARTWORKS[idx];
  if (!a) return;
  document.getElementById('im-swatch').style.background = artGradient(idx);
  document.getElementById('im-swatch').innerHTML = artLines(idx);
  document.getElementById('im-title').textContent = a.title;
  document.getElementById('im-meta').textContent = `${a.cat} · ${a.medium} · ${a.year}`;
  document.getElementById('im-desc').textContent = a.desc;
  document.getElementById('info-backdrop').classList.add('on');
  document.getElementById('info-modal').classList.add('on');
}
function closeInfo() {
  document.getElementById('info-backdrop').classList.remove('on');
  document.getElementById('info-modal').classList.remove('on');
}
document.getElementById('info-backdrop').addEventListener('click', closeInfo);
document.getElementById('im-close').addEventListener('click', closeInfo);

/* ── GREET ── */
function greetPlayer() {
  const bubble = document.getElementById('speech-bubble');
  bubble.textContent = GREETS[Math.floor(Math.random() * GREETS.length)];
  bubble.classList.add('on');
  Sound.greet();
  clearTimeout(greetPlayer._t);
  greetPlayer._t = setTimeout(() => bubble.classList.remove('on'), 2200);
}

/* ── SOUND TOGGLE ── */
const soundBtn = document.getElementById('sound-toggle');
soundBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const next = !Sound.isEnabled();
  Sound.setEnabled(next);
  soundBtn.classList.toggle('on', next);
  toast(next ? 'Sound on' : 'Sound off');
});

/* ── EFFECTS ── */
function spawnDust(cx, cy) {
  const colors = ['rgba(240,201,110,.75)', 'rgba(255,177,94,.7)', 'rgba(122,43,62,.55)', 'rgba(255,240,220,.5)'];
  for (let i = 0; i < 8; i++) {
    const d = document.createElement('div');
    d.className = 'dust';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 28 + Math.random() * 55;
    d.style.setProperty('--dx', `${Math.cos(angle)*dist}px`);
    d.style.setProperty('--dy', `${Math.sin(angle)*dist - 24}px`);
    d.style.left = cx + 'px';
    d.style.top = cy + 'px';
    d.style.background = colors[i % colors.length];
    d.style.animationDelay = (Math.random() * .15) + 's';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 3600);
  }
}
function spawnRipple(cx, cy) {
  [0, 80].forEach(delay => {
    const r = document.createElement('div');
    r.className = delay === 0 ? 'ripple' : 'ripple2';
    r.style.left = cx + 'px';
    r.style.top = cy + 'px';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 700);
  });
}

/* ── INPUT ── */
let lastMoveTapTime = 0;
function handleTap(cx, cy) {
  if (warping) return;
  const targetEl = document.elementFromPoint(cx, cy);
  if (targetEl && targetEl.closest('#sound-toggle')) return;

  const frameEl = targetEl && targetEl.closest('.art-frame');
  if (frameEl) {
    showArtInfo(parseInt(frameEl.dataset.idx));
    spawnRipple(cx, cy);
    Sound.blip();
    return;
  }

  const playerHit = targetEl && targetEl.closest('#player-wrap');
  if (playerHit) {
    greetPlayer();
    spawnRipple(cx, cy);
    return;
  }

  const wx = cx + camX;
  let nearestDoorWx = null, nearestDoorDist = 9999;
  DOORS.forEach(d => { const dd = Math.abs(wx - d.wx); if (dd < nearestDoorDist) { nearestDoorDist = dd; nearestDoorWx = d.wx; } });
  playerTgWx = nearestDoorDist < 80 ? nearestDoorWx : Math.max(80, Math.min(WORLD_W - 80, wx));

  const now = Date.now();
  sprinting = (now - lastMoveTapTime) < 320;
  lastMoveTapTime = now;
  if (sprinting) {
    clearTimeout(sprintTimer);
    sprintTimer = setTimeout(() => { sprinting = false; }, 900);
  }

  spawnRipple(cx, cy);
  spawnDust(cx, cy);
}

let lastTapTime = 0;
document.addEventListener('touchstart', e => {
  e.preventDefault();
  handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, {passive: false});
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTapTime <= 300) e.preventDefault();
  lastTapTime = now;
}, {passive: false});
document.addEventListener('click', e => handleTap(e.clientX, e.clientY));
document.addEventListener('touchmove', e => e.preventDefault(), {passive: false});

/* ── BOOT ── */
function runBoot() {
  const overlay = document.getElementById('boot-overlay');
  const fill = document.getElementById('boot-bar-fill');
  const status = document.getElementById('boot-status');
  const lines = ['Warming the track lights…', 'Dusting the frames…', 'Aligning the plaques…', 'Welcome to the gallery.'];
  let pct = 0, li = 0, done = false;
  function finish() {
    if (done) return;
    done = true;
    overlay.classList.add('hide');
    setTimeout(() => {
      overlay.style.display = 'none';
      toast('Tap a frame to inspect a piece');
    }, 520);
  }
  const iv = setInterval(() => {
    pct = Math.min(100, pct + 5 + Math.random() * 9);
    fill.style.width = pct + '%';
    if (pct > (li + 1) * 25 && li < lines.length - 1) { li++; status.textContent = lines[li]; }
    if (pct >= 100) { clearInterval(iv); setTimeout(finish, 260); }
  }, 90);
  overlay.addEventListener('click', finish, {once: true});
}

/* ── INIT ── */
function init() {
  buildStars();
  buildWorld();
  const pw = document.getElementById('player-wrap');
  pw.style.bottom = '0px';
  wallsEl.appendChild(pw);
  requestAnimationFrame(ts => {
    lastTime = ts;
    requestAnimationFrame(frame);
  });
  runBoot();
}

window.addEventListener('resize', buildWorld);
init();
</script>
