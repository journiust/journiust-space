<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PINKKLISH · Station Omega</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --sab: env(safe-area-inset-bottom, 0px);
  --sat: env(safe-area-inset-top, 0px);
  --gold: #f0c96e;
  --gold2: #c8962a;
  --void: #02010a;
  --aurora: #b46fff;
  --cyan: #3ef0ff;
  --rose: #ff5fa0;
  --floor-h: 24vh;
  --ceil-h: 18vh;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{width:100%;height:100%;overflow:hidden;position:fixed;}
body{
  width:100%;height:100%;height:100dvh;overflow:hidden;
  position:fixed;top:0;left:0;
  background:var(--void);
  font-family:'Space Grotesk',sans-serif;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-text-size-adjust:100%;
  -webkit-tap-highlight-color:transparent;
}

/* ─── STARS LAYER ─── */
#stars-layer{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.star{
  position:absolute;border-radius:50%;
  animation:starTwinkle var(--d) ease-in-out infinite;
}
@keyframes starTwinkle{
  0%,100%{opacity:var(--a);transform:scale(1);}
  50%{opacity:calc(var(--a)*0.3);transform:scale(.6);}
}

/* ─── SCENE ─── */
#scene{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;z-index:1;}

/* ─── CEILING ─── */
#ceiling{
  padding-top:var(--sat);
  height:calc(var(--ceil-h) + var(--sat));
  flex-shrink:0;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#010009 0%,#05021a 60%,#0a0330 100%);
}
/* Ceiling grid — perspective lines */
#ceiling::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,
      transparent 0%,
      transparent calc(7% - 0.5px),
      rgba(180,111,255,.06) calc(7% - 0.5px),
      rgba(180,111,255,.06) 7%
    ),
    repeating-linear-gradient(0deg,
      transparent 0%,
      transparent calc(25% - 0.5px),
      rgba(180,111,255,.04) calc(25% - 0.5px),
      rgba(180,111,255,.04) 25%
    );
}
/* Ceiling bottom edge — the hero line */
#ceiling::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(180,111,255,.5) 15%,
    var(--cyan) 35%,
    var(--gold) 50%,
    var(--cyan) 65%,
    rgba(180,111,255,.5) 85%,
    transparent 100%
  );
  box-shadow:0 0 60px rgba(62,240,255,.35),0 0 120px rgba(62,240,255,.12);
}
/* Ambient ceiling glow blobs */
.ceil-orb{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:orbDrift var(--od) ease-in-out infinite alternate;
}
@keyframes orbDrift{from{transform:translate(0,0);}to{transform:translate(var(--ox),var(--oy));}}

/* ─── WALLS / MAIN AREA ─── */
#walls{
  flex:1;position:relative;overflow:hidden;min-height:0;
  background:
    radial-gradient(ellipse 100% 90% at 50% 30%,#0d0530 0%,#070220 50%,var(--void) 100%);
}

/* Atmospheric nebula blobs */
#nebula{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 45% at 25% 65%,rgba(180,111,255,.09) 0%,transparent 65%),
    radial-gradient(ellipse 45% 55% at 75% 35%,rgba(62,240,255,.06) 0%,transparent 65%),
    radial-gradient(ellipse 35% 30% at 50% 50%,rgba(240,201,110,.03) 0%,transparent 70%);
  animation:nebulaBreath 12s ease-in-out infinite alternate;
}
@keyframes nebulaBreath{
  from{opacity:.7;}to{opacity:1;}
}

/* Side wall vignettes */
#wall-l,#wall-r{
  position:absolute;top:0;bottom:0;width:38%;pointer-events:none;z-index:1;
}
#wall-l{left:0;background:linear-gradient(90deg,rgba(2,1,10,.96) 0%,rgba(8,4,28,.6) 55%,transparent 100%);clip-path:polygon(0 0,100% 20%,100% 80%,0 100%);}
#wall-r{right:0;background:linear-gradient(270deg,rgba(2,1,10,.96) 0%,rgba(8,4,28,.6) 55%,transparent 100%);clip-path:polygon(0 20%,100% 0,100% 100%,0 80%);}

/* Vanishing-point centre glow */
#vp-glow{
  position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  width:60%;height:120%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at center,rgba(62,240,255,.07) 0%,rgba(62,240,255,.02) 30%,transparent 65%);
}

/* ─── WORLD ─── */
#world{
  position:absolute;top:0;bottom:0;left:0;
  display:flex;align-items:flex-end;
  will-change:transform;z-index:2;
}

/* ─── COLUMNS ─── */
.arch-col{position:absolute;bottom:0;z-index:3;}
.col-body{
  width:100%;height:100%;
  background:linear-gradient(90deg,
    rgba(180,111,255,.03) 0%,
    rgba(220,190,255,.1) 20%,
    rgba(255,255,255,.06) 50%,
    rgba(220,190,255,.1) 80%,
    rgba(180,111,255,.03) 100%
  );
  border-left:1px solid rgba(180,111,255,.1);
  border-right:1px solid rgba(180,111,255,.1);
  position:relative;
}
.col-glow{
  position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);
  width:1px;
  background:linear-gradient(180deg,
    transparent 0%,
    rgba(180,111,255,.5) 15%,
    rgba(62,240,255,.4) 50%,
    rgba(180,111,255,.5) 85%,
    transparent 100%
  );
  animation:colPulse 3.5s ease-in-out infinite;
}
@keyframes colPulse{0%,100%{opacity:.3;}50%{opacity:1;}}
.col-cap{
  position:absolute;left:50%;transform:translateX(-50%);
  height:10px;width:36px;
  background:rgba(220,200,255,.05);
  border:1px solid rgba(180,111,255,.2);
}
.col-cap.t{top:0;border-top:none;border-radius:0 0 4px 4px;}
.col-cap.b{bottom:0;border-bottom:none;border-radius:4px 4px 0 0;}
/* LED gem on each cap */
.col-gem{
  position:absolute;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:1px;rotate:45deg;
  background:var(--gold);
  box-shadow:0 0 8px var(--gold);
  animation:gemBlink 2.8s ease-in-out infinite;
}
@keyframes gemBlink{0%,90%,100%{opacity:.9;}95%{opacity:.1;}}

/* ─── PORTHOLE ─── */
.porthole{
  position:absolute;border-radius:50%;overflow:hidden;
  border:2.5px solid rgba(240,201,110,.25);
  box-shadow:
    0 0 0 1px rgba(240,201,110,.07),
    0 0 40px rgba(62,240,255,.15),
    0 0 80px rgba(62,240,255,.06),
    inset 0 0 40px rgba(0,0,0,.8);
  z-index:4;
}
.porthole-inner{
  width:100%;height:100%;
  position:relative;overflow:hidden;
}
/* Starfield in porthole */
.p-stars{position:absolute;inset:0;}
.p-star{
  position:absolute;border-radius:50%;
  animation:pStarBlink var(--pd) ease-in-out infinite;
}
@keyframes pStarBlink{0%,100%{opacity:var(--pa);}50%{opacity:.05;}}
.p-planet{position:absolute;border-radius:50%;overflow:hidden;}
.p-atmo{/* atmosphere haze rim */
  position:absolute;inset:-3px;border-radius:50%;
  animation:atmoPulse 4s ease-in-out infinite;
}
@keyframes atmoPulse{0%,100%{opacity:.5;}50%{opacity:1;}}
.p-glare{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.18);
  filter:blur(3px);
}
.p-cloud{position:absolute;border-radius:100px;opacity:.18;}
.p-ring-wrap{position:absolute;pointer-events:none;}
.p-ring{
  position:absolute;border-radius:50%;
  border-width:2px;border-style:solid;
  transform:rotateX(72deg);
}
.port-rivet{
  position:absolute;width:6px;height:6px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,rgba(240,201,110,.7),rgba(140,100,40,.4));
  border:1px solid rgba(240,201,110,.2);
  box-shadow:0 0 6px rgba(240,201,110,.3);
}
.port-frame-ring{
  position:absolute;inset:-5px;border-radius:50%;
  border:1px solid rgba(240,201,110,.08);
  pointer-events:none;
}
.port-scan{
  position:absolute;left:0;right:0;height:60%;
  border-radius:50%;
  background:linear-gradient(180deg,
    transparent 0%,
    rgba(62,240,255,.04) 60%,
    rgba(62,240,255,.08) 80%,
    transparent 100%
  );
  animation:portScan 8s linear infinite;
  top:-60%;
}
@keyframes portScan{0%{top:-60%;}100%{top:100%;}}

/* ─── STATUS PANELS ─── */
.stat-panel{
  position:absolute;
  background:rgba(2,1,12,.88);
  border:1px solid rgba(180,111,255,.15);
  border-radius:10px;
  padding:11px 13px;
  overflow:hidden;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.stat-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(62,240,255,.4),rgba(180,111,255,.3),transparent);
}
.sp-label{
  font-family:'Space Mono',monospace;
  font-size:6.5px;letter-spacing:3px;
  color:rgba(180,111,255,.5);
  text-transform:uppercase;margin-bottom:9px;
}
.sp-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.sp-dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;
  animation:spDot 2.4s ease-in-out infinite;
}
@keyframes spDot{0%,88%,100%{opacity:1;transform:scale(1);}94%{opacity:.1;transform:scale(.6);}}
.sp-track{
  flex:1;height:2.5px;
  background:rgba(255,255,255,.04);
  border-radius:3px;overflow:hidden;
}
.sp-fill{
  height:100%;border-radius:3px;
  animation:spFill 3s ease-in-out infinite;
  transform-origin:left;
}
@keyframes spFill{0%,100%{opacity:.4;transform:scaleX(.6);}50%{opacity:1;transform:scaleX(1);}}
.sp-val{
  font-family:'Space Mono',monospace;font-size:6.5px;
  color:rgba(255,255,255,.22);letter-spacing:.5px;flex-shrink:0;
}
/* Mini waveform inside panel */
.sp-wave{
  width:100%;height:18px;margin-top:5px;overflow:hidden;position:relative;
}
.sp-wave canvas{width:100%;height:100%;}

/* ─── DOOR ─── */
.door-wrap{
  position:absolute;bottom:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;
  --door-r:196;--door-g:122;--door-b:255;
}
.door-arch{
  width:138px;height:24px;
  background:linear-gradient(180deg,rgba(180,111,255,.12),transparent);
  border:1px solid rgba(180,111,255,.22);
  border-bottom:none;border-radius:70px 70px 0 0;
  position:relative;overflow:hidden;
}
.door-arch::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:35%;height:100%;
  background:linear-gradient(180deg,rgba(240,201,110,.18),transparent);
}
/* Arch arc light */
.door-arch-light{
  position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:70px 70px 0 0;
  border:1px solid transparent;
  transition:border-color .4s;pointer-events:none;
}
.door-wrap.near .door-arch-light{
  border-color:rgba(var(--door-r),var(--door-g),var(--door-b),.45);
  box-shadow:0 0 30px rgba(var(--door-r),var(--door-g),var(--door-b),.2);
}
.door-pillars{display:flex;align-items:stretch;position:relative;}
.door-pillar{
  width:14px;
  background:linear-gradient(90deg,rgba(180,111,255,.03),rgba(220,200,255,.09),rgba(180,111,255,.03));
  border:1px solid rgba(180,111,255,.12);
  position:relative;overflow:hidden;
}
.door-pillar::after{
  content:'';position:absolute;top:0;bottom:0;left:50%;width:1px;
  background:linear-gradient(180deg,transparent,rgba(62,240,255,.2),transparent);
}
.door-pillar.l{border-right:none;}
.door-pillar.r{border-left:none;}
.door-body{
  width:110px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#020112,#010009);
  border-left:1px solid rgba(180,111,255,.1);
  border-right:1px solid rgba(180,111,255,.1);
  transition:border-color .3s;
}
/* Door scanline */
.door-scan{
  position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,rgba(62,240,255,.7),transparent);
  opacity:0;top:0;
  animation:dScan 2.8s linear infinite;
  transition:opacity .3s;
  filter:blur(1px);
}
@keyframes dScan{0%{top:0%;}100%{top:100%;}}
.door-wrap.near .door-scan{opacity:1;}
.door-wrap.near .door-body{border-color:rgba(var(--door-r),var(--door-g),var(--door-b),.4);}
/* Door interior atmosphere */
.door-atmo{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(var(--door-r),var(--door-g),var(--door-b),.04),transparent);
  transition:opacity .4s;opacity:0;
}
.door-wrap.near .door-atmo{opacity:1;}
/* Door particles */
.door-particle{
  position:absolute;width:2px;height:2px;border-radius:50%;
  background:rgba(var(--door-r),var(--door-g),var(--door-b),.8);
  animation:dParticle var(--dp) ease-in-out infinite;
  opacity:0;
}
@keyframes dParticle{
  0%{opacity:0;transform:translateY(0) scale(1);}
  20%{opacity:.8;}
  100%{opacity:0;transform:translateY(-60px) scale(0);}
}
.door-wrap.near .door-particle{opacity:1;}
.door-inner{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;padding:22px 10px;text-align:center;
}
.door-glyph{
  font-size:34px;line-height:1;
  opacity:.3;
  transition:opacity .35s,transform .4s cubic-bezier(.22,1,.36,1),filter .35s;
  filter:saturate(0) blur(1px);
}
.door-wrap.near .door-glyph{
  opacity:1;
  filter:saturate(1) drop-shadow(0 0 20px rgba(var(--door-r),var(--door-g),var(--door-b),.9)) blur(0px);
  transform:scale(1.15) translateY(-3px);
}
.door-name{
  font-size:10.5px;font-weight:700;
  color:rgba(255,255,255,.18);
  letter-spacing:2.5px;text-transform:uppercase;
  transition:color .3s;
}
.door-wrap.near .door-name{color:rgba(255,255,255,.9);}
.door-sub{
  font-family:'Space Mono',monospace;
  font-size:8.5px;font-weight:400;
  color:transparent;
  letter-spacing:.5px;
  transition:color .3s;
}
.door-wrap.near .door-sub{color:rgba(var(--door-r),var(--door-g),var(--door-b),.5);}
/* Keypad on pillar */
.door-keypad{
  position:absolute;right:-18px;top:25%;
  width:12px;
  background:rgba(2,1,12,.95);
  border:1px solid rgba(240,201,110,.2);
  border-radius:4px;padding:7px 3px;
  display:flex;flex-direction:column;align-items:center;gap:7px;z-index:12;
}
.kp-dot{
  width:5px;height:5px;border-radius:1px;rotate:45deg;
  animation:kpBlink 2s ease-in-out infinite;
}
@keyframes kpBlink{0%,100%{opacity:1;box-shadow:0 0 6px currentColor;}50%{opacity:.15;box-shadow:none;}}
.door-threshold{
  width:calc(100% + 26px);height:3px;
  background:linear-gradient(90deg,
    transparent,
    rgba(var(--door-r),var(--door-g),var(--door-b),.12) 10%,
    rgba(240,201,110,.5) 50%,
    rgba(var(--door-r),var(--door-g),var(--door-b),.12) 90%,
    transparent
  );
  opacity:.25;transition:opacity .3s,box-shadow .3s;
}
.door-wrap.near .door-threshold{
  opacity:1;
  box-shadow:0 0 20px rgba(240,201,110,.3),0 -2px 30px rgba(var(--door-r),var(--door-g),var(--door-b),.2);
}
/* Door number plate */
.door-numplate{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(2,1,12,.9);
  border:1px solid rgba(240,201,110,.25);
  border-radius:3px;padding:3px 8px;
  font-family:'Space Mono',monospace;font-size:7px;
  color:rgba(240,201,110,.5);letter-spacing:2px;
  white-space:nowrap;
}

/* ─── FLOOR ─── */
#floor{
  height:calc(var(--floor-h) + var(--sab));
  flex-shrink:0;position:relative;overflow:hidden;
  padding-bottom:var(--sab);
}
/* Reflective floor tiles — perspective grid */
#floor::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(62,240,255,.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(62,240,255,.055) 1px,transparent 1px);
  background-size:80px 40px;
  transform:perspective(300px) rotateX(22deg);
  transform-origin:top center;
}
/* Foor reflection sheen */
#floor::after{
  content:'';position:absolute;top:0;left:0;right:0;height:55%;
  background:linear-gradient(180deg,rgba(62,240,255,.05) 0%,transparent 100%);
}
#floor-top-line{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(62,240,255,.6) 20%,
    var(--gold) 50%,
    rgba(62,240,255,.6) 80%,
    transparent 100%
  );
  box-shadow:0 0 30px rgba(62,240,255,.4),0 2px 60px rgba(62,240,255,.15);
}
#floor-base{
  position:absolute;inset:0;
  background:linear-gradient(0deg,#010009 0%,#030720 100%);
  z-index:-1;
}

/* ─── PLAYER ─── */
#player-wrap{
  position:absolute;bottom:0;z-index:20;
  transition:left .07s linear;
  transform:translateX(-50%);
  filter:drop-shadow(0 0 20px rgba(62,240,255,.2));
}
#player-wrap.face-left #crew-svg{transform:scaleX(-1);}
#crew-svg{
  width:70px;height:192px;
  overflow:visible;display:block;margin:0 auto;
  animation:crewIdle 3.4s ease-in-out infinite;
  transform-origin:center bottom;
}
@keyframes crewIdle{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.player-walking #crew-svg{
  animation:crewBob .38s ease-in-out infinite alternate;
}
@keyframes crewBob{from{transform:translateY(0);}to{transform:translateY(-3px);}}
#crew-shadow{
  width:52px;height:10px;margin:-2px auto 0;
  background:radial-gradient(ellipse,rgba(62,240,255,.22) 0%,transparent 70%);
  animation:shadowPulse 3.4s ease-in-out infinite;
}
@keyframes shadowPulse{0%,100%{opacity:.6;transform:scaleX(1);}50%{opacity:1;transform:scaleX(1.08);}}
/* Walk cycle */
.player-walking #arm-l{animation:wAL .36s ease-in-out infinite alternate;transform-origin:22px 80px;}
.player-walking #arm-r{animation:wAR .36s ease-in-out infinite alternate;transform-origin:66px 80px;}
.player-walking #leg-l{animation:wLL .36s ease-in-out infinite alternate;transform-origin:34px 132px;}
.player-walking #leg-r{animation:wLR .36s ease-in-out infinite alternate;transform-origin:54px 132px;}
@keyframes wAL{from{transform:rotate(-18deg);}to{transform:rotate(22deg);}}
@keyframes wAR{from{transform:rotate(18deg);}to{transform:rotate(-22deg);}}
@keyframes wLL{from{transform:rotate(-20deg);}to{transform:rotate(18deg);}}
@keyframes wLR{from{transform:rotate(20deg);}to{transform:rotate(-18deg);}}
/* Character glow elements */
@keyframes badgePulse{0%,100%{opacity:.6;}50%{opacity:1;}}
@keyframes visorPulse{0%,100%{opacity:.25;}50%{opacity:.85;}}
@keyframes tabletBlink{0%,100%{opacity:.4;}50%{opacity:.95;}}
@keyframes headTilt{0%,100%{transform:rotate(0);}35%{transform:rotate(.8deg);}75%{transform:rotate(-.6deg);}}
.badge-glow{animation:badgePulse 1.9s ease-in-out infinite;}
.visor-glow{animation:visorPulse 2.8s ease-in-out infinite;}
.tab-glow{animation:tabletBlink 2.3s ease-in-out infinite;}
.rank-pulse{animation:badgePulse 1.8s ease-in-out infinite;}
#head-g{animation:headTilt 4.2s ease-in-out infinite;transform-origin:44px 38px;}

/* ─── HUD / UI ─── */
#sector-chip{
  position:fixed;
  top:calc(var(--sat) + 14px);
  left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  padding:8px 20px;
  background:rgba(2,1,12,.7);
  border:1px solid rgba(240,201,110,.16);
  border-radius:100px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  z-index:100;white-space:nowrap;
  box-shadow:0 0 30px rgba(240,201,110,.07),inset 0 1px 0 rgba(255,255,255,.06);
}
#sc-icon{
  width:7px;height:7px;border-radius:1px;rotate:45deg;
  background:var(--gold);
  box-shadow:0 0 8px var(--gold);
  flex-shrink:0;
}
#sc-name{
  font-size:10px;font-weight:600;letter-spacing:3.5px;
  text-transform:uppercase;color:rgba(240,201,110,.55);
}
#sc-sep{width:1px;height:12px;background:rgba(255,255,255,.08);}
#sc-coord{
  font-family:'Space Mono',monospace;
  font-size:8px;color:rgba(180,111,255,.4);letter-spacing:2px;
}
/* Ambient status dot */
#sc-live{
  width:5px;height:5px;border-radius:50%;
  background:#3ef0ff;
  box-shadow:0 0 8px #3ef0ff;
  animation:livePulse 1.6s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.2;}}

/* Nav hint — bottom left */
#nav-hint{
  position:fixed;
  bottom:calc(var(--sab) + 18px);
  left:20px;
  font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:2px;
  color:rgba(255,255,255,.14);
  text-transform:uppercase;
  z-index:100;
  pointer-events:none;
}

/* ─── DOOR CARD ─── */
#door-card{
  position:fixed;
  bottom:calc(var(--sab) + 18px);
  left:50%;transform:translateX(-50%) translateY(20px);
  width:min(310px,88vw);
  background:rgba(4,2,16,.88);
  border:1px solid rgba(240,201,110,.14);
  border-radius:22px;
  padding:18px 20px;
  display:flex;align-items:center;gap:15px;
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  opacity:0;pointer-events:none;z-index:100;
  transition:opacity .3s,transform .45s cubic-bezier(.22,1,.36,1);
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.06);
}
#door-card::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(240,201,110,.45),transparent);
}
#door-card.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
#dc-icon{
  width:46px;height:46px;flex-shrink:0;
  border-radius:14px;
  background:rgba(180,111,255,.1);
  border:1px solid rgba(180,111,255,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 0 20px rgba(180,111,255,.1);
}
#dc-name{font-size:13.5px;font-weight:700;color:rgba(255,255,255,.9);}
#dc-sub{
  font-family:'Space Mono',monospace;font-size:9px;
  color:rgba(180,111,255,.45);margin-top:4px;letter-spacing:.5px;
}
#dc-cta{
  margin-left:auto;flex-shrink:0;
  font-family:'Space Mono',monospace;font-size:8.5px;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(240,201,110,.45);white-space:nowrap;
}

/* ─── EFFECTS ─── */
.ripple{
  position:fixed;pointer-events:none;z-index:50;
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(240,201,110,.4);
  transform:translate(-50%,-50%) scale(0);
  animation:rippleOut .55s cubic-bezier(.2,.7,.3,1) forwards;
}
@keyframes rippleOut{
  to{transform:translate(-50%,-50%) scale(3.5);opacity:0;}
}
.ripple2{
  position:fixed;pointer-events:none;z-index:50;
  width:20px;height:20px;border-radius:50%;
  border:1px solid rgba(62,240,255,.3);
  transform:translate(-50%,-50%) scale(0);
  animation:rippleOut .4s .08s cubic-bezier(.2,.7,.3,1) forwards;
}
.dust{
  position:fixed;pointer-events:none;z-index:49;
  width:3px;height:3px;border-radius:50%;
  animation:dustFloat 3.5s ease-out forwards;
}
@keyframes dustFloat{
  0%{opacity:.7;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);}
}
/* Warp flash */
#warp-flash{
  position:fixed;inset:0;z-index:9998;
  pointer-events:none;opacity:0;
  background:radial-gradient(ellipse at center,rgba(62,240,255,.4) 0%,rgba(180,111,255,.3) 40%,rgba(2,1,12,1) 70%);
  transition:opacity .25s ease;
}

          <path d="M21 43Q16 46 15 52Q15 55 18 56" fill="none" stroke="#0c1428" stroke-width="2" stroke-linecap="round"/>
          <path d="M21 43Q16 46 15 52Q15 55 18 56" fill="none" stroke="rgba(0,170,210,.45)" stroke-width=".7" stroke-linecap="round"/>
          <ellipse cx="18" cy="57" rx="3.5" ry="2.5" fill="#0a1428" stroke="rgba(0,190,220,.58)" stroke-width=".8"/>
          <ellipse cx="18" cy="57" rx="1.8" ry="1.2" fill="rgba(0,30,70,.9)" stroke="rgba(0,220,240,.35)" stroke-width=".4"/>
          <!-- HUD visor -->
          <rect x="46" y="31" width="18" height="6" rx="2" fill="rgba(0,15,38,.8)" stroke="rgba(0,210,230,.42)" stroke-width=".7"/>
          <rect x="47.5" y="32.5" width="15" height="3" rx="1" fill="url(#visorG)" class="visor-glow"/>
          <text x="48.5" y="35.5" font-family="monospace" font-size="2.2" fill="rgba(0,245,210,.8)">ALT 402km</text>
          <!-- Right earpiece -->
          <rect x="58" y="34" width="7" height="9" rx="2.5" fill="#0a1428" stroke="rgba(0,190,220,.46)" stroke-width=".8"/>
          <line x1="59.5" y1="37" x2="63.5" y2="37" stroke="rgba(0,220,240,.3)" stroke-width=".5"/>
          <line x1="59.5" y1="39.5" x2="63.5" y2="39.5" stroke="rgba(0,220,240,.3)" stroke-width=".5"/>
          <circle cx="63.5" cy="35.5" r="1.2" fill="rgba(0,220,250,.85)" class="rank-pulse" style="animation-delay:.8s"/>
        </g>
      </svg>
      <div id="crew-shadow"></div>
    </div>
  </div>

  <div id="floor">
    <div id="floor-base"></div>
    <div id="floor-top-line"></div>
    <div id="floor-sheen" style="position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(62,240,255,.04),transparent);pointer-events:none;"></div>
  </div>
</div>

<!-- HUD -->
<div id="sector-chip">
  <div id="sc-live"></div>
  <div id="sc-icon"></div>
  <div id="sc-name">Stimulation Zone</div>
  <div id="sc-sep"></div>
  <div id="sc-coord">·7084·</div>
</div>

<div id="nav-hint">Tap to navigate</div>

<div id="door-card">
  <div id="dc-icon">℗</div>
  <div>
    <div id="dc-name">Stimulation Room</div>
    <div id="dc-sub">→ P Stella Station</div>
  </div>
  <div id="dc-cta">Enter →</div>
</div>

<script>
'use strict';

/* ── CONSTANTS ── */
const WORLD_W = 5200;
const DOOR = {wx:580, label:'Stimulation Room', sub:'Destination · P-Stella', url:'rocket.html', icon:'℗', r:196, g:122, b:255};
const COL_POSITIONS = [];
for (let x = 220; x < WORLD_W; x += 480) COL_POSITIONS.push(x);
const PORT_DATA = [
  {wx:440,  sz:110, pal:['#7c3aed','#4c1d95','#1e0a58','#a855f7'], atmo:'rgba(168,85,247,.3)'},
  {wx:1100, sz:90,  pal:['#0e7490','#164e63','#042f3e','#22d3ee'], atmo:'rgba(34,211,238,.25)'},
  {wx:1800, sz:120, pal:['#c2410c','#7c2d12','#3d0f05','#fb923c'], atmo:'rgba(251,146,60,.25)'},
  {wx:2400, sz:100, pal:['#065f46','#064e3b','#022c22','#34d399'], atmo:'rgba(52,211,153,.2)'},
  {wx:3100, sz:110, pal:['#be185d','#831843','#4a0727','#f472b6'], atmo:'rgba(244,114,182,.25)'},
  {wx:3900, sz:90,  pal:['#1d4ed8','#1e3a8a','#0f1f50','#60a5fa'], atmo:'rgba(96,165,250,.2)'},
  {wx:4600, sz:105, pal:['#92400e','#78350f','#3d1a04','#fbbf24'], atmo:'rgba(251,191,36,.22)'},
];
const STAT_POS = [350,760,1160,1620,2050,2480,2900,3350,3780,4200,4680];

/* ── STARS ── */
function buildStars() {
  const layer = document.getElementById('stars-layer');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() < .8 ? 1 : (Math.random() < .7 ? 1.5 : 2);
    const alpha = .2 + Math.random() * .6;
    const dur = 2 + Math.random() * 5;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*60}%;
      background:${Math.random()<.9?'#fff':Math.random()<.5?'#b0e8ff':'#ffd6b0'};
      --a:${alpha};--d:${dur}s;
      animation-delay:${Math.random()*6}s;
    `;
    layer.appendChild(s);
  }
}

/* ── STATE ── */
let playerWx = 260, playerTgWx = 260;
let facing = 1, moving = false, warping = false;
let camX = 0, camXVel = 0, lastTime = 0, doorNear = false;
const worldEl = document.getElementById('world');
const wallsEl = document.getElementById('walls');

function wallsH() { return wallsEl.offsetHeight; }
function VW() { return window.innerWidth; }

/* ── BUILD PORTHOLE ── */
function buildPorthole(pp, wallH) {
  const S = pp.sz;
  const fb = wallH * .28 + (PORT_DATA.indexOf(pp) % 2) * 22;
  const el = document.createElement('div');
  el.className = 'porthole';
  el.style.cssText = `left:${pp.wx - S/2}px;bottom:${fb}px;width:${S}px;height:${S}px;`;

  /* planet size & position */
  const ps = Math.round(S * .36);
  const pr = Math.round(S * .08), pb = Math.round(S * .12);

  /* random stars inside */
  let starHTML = '';
  for (let i = 0; i < 18; i++) {
    const sw = Math.random() < .7 ? 1 : 1.5;
    const sa = .4 + Math.random() * .5;
    const sd = 1.5 + Math.random() * 4;
    starHTML += `<div class="p-star" style="width:${sw}px;height:${sw}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:#fff;--pa:${sa};--pd:${sd}s;animation-delay:${Math.random()*4}s;"></div>`;
  }

  /* ring params */
  const rw = ps + 20, rh = Math.round(rw * .3);
  const rl = Math.round(S * .5 - rw/2), rb = Math.round(S * .12 + ps * .26);

  el.innerHTML = `
    <div class="porthole-inner" style="background:radial-gradient(ellipse at 40% 35%,${pp.pal[0]} 0%,${pp.pal[1]} 40%,${pp.pal[2]} 100%);">
      <div class="p-stars">${starHTML}</div>
      <div class="p-planet" style="width:${ps}px;height:${ps}px;right:${pr}%;bottom:${pb}%;background:radial-gradient(circle at 34% 28%,${pp.pal[3]} 0%,${pp.pal[0]} 40%,${pp.pal[2]} 100%);">
        <div style="position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 55%);border-radius:50%;"></div>
        <div class="p-cloud" style="width:55%;height:22%;top:22%;left:10%;background:#fff;transform:rotate(-5deg);"></div>
        <div class="p-cloud" style="width:40%;height:18%;top:55%;left:30%;background:#fff;transform:rotate(3deg);"></div>
      </div>
      <div class="p-atmo" style="background:radial-gradient(circle,transparent 50%,${pp.atmo} 70%,transparent 80%);"></div>
      <div class="p-glare" style="width:28%;height:28%;top:8%;left:12%;"></div>
      <div class="p-ring-wrap" style="width:${rw}px;height:${rh}px;bottom:${rb}px;left:${rl}px;">
        <div class="p-ring" style="width:${rw}px;height:${rh}px;left:0;top:0;border-color:${pp.pal[3]}55;"></div>
      </div>
      <div class="port-scan"></div>
    </div>
    <div class="port-frame-ring"></div>
  `;

  /* rivets */
  [0, 90, 180, 270].forEach(angle => {
    const rad = (angle - 45) * Math.PI / 180;
    const rv = S / 2 - 2;
    const rx = Math.round(S/2 + rv * Math.cos(rad) - 3);
    const ry = Math.round(S/2 + rv * Math.sin(rad) - 3);
    const riv = document.createElement('div');
    riv.className = 'port-rivet';
    riv.style.cssText = `left:${rx}px;top:${ry}px;`;
    el.appendChild(riv);
  });
  return el;
}

/* ── BUILD STAT PANEL ── */
function buildStatPanel(px, i, wallH) {
  const el = document.createElement('div');
  el.className = 'stat-panel';
  el.style.cssText = `left:${px - 54}px;bottom:${wallH * .52}px;width:108px;`;
  const colors = ['rgba(62,240,255,1)', 'rgba(180,111,255,1)', 'rgba(240,201,110,1)'];
  const vals = [
    {w: .75 + Math.random()*.22, v: (75 + Math.random()*22).toFixed(1) + '%'},
    {w: .55 + Math.random()*.32, v: (55 + Math.random()*32).toFixed(1) + '%'},
    {w: .65 + Math.random()*.28, v: (65 + Math.random()*28).toFixed(1) + '%'},
  ];
  let inner = `<div class="sp-label">UNIT-${String(i+1).padStart(2,'0')}</div>`;
  vals.forEach((val, ri) => {
    inner += `<div class="sp-row">
      <div class="sp-dot" style="background:${colors[ri]};box-shadow:0 0 6px ${colors[ri]};animation-delay:${ri*.55+i*.12}s;"></div>
      <div class="sp-track"><div class="sp-fill" style="width:${val.w*100}%;background:${colors[ri]};animation-delay:${ri*.4+i*.15}s;"></div></div>
      <div class="sp-val">${val.v}</div>
    </div>`;
  });
  el.innerHTML = inner;
  return el;
}

/* ── BUILD DOOR ── */
function buildDoor(d, wallH) {
  const dh = Math.round(wallH * .76);
  const el = document.createElement('div');
  el.className = 'door-wrap';
  el.id = 'door-0';
  el.style.cssText = `left:${d.wx}px;transform:translateX(-50%);`;
  el.style.setProperty('--door-r', d.r);
  el.style.setProperty('--door-g', d.g);
  el.style.setProperty('--door-b', d.b);

  /* particles inside door */
  let particles = '';
  for (let i = 0; i < 8; i++) {
    const left = 10 + Math.random() * 80;
    const dur = 1.5 + Math.random() * 2;
    const delay = Math.random() * 3;
    particles += `<div class="door-particle" style="left:${left}%;bottom:${10 + Math.random()*40}%;--dp:${dur}s;animation-delay:${delay}s;"></div>`;
  }

  el.innerHTML = `
    <div class="door-arch"><div class="door-arch-light"></div></div>
    <div class="door-pillars">
      <div class="door-pillar l"></div>
      <div class="door-body" style="height:${dh}px">
        <div class="door-scan"></div>
        <div class="door-atmo"></div>
        ${particles}
        <div class="door-inner">
          <div class="door-glyph" style="color:rgba(${d.r},${d.g},${d.b},1)">${d.icon}</div>
          <div class="door-name">${d.label}</div>
          <div class="door-sub">${d.sub}</div>
        </div>
        <div class="door-numplate">A-07 · GATE 3</div>
        <div class="door-keypad">
          <div class="kp-dot" style="background:#ff5f72;color:#ff5f72;animation-delay:0s;box-shadow:0 0 6px #ff5f72;"></div>
          <div class="kp-dot" style="background:#3ef0b4;color:#3ef0b4;animation-delay:.8s;box-shadow:0 0 6px #3ef0b4;"></div>
          <div class="kp-dot" style="background:var(--gold);color:var(--gold);animation-delay:1.6s;box-shadow:0 0 6px var(--gold);"></div>
        </div>
      </div>
      <div class="door-pillar r"></div>
    </div>
    <div class="door-threshold"></div>
  `;
  return el;
}

/* ── BUILD WORLD ── */
function buildWorld() {
  worldEl.innerHTML = '';
  worldEl.style.width = WORLD_W + 'px';
  const wH = wallsH();

  /* columns */
  COL_POSITIONS.forEach(cx => {
    const el = document.createElement('div');
    el.className = 'arch-col';
    el.style.cssText = `left:${cx}px;height:100%;width:20px;`;
    el.innerHTML = `
      <div class="col-cap t"><div class="col-gem" style="top:-3px;"></div></div>
      <div class="col-body"><div class="col-glow"></div></div>
      <div class="col-cap b"></div>
    `;
    worldEl.appendChild(el);
  });

  /* portholes */
  PORT_DATA.forEach(pp => {
    worldEl.appendChild(buildPorthole(pp, wH));
  });

  /* stat panels */
  STAT_POS.forEach((px, i) => {
    worldEl.appendChild(buildStatPanel(px, i, wH));
  });

  /* door */
  worldEl.appendChild(buildDoor(DOOR, wH));

  /* ceiling gems update */
  const ceil = document.getElementById('ceiling');
  ceil.querySelectorAll('.ceil-gem').forEach(g => g.remove());
  for (let gx = 0; gx < WORLD_W; gx += 130) {
    const g = document.createElement('div');
    g.style.cssText = `position:absolute;bottom:4px;width:5px;height:5px;border-radius:1px;background:var(--gold);opacity:.22;transform:rotate(45deg);box-shadow:0 0 4px var(--gold);`;
    g.className = 'ceil-gem';
    g.dataset.wx = gx;
    ceil.appendChild(g);
  }
}

/* ── CAMERA & LOOP ── */
function updateCamera() {
  const target = Math.max(0, Math.min(WORLD_W - VW(), playerWx - VW() * .4));
  camXVel += (target - camX) * .11;
  camXVel *= .72;
  camX += camXVel;
}

function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min((ts - lastTime) / 1000, .05);
  lastTime = ts;
  if (warping) return;

  const dx = playerTgWx - playerWx;
  const dist = Math.abs(dx);
  if (dist > 2) {
    playerWx += Math.sign(dx) * Math.min(6.5 * (dt / .01667) * Math.min(1, dist / 80), dist - 2);
    playerWx = Math.max(80, Math.min(WORLD_W - 80, playerWx));
    facing = Math.sign(dx);
    moving = true;
  } else {
    moving = false;
    playerTgWx = playerWx;
  }

  updateCamera();
  worldEl.style.transform = `translateX(${-camX}px)`;

  const pw = document.getElementById('player-wrap');
  pw.style.left = (playerWx - camX) + 'px';
  if (moving) {
    pw.classList.add('player-walking');
    pw.classList.toggle('face-left', facing < 0);
  } else {
    pw.classList.remove('player-walking');
  }

  /* door proximity */
  const dd = Math.abs(playerWx - DOOR.wx);
  const dEl = document.getElementById('door-0');
  if (dEl) dEl.classList.toggle('near', dd < 160);
  const wasNear = doorNear;
  doorNear = dd < 140;
  if (doorNear !== wasNear) document.getElementById('door-card').classList.toggle('on', doorNear);

  /* warp trigger */
  if (dd < 28 && !warping) {
    warping = true;
    document.getElementById('door-card').classList.remove('on');
    /* warp flash effect */
    const flash = document.getElementById('warp-flash');
    flash.style.transition = 'opacity .4s ease';
    flash.style.opacity = '1';
    setTimeout(() => { window.location.href = DOOR.url; }, 700);
  }

  /* ceiling gems */
  document.querySelectorAll('.ceil-gem').forEach(g => {
    const wx = parseInt(g.dataset.wx);
    const sx = wx - camX;
    g.style.left = sx + 'px';
    g.style.display = (sx < -20 || sx > VW() + 20) ? 'none' : '';
  });
}

/* ── INPUT ── */
function spawnDust(cx, cy) {
  const colors = ['rgba(240,201,110,.75)', 'rgba(180,111,255,.75)', 'rgba(62,240,255,.75)', 'rgba(255,95,160,.6)'];
  for (let i = 0; i < 8; i++) {
    const d = document.createElement('div');
    d.className = 'dust';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 28 + Math.random() * 55;
    d.style.setProperty('--dx', `${Math.cos(angle)*dist}px`);
    d.style.setProperty('--dy', `${Math.sin(angle)*dist - 24}px`);
    d.style.left = cx + 'px';
    d.style.top = cy + 'px';
    d.style.background = colors[i % colors.length];
    d.style.animationDelay = (Math.random() * .15) + 's';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 3600);
  }
}

function handleTap(cx, cy) {
  if (warping) return;
  const wx = cx + camX;
  playerTgWx = Math.abs(wx - DOOR.wx) < 80 ? DOOR.wx : Math.max(80, Math.min(WORLD_W - 80, wx));

  /* ripple rings */
  [0, 80].forEach(delay => {
    const r = document.createElement('div');
    r.className = delay === 0 ? 'ripple' : 'ripple2';
    r.style.left = cx + 'px';
    r.style.top = cy + 'px';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 700);
  });

  spawnDust(cx, cy);
}

let lastTapTime = 0;
document.addEventListener('touchstart', e => {
  e.preventDefault();
  handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, {passive: false});
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTapTime <= 300) e.preventDefault();
  lastTapTime = now;
}, {passive: false});
document.addEventListener('click', e => handleTap(e.clientX, e.clientY));
document.addEventListener('touchmove', e => e.preventDefault(), {passive: false});

/* ── INIT ── */
function init() {
  buildStars();
  buildWorld();
  const pw = document.getElementById('player-wrap');
  pw.style.bottom = '0px';
  wallsEl.appendChild(pw);
  requestAnimationFrame(ts => {
    lastTime = ts;
    requestAnimationFrame(frame);
  });
}

window.addEventListener('resize', buildWorld);
init();
</script>
</body>
</html>
