<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>PINKKLISH · Station</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sab: env(safe-area-inset-bottom, 0px);
  --sat: env(safe-area-inset-top, 0px);
  --gold: #e8c87a;
  --void: #030209;
  --accent-a: #c47aff;
  --accent-b: #7af0ff;
  --floor-h: 26vh;
  --ceil-h: 20vh;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{width:100%;height:100%;overflow:hidden;position:fixed;}
body{width:100%;height:100%;height:100dvh;overflow:hidden;position:fixed;top:0;left:0;background:var(--void);font-family:'Syne',sans-serif;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;}
#loader{position:fixed;inset:0;z-index:9999;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.35s ease;}
#loader.show{opacity:1;pointer-events:all;}
.load-ring{width:58px;height:58px;border-radius:50%;border:2px solid rgba(232,200,122,.12);border-top-color:var(--gold);animation:spin 1.1s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:4px;color:rgba(232,200,122,.6);text-transform:uppercase;}
#scene{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}
#ceiling{padding-top:var(--sat);height:calc(var(--ceil-h) + var(--sat));flex-shrink:0;position:relative;overflow:hidden;background:linear-gradient(180deg,#020108 0%,#060318 50%,#0b0520 100%);}
#ceiling::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0px,transparent calc(8% - 1px),rgba(196,122,255,0.035) calc(8% - 1px),rgba(196,122,255,0.035) 8%);}
#ceiling::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-a) 25%,var(--gold) 50%,var(--accent-a) 75%,transparent);opacity:.55;box-shadow:0 0 30px rgba(196,122,255,.4);}
.cornice-gem{position:absolute;bottom:4px;width:6px;height:6px;border-radius:1px;background:var(--gold);opacity:.25;transform:rotate(45deg);}
#walls{flex:1;position:relative;overflow:hidden;min-height:0;background:radial-gradient(ellipse 120% 80% at 50% 50%,#0e052a 0%,#06031a 40%,var(--void) 100%);}
#nebula-bg{position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 30% 60%,rgba(196,122,255,.06) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 70% 40%,rgba(122,240,255,.04) 0%,transparent 60%);}
#wall-left,#wall-right{position:absolute;top:0;bottom:0;width:42%;pointer-events:none;z-index:1;}
#wall-left{left:0;background:linear-gradient(90deg,rgba(3,2,10,.95) 0%,rgba(8,5,25,.7) 50%,transparent 100%);clip-path:polygon(0 0,100% 28%,100% 72%,0 100%);}
#wall-right{right:0;background:linear-gradient(270deg,rgba(3,2,10,.95) 0%,rgba(8,5,25,.7) 50%,transparent 100%);clip-path:polygon(0 28%,100% 0,100% 100%,0 72%);}
#vp-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:55%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,rgba(196,122,255,.08) 0%,rgba(100,60,200,.04) 35%,transparent 65%);}
#world{position:absolute;top:0;bottom:0;left:0;width:6000px;display:flex;align-items:flex-end;will-change:transform;z-index:2;}
.arch-col{position:absolute;bottom:0;width:22px;z-index:3;}
.col-shaft{width:100%;height:100%;background:linear-gradient(90deg,rgba(196,122,255,.04) 0%,rgba(220,180,255,.12) 30%,rgba(220,180,255,.12) 70%,rgba(196,122,255,.04) 100%);border-left:1px solid rgba(196,122,255,.12);border-right:1px solid rgba(196,122,255,.12);}
.col-cap{position:absolute;left:50%;transform:translateX(-50%);width:40px;height:12px;background:linear-gradient(180deg,rgba(220,180,255,.08),transparent);border:1px solid rgba(196,122,255,.15);}
.col-cap.top{top:0;border-radius:0 0 3px 3px;border-top:none;}
.col-cap.bot{bottom:0;border-radius:3px 3px 0 0;border-bottom:none;}
.col-glow-line{position:absolute;top:0;bottom:0;left:50%;width:1px;background:linear-gradient(180deg,transparent 0%,rgba(196,122,255,.35) 20%,rgba(122,240,255,.25) 50%,rgba(196,122,255,.35) 80%,transparent 100%);}
.porthole{position:absolute;border-radius:50%;overflow:hidden;border:3px solid rgba(232,200,122,.22);box-shadow:0 0 0 1px rgba(232,200,122,.07),0 0 25px rgba(196,122,255,.12),inset 0 0 30px rgba(0,0,0,.8);z-index:4;}
.porthole-frame{position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(232,200,122,.06);pointer-events:none;}
.porthole-inner{width:100%;height:100%;background:radial-gradient(ellipse at 38% 32%,#070b2a 0%,#030518 55%,#010210 100%);position:relative;overflow:hidden;}
.p-stars{position:absolute;inset:0;background-image:radial-gradient(1px 1px at 18% 22%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 67% 38%,rgba(255,255,255,.95) 0%,transparent 100%),radial-gradient(1px 1px at 27% 58%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 92% 52%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 77% 88%,rgba(255,255,255,.85) 0%,transparent 100%);}
.p-planet{position:absolute;border-radius:50%;}
.p-ring{position:absolute;border-radius:50%;border:2px solid rgba(255,200,100,.2);transform:rotateX(70deg);}
.p-glare{position:absolute;top:8%;left:10%;width:28%;height:35%;background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 65%);border-radius:50%;transform:rotate(-28deg);}
.p-rivet{position:absolute;width:5px;height:5px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(232,200,122,.5),rgba(160,130,60,.3));border:1px solid rgba(232,200,122,.15);}
.stat-display{position:absolute;background:rgba(3,2,12,.9);border:1px solid rgba(196,122,255,.14);border-radius:12px;padding:12px 14px;overflow:hidden;}
.stat-display::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(196,122,255,.3),rgba(122,240,255,.2),transparent);}
.stat-title{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2.5px;color:rgba(196,122,255,.5);text-transform:uppercase;margin-bottom:8px;}
.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.stat-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;animation:statBlink 2.4s ease-in-out infinite;}
@keyframes statBlink{0%,88%,100%{opacity:1;}94%{opacity:.1;}}
.stat-track{flex:1;height:2px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;animation:fillPulse 3.2s ease-in-out infinite;transform-origin:left;}
@keyframes fillPulse{0%,100%{opacity:.45;transform:scaleX(.68);}50%{opacity:1;transform:scaleX(1);}}
.stat-val{font-family:'DM Mono',monospace;font-size:7px;color:rgba(255,255,255,.25);letter-spacing:.5px;flex-shrink:0;}
.door-wrap{position:absolute;bottom:0;z-index:10;display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.door-arch{width:130px;height:22px;background:linear-gradient(180deg,rgba(196,122,255,.1),transparent);border:1px solid rgba(196,122,255,.18);border-bottom:none;border-radius:60px 60px 0 0;position:relative;overflow:hidden;}
.door-arch::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:40%;height:100%;background:linear-gradient(180deg,rgba(232,200,122,.15),transparent);}
.door-columns{display:flex;align-items:stretch;position:relative;}
.door-pillar{width:12px;background:linear-gradient(90deg,rgba(196,122,255,.04),rgba(220,190,255,.1),rgba(196,122,255,.04));border:1px solid rgba(196,122,255,.12);flex-shrink:0;}
.door-pillar.left{border-right:none;}.door-pillar.right{border-left:none;}
.door-body{width:108px;position:relative;overflow:hidden;background:#020111;border-left:1px solid rgba(196,122,255,.08);border-right:1px solid rgba(196,122,255,.08);transition:border-color .3s;}
.door-scan{position:absolute;left:0;right:0;height:2px;top:0;background:linear-gradient(90deg,transparent,rgba(122,240,255,.5),transparent);animation:doorScan 3s linear infinite;opacity:0;transition:opacity .3s;}
@keyframes doorScan{0%{top:0%;}100%{top:100%;}}
.door-wrap.near .door-scan{opacity:1;}
.door-wrap.near .door-body{border-color:rgba(var(--door-rgb),.5);}
.door-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px 12px;text-align:center;}
.door-glyph{font-size:32px;line-height:1;opacity:.4;transition:opacity .3s,filter .35s,transform .35s;filter:saturate(0);}
.door-wrap.near .door-glyph{opacity:1;filter:saturate(1) drop-shadow(0 0 16px rgba(var(--door-rgb),1));transform:scale(1.12);}
.door-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.2);letter-spacing:2px;text-transform:uppercase;transition:color .3s;}
.door-wrap.near .door-name{color:rgba(255,255,255,.88);}
.door-sub{font-family:'DM Mono',monospace;font-size:9px;font-weight:300;color:transparent;letter-spacing:.5px;transition:color .3s;}
.door-wrap.near .door-sub{color:rgba(var(--door-rgb),.6);}
.door-keypad{position:absolute;right:-16px;top:28%;width:10px;background:rgba(3,2,10,.92);border:1px solid rgba(232,200,122,.18);border-radius:4px;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:12;}
.kp-gem{width:5px;height:5px;border-radius:1px;transform:rotate(45deg);animation:kpBlink 2.2s ease-in-out infinite;}
@keyframes kpBlink{0%,100%{opacity:1;}50%{opacity:.2;}}
.door-threshold{width:calc(100% + 24px);height:3px;background:linear-gradient(90deg,transparent,rgba(var(--door-rgb),.1) 10%,rgba(232,200,122,.4) 50%,rgba(var(--door-rgb),.1) 90%,transparent);transition:opacity .3s;opacity:.3;}
.door-wrap.near .door-threshold{opacity:1;}
#floor{height:calc(var(--floor-h) + var(--sab));flex-shrink:0;position:relative;overflow:hidden;background:linear-gradient(0deg,#010108 0%,#04091c 100%);padding-bottom:var(--sab);}
#floor::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(122,240,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(122,240,255,.05) 1px,transparent 1px);background-size:72px 36px;}
#floor::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-b) 20%,var(--gold) 50%,var(--accent-b) 80%,transparent);opacity:.45;}
#floor-sheen{position:absolute;top:0;left:0;right:0;height:55%;background:linear-gradient(180deg,rgba(122,240,255,.04) 0%,transparent 100%);}

/* ═══════════════════════════════════
   CREW MEMBER — Space Station Staff
═══════════════════════════════════ */
#player-wrap{position:absolute;bottom:0;z-index:20;transition:left .07s linear;transform:translateX(-50%);}
#player-wrap.face-left #crew-svg{transform:scaleX(-1);}
#crew-svg{width:68px;height:188px;overflow:visible;display:block;margin:0 auto;animation:crewIdle 3.2s ease-in-out infinite;transform-origin:center bottom;}
@keyframes crewIdle{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.player-walking #crew-svg{animation:crewWalkBob .38s ease-in-out infinite alternate;}
@keyframes crewWalkBob{from{transform:translateY(0);}to{transform:translateY(-3px);}  }
#crew-shadow{width:48px;height:8px;margin:-1px auto 0;background:radial-gradient(ellipse,rgba(0,0,0,.5) 0%,transparent 70%);}

/* Walk cycle */
.player-walking #arm-l{animation:wAL .36s ease-in-out infinite alternate;transform-origin:22px 80px;}
.player-walking #arm-r{animation:wAR .36s ease-in-out infinite alternate;transform-origin:66px 80px;}
.player-walking #leg-l{animation:wLL .36s ease-in-out infinite alternate;transform-origin:34px 132px;}
.player-walking #leg-r{animation:wLR .36s ease-in-out infinite alternate;transform-origin:54px 132px;}
@keyframes wAL{from{transform:rotate(-18deg);}to{transform:rotate(22deg);}}
@keyframes wAR{from{transform:rotate(18deg);}to{transform:rotate(-22deg);}}
@keyframes wLL{from{transform:rotate(-20deg);}to{transform:rotate(18deg);}}
@keyframes wLR{from{transform:rotate(20deg);}to{transform:rotate(-18deg);}}

/* Ambient glows */
@keyframes badgePulse{0%,100%{opacity:.55;}50%{opacity:1;}}
@keyframes visorShimmer{0%,100%{opacity:.3;}50%{opacity:.7;}}
@keyframes tabletGlow{0%,100%{opacity:.4;}50%{opacity:.9;}}
@keyframes shoulderLight{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes bootStep{0%,100%{opacity:.15;}50%{opacity:.5;}}
@keyframes headTilt{0%,100%{transform:rotate(0deg);}30%{transform:rotate(1deg);}70%{transform:rotate(-0.5deg);}}

.badge-light{animation:badgePulse 2s ease-in-out infinite;}
.visor-sheen{animation:visorShimmer 3s ease-in-out infinite;}
.tablet-screen{animation:tabletGlow 2.4s ease-in-out infinite;}
.rank-light{animation:shoulderLight 1.8s ease-in-out infinite;}
.boot-glow{animation:bootStep 2s ease-in-out infinite;}
#head-g{animation:headTilt 4s ease-in-out infinite;transform-origin:44px 38px;}
</style>
</head>
<body>
<div id="loader"><div class="load-ring"></div><div class="load-label">Preparing launch…</div></div>
<div id="scene">
  <div id="ceiling"></div>
  <div id="walls">
    <div id="nebula-bg"></div>
    <div id="wall-left"></div>
    <div id="wall-right"></div>
    <div id="vp-glow"></div>
    <div id="world"></div>

    <div id="player-wrap">
      <svg id="crew-svg" viewBox="0 0 88 188" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Skin — warm male tone -->
          <radialGradient id="skinG" cx="42%" cy="30%" r="68%">
            <stop offset="0%" stop-color="#ffd8b8"/>
            <stop offset="50%" stop-color="#e8b890"/>
            <stop offset="100%" stop-color="#c8906a"/>
          </radialGradient>
          <!-- Hair — short dark navy/black -->
          <linearGradient id="hairG" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#2a2860"/>
            <stop offset="60%" stop-color="#18163a"/>
            <stop offset="100%" stop-color="#0c0a20"/>
          </linearGradient>
          <!-- Uniform jacket — deep navy with teal trim -->
          <linearGradient id="uniformG" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#0e1a3a"/>
            <stop offset="50%" stop-color="#081228"/>
            <stop offset="100%" stop-color="#040a18"/>
          </linearGradient>
          <!-- Uniform highlight -->
          <linearGradient id="uniHiG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(122,200,255,0.18)"/>
            <stop offset="100%" stop-color="transparent"/>
          </linearGradient>
          <!-- Teal accent stripe -->
          <linearGradient id="tealG" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00c8d8"/>
            <stop offset="100%" stop-color="#0088a8"/>
          </linearGradient>
          <!-- Rank stripe gold -->
          <linearGradient id="rankG" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f0d060"/>
            <stop offset="100%" stop-color="#c09030"/>
          </linearGradient>
          <!-- Pants — charcoal -->
          <linearGradient id="pantsG" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#161828"/>
            <stop offset="100%" stop-color="#0a0c18"/>
          </linearGradient>
          <!-- Boot -->
          <linearGradient id="bootG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a1c30"/>
            <stop offset="100%" stop-color="#080a18"/>
          </linearGradient>
          <!-- Tablet/datapad screen -->
          <linearGradient id="tabG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#003848"/>
            <stop offset="100%" stop-color="#001828"/>
          </linearGradient>
          <!-- ID badge -->
          <linearGradient id="badgeG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a3060"/>
            <stop offset="100%" stop-color="#0a1838"/>
          </linearGradient>
          <!-- Eye color — dark with a teal glint -->
          <radialGradient id="eyeG" cx="35%" cy="32%" r="65%">
            <stop offset="0%" stop-color="#50d8e8"/>
            <stop offset="45%" stop-color="#1888a0"/>
            <stop offset="100%" stop-color="#084858"/>
          </radialGradient>
          <!-- Headset visor strip -->
          <linearGradient id="visorG" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(0,200,220,0.0)"/>
            <stop offset="40%" stop-color="rgba(0,200,220,0.7)"/>
            <stop offset="100%" stop-color="rgba(0,200,220,0.0)"/>
          </linearGradient>
          <clipPath id="faceC">
            <ellipse cx="44" cy="38" rx="18" ry="21"/>
          </clipPath>
        </defs>

        <!-- ═══ LEFT ARM ═══ -->
        <g id="arm-l">
          <!-- Upper arm sleeve -->
          <path d="M 23 82 Q 10 90 8 108 Q 7 118 12 123 Q 16 126 20 124 Q 24 126 26 122 Q 29 112 27 96 Q 26 87 23 82 Z"
                fill="url(#uniformG)" stroke="rgba(0,180,200,0.2)" stroke-width="0.8"/>
          <!-- Teal cuff stripe -->
          <path d="M 10 112 Q 14 122 20 124 Q 24 126 26 122 Q 22 118 18 116 Q 13 114 10 112 Z"
                fill="url(#tealG)" opacity="0.8"/>
          <!-- Hand holding datapad -->
          <ellipse cx="16" cy="130" rx="7" ry="6.5"
                   fill="url(#skinG)" stroke="rgba(200,160,130,0.2)" stroke-width="0.6"/>
          <!-- Datapad/tablet -->
          <rect x="6" y="134" width="20" height="28" rx="3"
                fill="url(#tabG)" stroke="rgba(0,180,210,0.45)" stroke-width="1"/>
          <!-- Screen content lines -->
          <rect x="8" y="136" width="16" height="24" rx="2"
                fill="rgba(0,200,230,0.06)"/>
          <line x1="9" y1="139" x2="23" y2="139" stroke="rgba(0,220,240,0.5)" stroke-width="0.7" class="tablet-screen"/>
          <line x1="9" y1="142" x2="20" y2="142" stroke="rgba(0,220,240,0.35)" stroke-width="0.6"/>
          <line x1="9" y1="145" x2="22" y2="145" stroke="rgba(0,220,240,0.4)" stroke-width="0.6"/>
          <line x1="9" y1="148" x2="19" y2="148" stroke="rgba(0,220,240,0.3)" stroke-width="0.6"/>
          <!-- Mini chart on tablet -->
          <polyline points="9,155 12,151 15,153 18,148 21,150 23,147"
                    fill="none" stroke="rgba(0,240,200,0.6)" stroke-width="0.8" stroke-linecap="round"/>
          <rect x="8" y="158" width="4" height="3" rx="0.5" fill="rgba(0,200,220,0.35)"/>
          <rect x="14" y="156" width="4" height="5" rx="0.5" fill="rgba(0,200,220,0.45)"/>
          <rect x="20" y="157" width="3" height="4" rx="0.5" fill="rgba(0,200,220,0.4)"/>
          <!-- Screen glow edge -->
          <rect x="6" y="134" width="20" height="28" rx="3"
                fill="none" stroke="rgba(0,220,240,0.22)" stroke-width="0.5"/>
          <!-- Thumb over tablet -->
          <path d="M 22 136 Q 27 138 26 143" fill="none" stroke="url(#skinG)" stroke-width="5" stroke-linecap="round"/>
        </g>

        <!-- ═══ RIGHT ARM ═══ -->
        <g id="arm-r">
          <path d="M 65 82 Q 78 90 80 108 Q 81 118 76 123 Q 72 126 68 124 Q 64 126 62 122 Q 59 112 61 96 Q 62 87 65 82 Z"
                fill="url(#uniformG)" stroke="rgba(0,180,200,0.2)" stroke-width="0.8"/>
          <!-- Teal cuff -->
          <path d="M 78 112 Q 74 122 68 124 Q 64 126 62 122 Q 66 118 70 116 Q 75 114 78 112 Z"
                fill="url(#tealG)" opacity="0.8"/>
          <!-- Hand (relaxed, slightly cupped) -->
          <ellipse cx="72" cy="130" rx="7" ry="6.5"
                   fill="url(#skinG)" stroke="rgba(200,160,130,0.2)" stroke-width="0.6"/>
          <!-- Fingers slightly closed -->
          <path d="M 66 133 Q 64 138 66 140" fill="none" stroke="url(#skinG)" stroke-width="4" stroke-linecap="round"/>
          <path d="M 69 135 Q 68 141 70 143" fill="none" stroke="url(#skinG)" stroke-width="4" stroke-linecap="round"/>
          <path d="M 73 136 Q 73 142 73 144" fill="none" stroke="url(#skinG)" stroke-width="3.8" stroke-linecap="round"/>
          <path d="M 77 135 Q 78 140 77 142" fill="none" stroke="url(#skinG)" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M 79 132 Q 81 136 80 139" fill="none" stroke="url(#skinG)" stroke-width="3" stroke-linecap="round"/>
        </g>

        <!-- ═══ BODY — Uniform jacket ═══ -->
        <!-- Main torso -->
        <path d="M 25 82 Q 22 100 22 115 Q 22 128 25 136 Q 30 142 44 142 Q 58 142 63 136 Q 66 128 66 115 Q 66 100 63 82 Q 57 76 44 74 Q 31 76 25 82 Z"
              fill="url(#uniformG)"/>
        <!-- Uniform body highlight -->
        <path d="M 27 83 Q 24 100 25 114"
              fill="none" stroke="rgba(100,180,255,0.16)" stroke-width="2.5"/>
        <!-- Right side subtle -->
        <path d="M 61 83 Q 64 100 63 114"
              fill="none" stroke="rgba(0,160,200,0.08)" stroke-width="1.5"/>

        <!-- Center zipper / front panel -->

    const pals=[['#7c3aed','#4c1d95','#2e1065'],['#0e7490','#164e63','#083344'],['#c2410c','#7c2d12','#431407'],['#065f46','#064e3b','#022c22'],['#be185d','#831843','#500724']];
    const p=pals[i%pals.length],ps=Math.round(S*0.34+i*3),rw=ps+14,rh=Math.round(rw*0.28),rl=Math.round(S*0.38-rw/2+(i%3)*4),rb=Math.round(S*0.12+ps*0.3);
    el.innerHTML=`<div class="porthole-inner"><div class="p-stars"></div><div class="p-planet" style="width:${ps}px;height:${ps}px;right:${14+i%3*5}%;bottom:12%;background:radial-gradient(circle at 36% 28%,${p[0]},${p[1]} 50%,${p[2]});"><div style="position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent 50%)"></div></div><div class="p-ring" style="width:${rw}px;height:${rh}px;bottom:${rb}px;left:${rl}px;border-color:${p[0]}55;"></div><div class="p-glare"></div></div><div class="porthole-frame"></div>`;
    [0,90,180,270].forEach(a=>{const r2=a*Math.PI/180,rv=S/2-2,rx=Math.round(S/2+rv*Math.cos(r2)-2.5),ry=Math.round(S/2+rv*Math.sin(r2)-2.5);const riv=document.createElement('div');riv.className='p-rivet';riv.style.cssText=`left:${rx}px;top:${ry}px;`;el.appendChild(riv);});
    worldEl.appendChild(el);
  });
  STAT_POS.forEach((px,i)=>{
    const el=document.createElement('div');el.className='stat-display';el.style.cssText=`left:${px-52}px;bottom:${wH*0.52}px;width:104px;`;
    const rows=[{w:.82,c:'rgba(122,240,255,1)',d:'98.2%'},{w:.61,c:'rgba(196,122,255,1)',d:'61.4%'},{w:.74,c:'rgba(232,200,122,1)',d:'74.1%'}];
    let inner=`<div class="stat-title">UNIT-${String(i+1).padStart(2,'0')}</div>`;
    rows.forEach((row,ri)=>{inner+=`<div class="stat-row"><div class="stat-dot" style="background:${row.c};box-shadow:0 0 5px ${row.c};animation-delay:${ri*.55+i*.12}s"></div><div class="stat-track"><div class="stat-fill" style="width:${row.w*100}%;background:${row.c};animation-delay:${ri*.4+i*.15}s"></div></div><div class="stat-val">${row.d}</div></div>`;});
    el.innerHTML=inner;worldEl.appendChild(el);
  });
  const dh=Math.round(wH*0.74),de=document.createElement('div');
  de.className='door-wrap';de.id='door-0';de.style.cssText=`left:${DOOR.wx}px;transform:translateX(-50%)`;de.style.setProperty('--door-rgb',`${DOOR.r},${DOOR.g},${DOOR.b}`);
  de.innerHTML=`<div class="door-arch"></div><div class="door-columns"><div class="door-pillar left"></div><div class="door-body" style="height:${dh}px"><div class="door-scan"></div><div class="door-inner"><div class="door-glyph" style="color:rgba(${DOOR.r},${DOOR.g},${DOOR.b},1)">${DOOR.icon}</div><div class="door-name">${DOOR.label}</div><div class="door-sub">${DOOR.desc}</div></div><div class="door-keypad"><div class="kp-gem" style="background:#ff6b6b;animation-delay:0s"></div><div class="kp-gem" style="background:#6bffb4;animation-delay:.75s"></div><div class="kp-gem" style="background:var(--gold);animation-delay:1.5s"></div></div></div><div class="door-pillar right"></div></div><div class="door-threshold"></div>`;
  worldEl.appendChild(de);
  const cl=document.getElementById('ceiling');if(!cl)return;
  cl.querySelectorAll('.cornice-gem').forEach(g=>g.remove());
  for(let gx=0;gx<WORLD_W;gx+=130){const g=document.createElement('div');g.className='cornice-gem';g.style.left=(gx-camX)+'px';g.dataset.wx=gx;cl.appendChild(g);}
}
function updateCamera(){const t=Math.max(0,Math.min(WORLD_W-VW(),playerWx-VW()*0.38));camXVel+=(t-camX)*0.11;camXVel*=0.72;camX+=camXVel;}
function frame(ts){
  requestAnimationFrame(frame);const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;if(warping)return;
  const dx=playerTgWx-playerWx,dist=Math.abs(dx);
  if(dist>2){playerWx+=Math.sign(dx)*Math.min(6.5*(dt/0.01667)*Math.min(1,dist/80),dist-2);playerWx=Math.max(80,Math.min(WORLD_W-80,playerWx));facing=Math.sign(dx);moving=true;}
  else{moving=false;playerTgWx=playerWx;}
  updateCamera();worldEl.style.transform=`translateX(${-camX}px)`;
  const pw=document.getElementById('player-wrap');pw.style.left=(playerWx-camX)+'px';
  if(moving){pw.classList.add('player-walking');pw.classList.toggle('face-left',facing<0);}else pw.classList.remove('player-walking');
  const dd=Math.abs(playerWx-DOOR.wx),dEl=document.getElementById('door-0');
  if(dEl)dEl.classList.toggle('near',dd<160);
  const wn=doorNear;doorNear=dd<140;
  if(doorNear!==wn)document.getElementById('door-card').classList.toggle('on',doorNear);
  if(dd<28&&!warping){warping=true;document.getElementById('door-card').classList.remove('on');const fade=document.createElement('div');fade.style.cssText='position:fixed;inset:0;background:#000;opacity:0;z-index:9999;transition:opacity 0.6s ease;pointer-events:none;';document.body.appendChild(fade);requestAnimationFrame(()=>{fade.style.opacity='1';});setTimeout(()=>{window.location.href=DOOR.url;},700);}
  document.querySelectorAll('.cornice-gem').forEach(g=>{const wx=parseInt(g.dataset.wx),sx=wx-camX;g.style.left=sx+'px';g.style.display=(sx<-20||sx>VW()+20)?'none':'';});
}
function spawnDust(cx,cy){for(let i=0;i<6;i++){const d=document.createElement('div');d.className='stardust';const a=(Math.random()*360)*Math.PI/180,dist2=30+Math.random()*50;d.style.setProperty('--dx',`${Math.cos(a)*dist2}px`);d.style.setProperty('--dy',`${Math.sin(a)*dist2-20}px`);d.style.left=cx+'px';d.style.top=cy+'px';d.style.background=['rgba(232,200,122,.7)','rgba(196,122,255,.7)','rgba(122,240,255,.7)'][i%3];document.body.appendChild(d);setTimeout(()=>d.remove(),4000);}}
function handleTap(cx,cy){if(warping)return;const wx=cx+camX;playerTgWx=Math.abs(wx-DOOR.wx)<80?DOOR.wx:Math.max(80,Math.min(WORLD_W-80,wx));const r=document.createElement('div');r.className='ripple';r.style.left=cx+'px';r.style.top=cy+'px';document.body.appendChild(r);setTimeout(()=>r.remove(),520);spawnDust(cx,cy);}
let lt=0;
document.addEventListener('touchstart',e=>{e.preventDefault();handleTap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
document.addEventListener('touchend',e=>{const n=Date.now();if(n-lt<=300)e.preventDefault();lt=n;},{passive:false});
document.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
function init(){buildWorld();const pw=document.getElementById('player-wrap');pw.style.bottom='0px';wallsEl.appendChild(pw);requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(frame);});}
window.addEventListener('resize',()=>buildWorld());
init();
</script>
</body>
</html>
